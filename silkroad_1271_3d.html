      const _upu=worldY(420), _backu=9*(WX/KMX);
      const desired=new THREE.Vector3().copy(cur).addScaledVector(dir,-_backu).add(new THREE.Vector3(0,Math.max(_upu,0.03),0));
      camPos.lerp(desired,0.035);          /* spring on position: turns arrive as leans, not jerks */
      camAim.lerp(new THREE.Vector3().lerpVectors(cur,ahead,0.45).add(new THREE.Vector3(0,worldY(90),0)),0.06); /* Kris: gaze holds the CARAVAN in the lower third; the mountains keep the skyline */ /* gaze a touch up: the skyline belongs to the mountains */             /* spring on the gaze: the eye leads the road gently */
      camera.position.copy(camPos); camera.lookAt(camAim); if(marker)marker.scale.setScalar(0.05); /* Kris: a spot smaller */ /* ground-scale caravan when the cam rides low */
    }
  } else {
    camera.position.set(target.x+camR*Math.sin(camPhi)*Math.sin(camTheta), target.y+camR*Math.cos(camPhi), target.z+camR*Math.sin(camPhi)*Math.cos(camTheta));
    camera.lookAt(target);
    camPos.copy(camera.position); camAim.copy(target); if(marker)marker.scale.setScalar(0.7);
  }
  renderer.render(scene,camera);
}
function addEvents(){ let drag=false,lx=0,ly=0;
  const c=document.getElementById('c');
  c.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  addEventListener('mouseup',()=>drag=false);
  addEventListener('mousemove',e=>{ if(!drag||riding)return; camTheta-=(e.clientX-lx)*0.005; camPhi=Math.max(0.25,Math.min(1.45,camPhi-(e.clientY-ly)*0.004)); lx=e.clientX;ly=e.clientY; });
  c.addEventListener('wheel',e=>{ if(riding)return; camR=Math.max(18,Math.min(700,camR*(1+Math.sign(e.deltaY)*0.1))); e.preventDefault(); },{passive:false});
  addEventListener('resize',resize);
}
function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
</script></body></html>
