   adm:"Guangzhou — Canton to the western traders — is the southern gate of the Tang and the busiest port in the world's largest empire. Tens of thousands of foreigners live in the fan-fang, the walled foreigners' quarter: Arab and Persian sea-merchants, Indians, Malays, Sinhalese, Chams, each with their own mosque or temple and their own headman. The Maritime Trade Commissioner sits at the river-mouth and takes the emperor's tenth of everything that floats in. Down at the wide mouth of the Pearl, past a scatter of green islands and fishing-hamlets, lies a fine sheltered bay the boat-people use to ship sweet incense-wood — a 'fragrant harbour', they call it; a thousand years on, the world will know that anchorage as Hong Kong. Beyond the bar, the monsoon waits to carry you down into the South Seas."},
 {name:'Kauthara', zh:'', frac:.11, desc:"On the Champa coast — the Arabs call the whole land Sanf. A kingdom of brick towers and aromatic woods, ruled from the temple-hill of Po Nagar; behind the strand the coast climbs into steaming jungle and forested hills.",
   arr:"You make landfall on the Cham coast at Kauthara, beneath the brick towers of Po Nagar. The air is thick with the resin the Arabs cross oceans to buy.",
   adm:"Kauthara, on the coast the Arab pilots call Sanf — the land of Champa. The Cham are sea-people and Hindu by faith; above the harbour the temple-towers of Po Nagar rise in red brick, sacred to the goddess the locals call Yan Po Nagar and the Brahmins call Bhagavati. The kingdom's wealth is in scent: eaglewood and calambac, the dark fragrant heartwood worth its weight in the markets of Canton and Baghdad alike. Cham galleys — long, low, and not always friendly to a fat merchantman — patrol the river-mouths."},
 {name:'Palembang', zh:'', frac:.16, desc:"Capital of Srivijaya, the Buddhist sea-empire that holds the Strait — a river-town walled in by dense, dripping equatorial rainforest. Every ship between China and India pays its respects, and its dues, here.",
   arr:"You come up the river to Palembang, seat of Srivijaya, lord of the Strait. Monks and harbour-masters greet you together, both expecting their due.",
   adm:"Palembang, on its broad river, is the heart of Srivijaya — the Buddhist maritime empire that commands the Strait of Malacca and with it every ship passing between China and India. The Maharaja's word is law on these waters; his customs-men are thorough and his monks are learned, for Palembang is a great seat of Buddhist study where pilgrims break their voyage to read sutras before going on to India. You wait here for the monsoon to turn. Word comes upriver from the kingdoms of Java to the south of a marvel rising stone by stone — a whole mountain being cased in carved terraces, a thing they call Borobudur, that will take a lifetime yet to finish."},
 {name:'Mantai', zh:'', frac:.30, desc:"The great port of Sarandib (Ceylon), seaward gate of the Anuradhapura kings. Cinnamon, gems, and pearls; pilgrims bound for the holy Peak.",

   adm:"Mantai — Mahatittha, 'the great ford' — is the chief port of Sarandib, the teardrop island the Sinhalese call Lanka, the Arabs Sarandib, and the old Greeks Taprobane. Inland lies Anuradhapura of the great stupas and tanks, where the Sinhalese kings keep the tooth-relic of the Buddha; here on the coast it is gems and cinnamon and pearl. To the southeast a single mountain stands clear above the hills — the Peak of the Footprint, Adam's Peak, where in one stone a hollow the shape of a giant foot draws pilgrims of four faiths: the Buddhists call it the Buddha's, the Muslims Adam's, and they climb it together by lamplight."},
 {name:'Kollam', zh:'', frac:.35, desc:"Quilon, on the Malabar pepper coast — the Arabs call it Kulam. Pepper by the shipload, and an ancient community of St Thomas Christians.",

 {name:'Zanzibar', zh:'', frac:.45, hub:'minor', cash:350, desc:"On the Zanj coast of Africa — the trading-town of Unguja Ukuu. Ivory, mangrove-poles, gold from the far interior, and a darker traffic in men.",

   adm:"Unguja Ukuu, on the island the Arabs call Zanjibar — 'coast of the blacks' — is the southern edge of the known sea, where the monsoon at last gives out. The traders here are Africans and the Arabs and Persians who have begun to settle among them, and the goods are the raw wealth of a continent: ivory by the tusk, ambergris off the beaches, mangrove-poles for the treeless ports of Arabia, rock-crystal, and gold carried down from mines a thousand miles inland that no foreigner has ever seen. There is a darker cargo too — men, taken from the interior and shipped north to the marshes of Iraq; you note it, and say nothing. In the heat of the evening the traders sit with gourds of palm-wine, cloudy and sharp, tapped from the coconut palms, and the talk runs on gold, ivory, and the turning of the monsoon."},

 {name:'Qulzum', zh:'', frac:.85, hub:'minor', cash:250, desc:"Clysma, at the head of the Red Sea below Sinai — where the Canal of the Commander of the Faithful joins the sea to the Nile.",

 {name:'Fustat', zh:'', frac:.90, desc:"The capital of Egypt — a teeming city of tall mud-brick houses where the canal from the Red Sea meets the Nile, and the Great Pyramids stand on the desert edge to the west.",

 {name:'Alexandria', zh:'', frac:.92, desc:"The faded great city on the Mediterranean — now an Abbasid port under Muslim governors, though still full of Greek-speaking Christians — the Pharos lighthouse yet standing. From here ship for Constantinople or Aleppo.",

    if(rnd()<pp){ S.voyaging=false; clearVoy(); S.pendingEvent=evPirates(); render(); return; }
  }

}

function skipVoy(){
  S.voyaging=false; clearVoy();
  for(let i=0;i<160 && S.voy;i++){
    if(S.food<foodNeed()){ S.pendingEvent=evSeaFood(); render(); return; }
    S.day++; S.food=Math.max(0,S.food-foodNeed()); accrueGuardWages(); S.voy.daysLeft--;
    if(S.voy.terr==='land' && (S.voy.from==='Basra'||S.voy.to==='Basra') && (S.voy.from==='Baghdad'||S.voy.to==='Baghdad')){
      if(!S.onceFlags.sawBakhamra && gameDate().y===763 && gameDate().m===1 && gameDate().d>=21){ S.onceFlags.sawBakhamra=true; S.pendingEvent=witnessBakhamra(); render(); return; }
    }
    if(S.voy.daysLeft<=0){ voyArrive(); render(); return; }
    const p=(S.voy.total-S.voy.daysLeft)/S.voy.total;
    if(S.voy.sight && !S.voy.sightDone && p>=0.5){ S.voy.sightDone=true; log(S.voy.sight); }
    if(S.voy.terr==='deep'||S.voy.terr==='coast'||S.voy.terr==='med'){
      const wreckP=(S.voy.terr==='deep'?0.006:0.009)*(hasPilot()?0.9:1)*winterStormMult(S.voy.terr)*(S.voy.storm||1);
      if(rnd()<wreckP){ S.pendingEvent=voyStorm(); render(); return; }
      if(rnd()<0.05){ S.pendingEvent=evSeaWinds(); render(); return; }
      let pp=(S.voy.terr==='coast'?0.020:0.011)*(S.banditFreq||1); if(S.voy.strait)pp*=2.8; if(convoyValue()>10000)pp*=2;
      if(rnd()<pp){ S.pendingEvent=evPirates(); render(); return; }
    }
  }
  render();
}
function voyArrive(){
  const to=S.voy.to, from=S.voy.from; S.voy=null; S.voyaging=false; clearVoy(); S.seasick=false;
  S.dealDays=0; S.priceLock={};
  if(isSeaExitCity(to)){
    S.seaMode=false; S.portName=null;
    const ti=S.itin.findIndex(x=>x.name===to); if(ti>=0)S.idx=ti;
    S.dir=1; S.legKm=0; S.water=waterMax();
    if(!S.cityDay)S.cityDay={}; restockToNow(to);
    log("You come ashore at "+to+", the sea-road behind you. You will want fresh pack-animals here before you take to the land again.");
    if(!S.returning && to===goalName()){ S.reachedCpl=true; S.seaUnlocked=true; S.bySea=true; growNephew(); S.screen='end'; return; }
    if(S.returning && to===homeName()){ S.bySea=true; S.screen='home'; return; }
    if(to==='Baghdad'){ bakhamraTalk('Baghdad'); }
    if(to==='Aleppo' && S.onceFlags && !S.onceFlags.leoMet && !S.party.some(p=>p.name==='Leo the Pilot'&&p.alive)){ S.onceFlags.leoMet=true; S.pendingEvent=leoOffer(); }
    S.screen='city'; return;
  }
  S.seaMode=true; S.prevPort=from; S.portName=to; S.dir=1; S.water=waterMax(); S.hereSince=S.day; if(S.townCash)delete S.townCash[to];
  if(!S.cityDay)S.cityDay={}; restockToNow(to);
  log(SEA_BYNAME[to].arr || ("You raise "+to+" and put in."));
  checkSeaHistory(to);
  if(!S.pendingEvent){ if(guardOweTotal(to)>0){ S.pendingEvent=exGuardConfront(to); } else if((S.wageDebt||0)>0){ S.pendingEvent=guardDebtReminder(); } }
  S.screen='port';
}

function cooledFish(){ return (S.fishDay==null)||(S.day-S.fishDay)>=20; }
function fishingEvent(c,fisher){ var hunter=fisher; var riv=!!fisher.salty;
  return {h:'A FISHERMAN SHORT A HAND', t:"You have been about "+cityLabel(c)+" long enough now that the harbour-folk know your faces. A fisherman whose brother lies sick of a fever asks whether "+hunter.name+", who plainly knows the way of a boat, might take an oar and a net for a few days, the catch to be shared. It would be a change from the dust and the chase.", ch:[
    {l:'Send '+hunter.name+' out with the boats (3 days)',f(){ S.fishDay=S.day; passDays(3); if(S.dead)return; var food=(riv?14+ri(14):10+ri(10)); S.food+=food; log(hunter.name+" comes back salt-crusted and grinning after three days at the nets, with the caravan's share of the catch \u2014 about "+food+" days of fish, smoked and salted for the road."+(riv?" A waterman to the bone, "+hunter.name+" took to it like coming home.":"")); }},
    {l:'Thank him, but keep '+hunter.name+' to the caravan',f(){ S.fishDay=S.day; log("You thank the fisherman and decline; he shrugs and finds another pair of hands by nightfall."); }}
  ]};
}
function exploreWilds(){
  const c=city(); const b=PORT_BIOME[c.name]||"the country round about";
  const fa=PORT_FAUNA[c.name]||{pred:'',small:'small game',big:'a deer'};
  const hs=skillMax('hunt'); const hunter=bestAt('hunt'); const who=hunter?hunter.name:'You';
  const fisher=livingParty().find(p=>p.salty)||hunter; if(fisher && S.seaMode && (S.day-(S.hereSince!=null?S.hereSince:S.day))>=3 && cooledFish() && rnd()<0.33){ return fishingEvent(c,fisher); }
  passDays(1); if(S.dead) return null;
  let out;
  if(fa.pred && rnd() < Math.max(0.04,0.12-0.02*hs)){
    var killed = rnd()<0.35;
    const v=casualty(killed); S.hp=clamp(S.hp-(killed?4:8),0,100);
    if(killed){ out="The hunt turns hunter: "+fa.pred+" takes "+(v?v:"one of you")+" out of the scrub before a shout can leave anyone's throat \u2014 dragged off and killed. You come back with no meat and a grave to dig."; }
    else { out="The hunt turns hunter: "+fa.pred+" comes out of the cover before anyone sees it. "+(v?(v+" is mauled and badly hurt before you beat it off"):("you are mauled and badly hurt before you beat it off"))+" \u2014 no meat today, only wounds and a story you will tell for years."; }
    if(S.hp<=0){ S.cause=fa.pred.replace(/^an? /,''); die(); return null; }
  } else { const r=rnd()+hs*0.06;
    if(r>1.10){ const food=9+ri(9); S.food+=food; out="A rare day: "+who+" "+(who==='You'?'take':'takes')+" "+fa.big+", a fine beast \u2014 about "+food+" days of good meat, and a tale to match."; }
    else if(r>0.5){ const food=1+ri(3); S.food+=food; out=who+" "+(who==='You'?'bring':'brings')+" in "+fa.small+" \u2014 a day or two of meat, no more."; }
    else { out="A long, empty day; the local game knows its ground far better than you, and you come back with sore feet and nothing else."; }
  }
  return {h:'HUNT NEARBY', t:"You leave the wharves behind and spend the day out in "+b+". "+out, ch:[{l:'Back to the harbour',f(){}}]};
}
function openExplore(){ if(!S)return; const ev=exploreWilds(); if(S.dead){ render(); return; } S.pendingEvent=ev; render(); }
function seaEntryButtons(c){
  if(!c) return '';
  if(c.name==='Baghdad') return '<button class="seal" onclick="enterSeaPort(&quot;Baghdad&quot;)">Take the river-road down the Tigris to Basra</button> ';
  if(!maritimeOpen()) return '';
  if(c.name==="Chang'an") return '<button class="seal" onclick="enterSeaPort(&quot;Chang\'an&quot;)">Take the sea road east (down the rivers to the coast)</button> ';

  return '';
}

  if(t<Date.UTC(762,6,30)) return "Baghdad is as yet barely a name \u2014 a Tigris-side village hard against the broken arches of Ctesiphon, the old Persian capital the Arabs call al-Mada\u02bcin. But the ground for miles about is staked, roped and swarming: the Caliph al-Mansur means to raise a great round city on this very spot, and surveyors, brick-burners and labourers gather by the thousand. You have come a little early to history.";
  if(t<Date.UTC(763,0,1)) return "Baghdad \u2014 the Caliph\u2019s Round City, its first brick newly laid on a day the astrologers swore was blessed. As yet it is more plan than place: a vast ring of foundations, mountains of brick and reed, and a hundred thousand men at work where a village dozed a season ago.";
  return (eastbound() && c.descE) ? c.descE : c.desc; }
function passWarnHtml(){ if(typeof upcomingMountain!=='function'||!upcomingMountain())return ''; if(typeof passDanger!=='function'||passDanger()<0.4)return ''; var shut=passDanger()>=0.85; var rn=(typeof rangeName==='function')?rangeName():'the mountains'; var pw=(typeof passWord==='function')?passWord():'closing'; return '<p style="color:#8a2f12;font-weight:bold;margin:4px 0 8px">\u26A0 '+(shut?'The high passes ahead into '+rn+' are shut for the season \u2014 to force a crossing now is to gamble every life against the snow.':'Drovers down from the heights say '+rn+' ahead is '+pw+'; the passes may close before you are through.')+'</p>'; }

  }).join('');
  rows += foodShortRow(c);
  const fwd=fwdCity(), back=backCity(), xfork=otherForkCity();

  m.innerHTML='<h2>'+cityLabel(c)+zhSpan(c)+(S.returning?' <span class="sub">· homeward</span>':'')+'</h2><p class="sub">'+cityDesc(c)+'</p>'+passWarnHtml()+slaveWarnHtml()+
  passLine+
  '<table><tr><th>Bazaar</th><th style="text-align:right">price</th><th style="text-align:right">avg&nbsp;paid</th><th style="text-align:right">held</th><th>buy / sell</th></tr>'+rows+'</table>'+

  '<div>'+
  '<button onclick="buyFood()">Provisions +30 (10 s)</button>'+
  '<button onclick="S.screen=\'animals\';render()">Livestock market</button>'+
  '<button onclick="S.screen=\'notes\';render()">Prices &amp; notes</button>'+
  '<button onclick="openHire()">Hire / release guards</button>'+
  '<button onclick="huntFood()">Hunt nearby (1 day)</button>'+
  '<button onclick="openOutfitter()">Outfitter</button>'+
  ((S.goods.slaves>0)?'<button onclick="openCoffle()">The coffle ('+S.goods.slaves+')</button>':'')+
  '<button onclick="restCity()">Rest 3 days</button>'+
  '<button onclick="waitMonth()">Wait a month</button>'+
  '<button onclick="saveAndQuit()">Stay awhile (save &amp; quit)</button>'+
  '<button onclick="admireCity()">Admire the city</button>'+

  (c.camp ? '<button class="seal" onclick="campLeave()">Strike camp and go on</button>' :
   (chartForCity(c.name) ? '<button class="seal" onclick="openChart()">Set out</button>' : anatMapCity(c.name) ? '<button class="seal" onclick="openMap()">Set out</button>' :

    (xfork?'<button onclick="setOutToOtherFork()">Detour to '+xfork.name+' (other Taklamakan road, '+fmtDist(xfork.dist)+')</button>':'')+
    seaEntryButtons(c))))+

}
const SKY=[
 {t:'#aac4dc',b:'#ead9b3',sun:1,moon:0,star:0,veil:0},     // day
 {t:'#d98e54',b:'#b04a2e',sun:.55,moon:0,star:0,veil:.12}, // dusk
 {t:'#16203c',b:'#2c2746',sun:0,moon:1,star:1,veil:.5},    // night
 {t:'#caa0a8',b:'#e6c39a',sun:.35,moon:.3,star:0,veil:.1}, // dawn
];
function skyPhase(){return ((S.day%4)+4)%4;}
function groundCol(t){return {settled:'#6a5630',steppe:'#5a6a3a',desert:'#8a6638',harsh:'#7a5630',mountain:'#544c40',rugged:'#6a5a44'}[t]||'#8a6638';}
function camelSVG(dx,delay){

    '<rect x="6" y="24" width="2.6" height="16" fill="#241a12"/><rect x="13" y="24" width="2.6" height="16" fill="#241a12"/>'+
    '<rect x="31" y="24" width="2.6" height="16" fill="#241a12"/><rect x="38" y="24" width="2.6" height="16" fill="#241a12"/>'+
    '<ellipse cx="23" cy="22" rx="17" ry="8" fill="#34261a"/>'+
    '<ellipse cx="17" cy="14" rx="6" ry="7" fill="#34261a"/><ellipse cx="29" cy="14" rx="6" ry="7" fill="#34261a"/>'+
    '<path d="M7 19 C0 17 -1 8 -1 4 L-4 4 C-4 11 -3 19 3 23 Z" fill="#34261a"/>'+
    '<ellipse cx="-3" cy="4" rx="3.4" ry="2.6" fill="#34261a"/><rect x="-8" y="3" width="4" height="2.4" rx="1" fill="#34261a"/>'+
    '</g></g>';
}
function journeyScene(){
  const t=nextCity()?legTerr():'desert';
  const p=SKY[skyPhase()];
  const gc=groundCol(t);
  const farPath='M0 200 L0 150 Q60 124 120 146 Q190 170 260 140 Q320 120 350 144 L350 200 Z';
  const nearPath='M0 200 L0 168 Q70 144 150 166 Q230 186 300 160 Q345 148 350 166 L350 200 Z';
  const tile=(d,extra)=>'<path d="'+d+'" fill="'+gc+'"'+extra+'/><path d="'+d+'" transform="translate(350,0)" fill="'+gc+'"'+extra+'/><path d="'+d+'" transform="translate(700,0)" fill="'+gc+'"'+extra+'/>';
  let stars='';
  for(let i=0;i<26;i++){const x=(i*53%690)+5,y=(i*37%90)+8,r=(i%3)?.8:1.3;stars+='<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="#fff"/>';}
  let mts='';
  if(t==='mountain'){mts='<g fill="#3a3550" opacity=".8"><path d="M0 155 L90 80 L150 130 L230 60 L300 120 L380 70 L460 130 L560 75 L660 135 L700 110 L700 200 L0 200Z"/></g>';}
  return '<svg class="scene'+((S.journeying||S.voyaging)?'':' paused')+'" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="height:170px'+(eastbound()?';transform:scaleX(-1)':'')+'">'+
    '<defs><linearGradient id="jSky" x1="0" y1="0" x2="0" y2="1">'+
      '<stop id="skyTop" offset="0" stop-color="'+p.t+'"/><stop id="skyBot" offset="1" stop-color="'+p.b+'"/></linearGradient></defs>'+
    '<rect width="700" height="200" fill="url(#jSky)"/>'+
    '<g id="jStars" opacity="'+p.star+'">'+stars+'</g>'+
    '<circle id="jSun" cx="585" cy="46" r="22" fill="#ffe6a0" opacity="'+p.sun+'"/>'+
    '<g id="jMoon" opacity="'+p.moon+'"><circle cx="585" cy="46" r="17" fill="#e8ecf5"/><circle cx="592" cy="42" r="14" fill="url(#jSky)"/></g>'+
    mts+
    '<g class="sFar">'+tile(farPath,' opacity=".55"')+'</g>'+
    '<g class="sNear">'+tile(nearPath,'')+'</g>'+
    '<g transform="translate(250,120) scale(.95)">'+
      camelSVG(148,.18)+camelSVG(92,.5)+camelSVG(36,0)+
      '<g class="plod" style="animation-delay:.25s"><ellipse cx="0" cy="8" rx="3.2" ry="4" fill="#241a12"/><rect x="-2.4" y="11" width="4.8" height="15" rx="1.5" fill="#241a12"/><rect x="-2.4" y="25" width="2.2" height="11" fill="#241a12"/><rect x="0.4" y="25" width="2.2" height="11" fill="#241a12"/></g>'+
    '</g>'+
    '<rect id="jVeil" width="700" height="200" fill="#0a1226" opacity="'+p.veil+'"/>'+
  '</svg>';
}
function regionMap(){
  const d=nextCity(); if(!d)return '';
  const itin=((!S.routeChosen && !S.returning) ? MAIN1.concat(MAIN2) : S.itin), n=itin.length, x0=14, x1=306, span=x1-x0;
  // geographic: east (frac 0) on the RIGHT, west (frac 1) on the LEFT — independent of travel direction
  const xf=(frac)=> x1 - span*clamp(frac,0,1);
  const terrCol={settled:'#6a5630',steppe:'#5a6a3a',desert:'#caa66a',harsh:'#a8763e',mountain:'#7a7488'};
  let segs='';
  for(let i=0;i<n-1;i++){ const passed = S.returning ? (i>=S.idx) : (i<S.idx); segs+='<line x1="'+xf(itin[i].frac)+'" y1="30" x2="'+xf(itin[i+1].frac)+'" y2="30" stroke="'+(terrCol[itin[i+1].terr]||'#888')+'" stroke-width="3" '+(passed?'opacity=".4"':'')+'/>'; }
  let nodes='';
  for(let i=0;i<n;i++){
    const x=xf(itin[i].frac), here=i===S.idx;
    const future = S.returning ? (i>S.idx) : (i>S.idx); // cities still ahead are hollow either way
    const passed = S.returning ? (i<S.idx) : (i<S.idx);
    nodes+='<circle cx="'+x+'" cy="30" r="'+(here?4:2.6)+'" fill="'+(future?'none':'var(--silk)')+'" '+(future?'stroke="var(--line)" stroke-width="1.3"':'')+' '+(passed?'opacity=".45"':'')+'/>';
  }
  const lab=(frac,anchor,txt,cls)=>'<text x="'+xf(frac)+'" y="46" fill="'+(cls||'var(--dim)')+'" font-size="9.5" font-family="Georgia,serif" text-anchor="'+anchor+'">'+txt+'</text>';
  // endpoints by geography: easternmost (frac 0) anchored right, westernmost (frac 1) anchored left
  let east=itin[0], west=itin[0]; for(const c of itin){ if(c.frac<east.frac)east=c; if(c.frac>west.frac)west=c; }
  let labels=lab(east.frac,'end',east.name)+lab(west.frac,'start',west.name);
  if(itin[S.idx]!==east && itin[S.idx]!==west) labels+=lab(itin[S.idx].frac,'middle',itin[S.idx].name,'var(--silk)');
  const frac=clamp(S.legKm/(legDist()||1),0,1);
  const mx=xf(city().frac + (d.frac-city().frac)*frac);
  return '<svg class="regionmap" viewBox="0 0 320 56" xmlns="http://www.w3.org/2000/svg">'+
    '<text x="14" y="12" fill="var(--dim)" font-size="8" font-family="Georgia,serif">west</text>'+
    '<text x="306" y="12" fill="var(--dim)" font-size="8" font-family="Georgia,serif" text-anchor="end">east</text>'+
    segs+nodes+labels+
    '<g id="jMark" transform="translate('+mx+',30)"><path d="M0 -7 L5 0 L0 7 L-5 0 Z" fill="var(--seal)"/></g>'+
  '</svg>';
}
function updateJourney(){
  if(!S)return;
  renderStats(); renderLog();
  const d=nextCity(); if(!d)return;
  const set=(id,a,v)=>{const e=$(id);if(e)e.setAttribute(a,v);};
  const setT=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  const p=SKY[skyPhase()];
  set('skyTop','stop-color',p.t); set('skyBot','stop-color',p.b);
  set('jSun','opacity',p.sun); set('jMoon','opacity',p.moon);
  set('jStars','opacity',p.star); set('jVeil','opacity',p.veil);
  const pct=clamp(S.legKm/(legDist()||1),0,1);
  set('jProg','style','width:'+Math.round(pct*100)+'%');
  const x0=14,x1=306,span=x1-x0, xf=fr=>x1-span*clamp(fr,0,1);
  set('jMark','transform','translate('+xf(city().frac+(d.frac-city().frac)*pct)+',30)');
  setT('jDay','Day '+S.day);
  setT('jRemain',(S.dash&&S.dash.hidden)?'??? to '+d.name:fmtDist(Math.max(0,legDist()-S.legKm))+' to '+d.name);
}

const TAV_INTRO="Three regulars hold the long table. <b>Diogenes</b>, a lean Greek with a tongue like a flensing-knife, who holds every man a fool and most of them hypocrites, and says so. <b>Nithard</b>, a big Frank gone grey in the saddle, who reckons the world belongs to whoever is strong enough to take it and feels no need to apologise for it. And <b>Kanat</b> the Khwarazmian, careful and exact, forever asking what would follow if every man did as you propose. They are arguing, as ever — just now over <b>bukhts</b> — and shove out a stool for a fourth opinion.";
const TOPICS={
 bukht:{trig:['bukht','hybrid'],t:"\u201cA <b>bukht</b>,\u201d he says, \u201cis what you get crossing a one-humped <b>dromedary</b> on a two-humped <b>bactrian</b>. Carries more than either, complains less, and minds neither the burning <b>desert</b> nor the high cold. Worth every coin \u2014 if you can find one.\u201d"},
 animals:{trig:['animal','camel','bactrian','dromedary','mule','donkey','horse','beast','herd','livestock'],t:"\u201cYou buy your <b>mounts</b> and pack-beasts at the livestock market \u2014 <b>bactrians</b> for the cold, <b>dromedaries</b> for the sand, mules for the mountains, horses to outrun trouble. But mind: you can only drive as many as your people can <b>herd</b>. A big caravan wants more hands.\u201d"},
 mounts:{trig:['mount','mounts','riding','horse'],t:"\u201cA <b>horse</b> under a man is worth six on foot when the <b>bandits</b> come \u2014 you can run, or you can ride them down. But beasts are only as many as your <b>guards</b> and drivers can manage.\u201d"},
 guards:{trig:['guard','soldier','sellsword','mercenary'],t:"\u201cHire <b>guards</b> in any town \u2014 fighting men who take a deposit and a daily wage on the road. The richer your <b>caravan</b>, the more they charge to mind it \u2014 and the more tempted they are to help themselves if your purse runs dry. Pay them.\u201d"},
 water:{trig:['water','well','thirst','skins'],t:"\u201c<b>Water</b> is the whole of life past the last well. The deep <b>desert</b> drinks it out of you and your <b>animals</b> both; run dry out there and the road keeps you. Fill the skins at every <b>caravanserai</b> and don\u2019t be proud about it.\u201d"},
 food:{trig:['food','provision','grain','starve','hunger','eat'],t:"\u201c<b>Food</b> you lay in at any town, or you <b>hunt</b> for it on the march. Run the larder empty and the whole company starves \u2014 and starving men walk slow and die easy.\u201d"},
 hunting:{trig:['hunt','hunter','game','bear','lion','quarry'],t:"\u201cSend a <b>hunter</b> out and he may bring back a week of meat \u2014 or wake a bear and not come back at all. Green lads get themselves eaten; old hands rarely miss. Send the green ones anyway, sometimes \u2014 it\u2019s how they learn.\u201d"},
 furs:{trig:['fur','coat','cloak'],t:"\u201c<b>Furs</b>? Cheap here off the Rus boats, dear in the hot south. And hear me \u2014 buy <b>fur coats</b> for your people even if you\u2019re bound for the <b>desert</b>. There are mountains between here and anywhere, and the high passes have killed more traders than all the <b>bandits</b> of the steppe.\u201d"},
 caravanserai:{trig:['caravanserai','serai','rest-house','inn'],t:"\u201cA <b>caravanserai</b> is a walled rest-house. Lay up a few days and you leave watered, healed, and warier \u2014 the road runs the safer for a week after. Cheap insurance.\u201d"},
 bandits:{trig:['bandit','raider','robber','brigand'],t:"\u201c<b>Bandits</b>. Travel rich and you travel watched \u2014 the fatter the purse, the harder they fight for it. Beat them and they grow wary but come in greater numbers; run, and they smell weakness and grow thick as flies. Good <b>guards</b>, my friend.\u201d"},
 sea:{trig:['sea','ship','monsoon','wind','voyage','sail','boat'],t:"\u201cThe <b>sea</b> road is faster and stranger. But the deep crossings answer to the <b>monsoon</b> \u2014 the summer wind drives you toward the sunrise, the winter wind back \u2014 and a ship that sails against it sails nowhere. You sell your beasts to take ship, and buy fresh at the far end.\u201d"},
 slaves:{trig:['slave','slaves','captive'],t:"At the word the table goes still a breath. <b>Nithard</b> only shrugs: “The strong have always taken the weak; pretend otherwise and you lie to no one but yourself.” <b>Kanat</b> sets down his cup: “And would you have it done to you, friend? What cannot be wished upon all men cannot be right for any one of them.” <b>Diogenes</b> laughs into his wine: “Listen to the wolf and the judge — and both of them buying and selling all the same. At least the <b>souls</b> in your coffle know exactly what they are.”"},
 silk:{trig:['silk'],t:"\u201c<b>Silk</b> goes west and turns to gold \u2014 cheap in Cathay, a fortune by the time it reaches the Romans. The whole road is named for it.\u201d"},
 tea:{trig:['tea'],t:"\u201c<b>Tea</b> \u2014 bricks of it, near as good as coin in the east, near worthless out west where no one\u2019s learned to want it yet. Buy low, carry far.\u201d"},
 spice:{trig:['spice','pepper','cinnamon','nutmeg','cinn'],t:"\u201c<b>Pepper</b> and the spices come up out of India on the <b>monsoon</b> \u2014 light to carry, heavy with profit, if you can get them north before everyone else does.\u201d"},
 jade:{trig:['jade'],t:"“<b>Jade</b> — the Khotanese fish it out of two rivers and the Tang go mad for it. Buy it cheap in the south, and don’t drop it.”"},
 diogenes:{trig:['diogenes','cynic'],t:"<b>Diogenes</b> looks you up and down. “You haul all that silk to be thought a great man in a city you will likely die before you reach. I own a cup, a cloak, and the freedom to laugh at kings. Tell me again which of us is the rich one.”"},
 nithard:{trig:['nithard','frank'],t:"<b>Nithard</b> grins, all teeth. “There is no luck on the road — only the strong and the slow. Be the first, or feed the second. Even the wind gives way to a man who will not be moved.”"},
 masteran:{trig:['master an','an the','sogdian factor','caravan-master'],t:"<b>Master An</b>, an old Sogdian factor of the Western Market, smiles thinly. “My people keep the accounts of the world from here to Samarkand. Wars come, dynasties fall — and still the <b>silk</b> must move, and someone must be trusted to move it. Trade is the only peace that ever held between strangers. Mind your ledger and your word; out here they are the same thing.”"},
 geshu:{trig:['geshu','soldier','veteran','garrison'],t:"<b>Geshu the Elder</b>, a scarred frontier soldier, snorts into his cup. “I held the Jade Gate twelve years. The road does not care for your cleverness, merchant — only whether your skins are full and your <b>guards</b> sober. <b>Water</b> first, then steel, then everything else. The <b>desert</b> has buried wiser men than you for forgetting the order.”"},
 yun:{trig:['yun','daoist','recluse'],t:"The <b>Daoist Yun</b> barely opens his eyes. “The rigid road breaks; the yielding road endures. <b>Water</b> goes around the mountain and wears it down in the end. Do not force the <b>pass</b> when the pass says no. The wise trader, like water, finds the low way through.”"},
 kanat:{trig:['kanat','khwarazm'],t:"<b>Kanat</b> nods, exact. “Act only as you would have every trader on this road act. Cheat one caravanserai and you have argued that all men may cheat you. The honest road is the only one that does not, in the end, devour itself.”"}
};
function findTopic(q){ q=(q||'').toLowerCase(); for(const k in TOPICS){ for(const w of TOPICS[k].trig){ if(q.indexOf(w)>=0) return k; } } return null; }
function exportLog(){ if(!S)return; var L=[]; L.push('=== The Silk Road, 762 — run-log export (v'+VERSION+') ==='); L.push('Day '+S.day+(S.itin&&S.itin[S.idx]?' · at '+S.itin[S.idx].name:'')+' · dir '+(S.dir||1)+' · silver '+Math.round(S.silver)+' · hp '+Math.round(S.hp)); L.push('Party: '+(['(you) '+(S.name||'')].concat((S.party||[]).map(function(pp){return pp.name+(pp.role?(' — '+pp.role):'')+(pp.alive===false?' [DEAD]':'')+(pp.kind?(' <'+pp.kind+'>'):'')+(pp.deposit?(' dep'+pp.deposit):'');})).join('  |  '))); L.push('Guards now: '+(S.party||[]).filter(function(pp){return pp.alive&&pp.kind==='guard';}).length+' · wageDebt '+(S.wageDebt||0)+' · stiffed '+JSON.stringify(S.stiffed||{})+' · released '+JSON.stringify(Object.keys(S.released||{}))); L.push('Herd '+JSON.stringify(S.herd||{})+' · cargo '+(typeof cargoW==='function'?cargoW():'?')+'/'+(typeof cargoCap==='function'?cargoCap():'?')); L.push('Goods '+JSON.stringify(S.goods||{})); L.push(''); L.push('--- event log (oldest first) ---'); var src=(S.fullLog&&S.fullLog.length)?S.fullLog:(S.log||[]).slice().reverse(); src.forEach(function(e){ L.push('d'+e.d+': '+String(e.t).replace(/<[^>]+>/g,'')); }); var txt=L.join('\n'); try{ var b=new Blob([txt],{type:'text/plain'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='silkroad_runlog_day'+S.day+'.txt'; document.body.appendChild(a); a.click(); a.remove(); }catch(e){ S.pendingEvent={h:'RUN-LOG (copy this)', t:'<textarea readonly style="width:100%;height:320px;font-size:11px">'+txt.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</textarea>', ch:[{l:'Close',f:function(){}}]}; render(); } }
function tavAsk(){ var el=document.getElementById('asktopic'); var q=el?(el.value||''):''; if(/chronicle|scribe|run-?log|export|debug/.test((q||'').toLowerCase())){ S.debugExport=true; S.tavTraderLine="<b>The scribe</b> in the corner looks up. “Your whole chronicle, copied fair to carry where you will? Aye — it is yours.” <span class='sub'>(An <b>Export run-log</b> button now sits on your city screen.)</span>"; if(el)el.value=''; render(); return; } if(/beware of kal durak/.test((q||'').toLowerCase())){ S._ptArmed=true; S.tavTraderLine="The trader goes very still. \u201cThat is a name from another road,\u201d he says, low. \u201cIf you truly know it, then say what you came to say.\u201d"; if(el)el.value=''; render(); return; } if(S._ptArmed && /playtest/.test((q||'').toLowerCase())){ S.playtest=true; S.debugExport=true; S._ptArmed=false; S.tavTraderLine="<b>Playtest mode unlocked.</b> <span class='sub'>A green debug bar now rides atop the screen \u2014 heal &amp; resupply, add silver, and export the run-log at will.</span>"; if(el)el.value=''; render(); return; } if(S.playtest && /teleport/.test((q||'').toLowerCase())){ S.screen='teleport'; if(el)el.value=''; render(); return; } var k=findTopic(q);
  if(k){ S.tavTraderLine=TOPICS[k].t; } else { S.tavTraderLine="<b>Diogenes</b> spreads his hands. “Never heard of it. Ask us of a <b>bukht</b>, or <b>silk</b>, or <b>water</b>, or <b>guards</b> — the things a man lives or dies by out here. The rest is philosophy, and we have a surplus of that at this table.”"; }
  if(el)el.value=''; render(); }
function renderTavern(m){

  if(!S.onceFlags.lostTraderSeen){ S.onceFlags.lostTraderSeen=true; }
  const scene="<p>You duck under the low lintel of <b>The Lost Trader\u2019s Tavern</b>, hard by the Golden Horn where the masts crowd thick as a winter wood. Lamplight, woodsmoke, and the reek of a hundred ports; a long room of Greeks and Rus, Sogdians and Jews and sun-blacked sailors, all talking at once in a dozen tongues. Behind the counter, <b>Quraq</b> \u2014 a small, sharp, big-eared man who has never once been seen to sleep \u2014 polishes a cup he has polished a thousand times, and misses nothing.</p>";
  let menu='<div style="margin:10px 0">'+
    '<button onclick="tavRecruit()">Take a table \u2014 hire, and hear the news</button> '+
    '<button onclick="tavGo(\'plaques\')">Read the brass plaques on the wall</button> '+
    '<button onclick="tavGo(\'talk\')">Listen to the talk of the room</button> '+
    '<button onclick="tavGo(\'chariot\')">Wager on the chariot races</button> '+
    '<button onclick="tavGo(\'prophet\')">Sit with the old soothsayer</button> '+
    '<button onclick="tavGo(\'trader\')">Buy old Branas a drink (1 s)</button> '+
    '<button onclick="tavGo(\'traders\')">Join the traders\u2019 table</button> '+

    '</div>';
  let body='';

  if(v==='plaques'){ body='<div class="panel"><p class="sub">Brass plaques screwed to the smoke-dark beams, each cut with the name and fate of a trader who drank here. Quraq keeps the list himself.</p><div id="board"></div></div>'; }
  else if(v==='talk'){ if(!S.tavTalkLine)S.tavTalkLine=tavTalk(); body='<div class="panel"><p>'+S.tavTalkLine+'</p><button onclick="S.tavTalkLine=tavTalk();render()">Catch another thread of talk</button></div>'; }
  else if(v==='chariot'){ body='<div class="panel"><p>The whole city lives and dies by the Hippodrome. Tomorrow the <b style="color:#5a8f5a">Greens</b> meet the <b style="color:#6a8fcf">Blues</b>, and there is not a man in here without an opinion and a coin on it. Name your stake and your faction; the card runs tomorrow, and you\u2019ll know the result when you leave.</p>'+
      (S.tavBet?('<p class="gold">You have '+S.tavBet.amt+' s riding on the '+S.tavBet.team+'.</p>'):('<p>Stake: <input type="number" id="betamt" value="20" min="1" style="width:80px"> s &nbsp; <button onclick="placeTavBet(\'Greens\')">On the Greens</button> <button onclick="placeTavBet(\'Blues\')">On the Blues</button></p>'))+
      (S.tavMsg?('<p class="sub">'+S.tavMsg+'</p>'):'')+'</div>'; }
  else if(v==='prophet'){ if(!S.tavProphLine)S.tavProphLine=tavProphecy(); body='<div class="panel"><p class="sub">In the corner farthest from the fire sits a ragged figure the regulars wave off with a laugh \u2014 mad old So-and-so, they say, harmless. The eyes that lift to yours are perfectly clear.</p><p style="font-style:italic">\u201c'+S.tavProphLine+'\u201d</p><button onclick="S.tavProphLine=tavProphecy();render()">Ask another question</button></div>'; }
  else if(v==='trader'){ body='<div class="panel"><p class="sub">Old Branas has forgotten more roads than you will ever ride, and will share them for the price of a cup. He is already three-quarters of the way to useless, but the first cups buy the best counsel.</p>'+
      (S.traderMsg?('<p>'+S.traderMsg+'</p>'):'<p class="sub">He raises an empty cup and looks at you hopefully.</p>')+
      '<button onclick="buyTraderDrink()" '+((S.silver<1)?'disabled':'')+'>Buy him a cup (1 s)</button></div>'; }
  else if(v==='traders'){ body='<div class="panel"><p class="sub">A knot of caravan-men argue trade at the long table, and shift to make you room.</p><p>'+(S.tavTraderLine||TAV_INTRO)+'</p>'+
      '<div style="margin-top:8px"><input type="text" id="asktopic" placeholder="type a topic \u2014 a trade good, or a word in bold" style="width:60%" onkeydown="if(event.key===\'Enter\')tavAsk()"> <button onclick="tavAsk()">Ask</button></div>'+
      '<p class="sub" style="margin-top:4px">Ask them about anything: a good (silk, furs, slaves\u2026) or the life of the road (guards, water, food, mounts, bandits, caravanserai\u2026). The words they stress are the ones worth asking after.</p></div>'; }
  else if(v==='facilities'){ var gg=(GRAFFITI||[]).slice(0,30); body='<div class="panel"><p class="sub">A plank seat over a brick channel that carries everything, in the end, down to the Horn. The whitewashed walls are a palimpsest of every trader who ever sat here \u2014 names, boasts, prayers, filth, and the odd line of real poetry. There is a charred stick for writing.</p>'+
      '<div class="log" style="height:auto;max-height:220px;font-style:italic">'+gg.map(x=>'<div>\u201c'+(x.text||'')+'\u201d <span class="sub" style="font-style:normal">\u2014 '+(x.name||'a hand unknown')+'</span></div>').join('')+'<div>\u16ba\u16a8\u16da\u16a0\u16d6\u16b1 \u2014 <span class="sub" style="font-style:normal">\u201cHalfdan wrote these runes.\u201d</span></div></div>'+
      '<div style="margin-top:8px"><input type="text" id="graffititext" maxlength="140" placeholder="leave your mark\u2026" style="width:70%"> <button onclick="tavWriteGraffiti()">Scratch it on the wall</button></div></div>'; }
  m.innerHTML='<h2>The Lost Trader\u2019s Tavern <span class="sub">\u00b7 Constantinople, on the Golden Horn</span></h2>'+scene+menu+body+
    '<div style="margin-top:10px"><button class="seal" onclick="leaveTavern()">Settle up and go (a day passes)</button></div>'+

function originWeapon(p){ var t=(((p&&p.role)||'')+' '+((p&&p.name)||'')).toLowerCase(); var reg=(p&&p.region)||''; var fc=(p&&p.fromCity)||'';
  if(/norse|axeman|varangian|northman|viking|red-bearded/.test(t)) return 'battleaxe';
  if(/frank|lombard|saxon/.test(t)) return 'sword';
  if(/turk|qarluq|qarluk|uygh|kirghiz|karluk|tatar|khazar|pecheneg|steppe|nomad|tiele|onok/.test(t)) return 'saber';
  if(/tang|chinese|\bhan\b|tibet|cathay/.test(t)) return 'dao';
  if(/greek|roman|byzantine|anatolian|armenian|cappadocian|rhom/.test(t)) return 'spatha';
  if(/persian|arab|sogdian|daylam|khurasan|khorasan|kurd|saracen|bukhar|samarkand|yemen|omani|hadrami|bedouin/.test(t)) return 'saif';
  if(/malay|srivijaya|java|cham|khmer|pilot of the/.test(t)) return 'spear';
  if(/zanj|swahili|african|abyssin|nubian/.test(t)) return 'spear';
  var rmap={china:'dao',steppe:'saber',arab:'saif',egypt:'saif',india:'saif',africa:'spear',seasia:'spear'};
  if(rmap[reg]) return rmap[reg];
  if(/Constantinople|Ephesus|Gortyn|Alexandria|Trebizond|Chalcedon/.test(fc)) return 'spatha';
  if((typeof GUARD_CITY_REGION!=='undefined') && GUARD_CITY_REGION[fc] && rmap[GUARD_CITY_REGION[fc]]) return rmap[GUARD_CITY_REGION[fc]];
  return 'saif'; }

function defaultSimpleWeapon(p){
  if(!p) return {label:'staff', die:6};
  if(p.bard) return {label:'sharp words', die:6};
  var t=(p.role||'').toLowerCase(), sk=p.skills||{};
  if(/malay|srivijaya|pilot of the|java|\\bcham\\b/.test(t)) return {label:'parang', die:6};
  if(/sailor|boatman|reef|strait|\\bpilot\\b|swahili|zanj|salt/.test(t)) return {label:'long knife', die:6};
  if(/physician|leech|doctor|healer|medic|surgeon/.test(t)) return {label:'staff', die:6};
  if(/cook|kitchen/.test(t)) return {label:'kitchen knife', die:6};
  if((sk.hunt||0)>=2 && (sk.hunt||0)>=(sk.fight||0)) return {label:'hunting spear', die:6};
  if(/scout|hunter|archer|tracker/.test(t)) return {label:'hunting spear', die:6};
  if((sk.cook||0)>=2 && (sk.cook||0)>(sk.trade||0)) return {label:'kitchen knife', die:6};
  return {label:'staff', die:6};
}

function battleStep(){

  });

  var _you=c.stayers.find(function(f){return f.you;}); if(_you && _you.cHP<=0 && !c.youFell){ c.youFell=true; var _oth=c.stayers.filter(function(f){return !f.you && f.alive && f.cHP>0;}); if(_oth.length){ var _h=_oth.find(function(f){return f.ref&&f.ref.nephew;}); c.L.push('<span class="red">You are cut down. '+(_h?cbName(_h)+' takes up the fight':'Your people close ranks and fight on')+'.</span>'); } else { c.L.push('<span class="red">You are cut down, and the last of your people with you.</span>'); return battleFinish('loss'); } }

  if(!bs2.length){ c.L.push('<span class="green">The last is down. The field is yours.</span>'); return battleFinish('win'); }
  if(!ps2.length){ c.L.push('<span class="red">The last of your side falls. They take the field.</span>'); return battleFinish('loss'); }

  if(hpLost>=c.moraleFrac*c.startHP){ c.L.push('<span class="green">The foe have taken all the punishment they will stomach — they break and scatter.</span>'); return battleFinish('win'); }
  if(c.round>=40){ c.L.push('An exhausted, bloody stalemate; both sides pull apart.'); return battleFinish('draw'); }

function battleFinish(outcome){

  if(sea){ S.seaCrew=(c.stayers||[]).filter(function(f){return f.sailor && f.cHP>0;}).length; }

    if(sea){ S.goods.slaves=0; S.basis.slaves=0; if(S.souls)S.souls=[]; if(L)L.push('<span class="gold">The pirates cut your slave-coffle loose and put them over the side for the shore \u2014 one cargo they will not sell back to a slaver.</span>'); }

      log("The fight goes against you, and when the arms come down the bandits find the coffle. A man who deals in people is people who can be dealt in: they strike the irons off your captives and onto you, and march you off in your own column. Your road ends here."); die(); S.screen='dead'; render(); return; } }

  });

  if(outcome==='surrender'){ var toll=Math.min(S.silver, Math.round(S.silver*0.5)+(c.loot||0)); S.silver-=toll; var _took=0; for(var _gi=0;_gi<GOODS.length;_gi++){ var _g=GOODS[_gi]; var _h=S.goods[_g.id]||0; if(_h>0){ var _keep=Math.floor(_h*0.10); _took+=(_h-_keep); S.goods[_g.id]=_keep; if(_keep<=0)S.basis[_g.id]=0; } } L.push('<span class="red">They strip '+toll+'s and the better part of the cargo \u2014 some '+_took+' '+(_took===1?'unit':'units')+' of goods, leaving only the scraps they could not be bothered to carry \u2014 and ride off.</span>'); }
  if(outcome==='win'){ banditRep(0.90,1); }
  else if(outcome==='flee'||outcome==='loss'){ banditRep(1.10,-1); }
  deaths.forEach(function(p){ p.alive=false; if(typeof noteDeath==='function') noteDeath(p, foe); });

  central:[['weapon','saber',42],['armor','leather',26],['armor','lamellar',95],['bow','recurve',58],['cloak','fur',40]],
  east:[['weapon','dao',44],['armor','leather',26],['armor','lamellar',88],['bow','recurve',52],['cloak','fur',34]],
  sea:[['weapon','saif',52],['armor','leather',34],['bow','bow',30]],
};
function cityKit(name){ return CB_KIT[cbCityRegion(name)]||CB_KIT.central; }
function openOutfitter(){ if(!S||S.dead||!city())return; S.screen='outfitter'; if(S.kitTarget==null)S.kitTarget='you'; render(); }
function kitEquipBag(idx){ var it=(S.baggage||[])[idx]; if(!it)return; var g=kitTargetGear(); if(!g)return; g[it.slot]=it.id; S.baggage.splice(idx,1); log('<b>'+kitTargetName()+'</b> takes up '+gLabel(it.slot,it.id)+' from the baggage.'); render(); }
function reconcileMounts(){ if(!S)return; var horses=(S.herd&&S.herd.horse)||0; var used=mountsUsed(); if(used<=horses)return; var lp=livingParty(); for(var i=lp.length-1;i>=0 && used>horses;i--){ if(lp[i].mount){ lp[i].mount=false; used--; } } if(used>horses && S.youMount){ S.youMount=false; used--; } }
function mountsUsed(){ return (S.youMount?1:0) + livingParty().filter(function(p){return p.mount;}).length; }
function targetMounted(){ return (S.kitTarget==='you')?!!S.youMount:!!(livingParty()[S.kitTarget]&&livingParty()[S.kitTarget].mount); }
function kitMount(){ var horses=(S.herd&&S.herd.horse)||0; if(targetMounted()){ if(S.kitTarget==='you')S.youMount=false; else if(livingParty()[S.kitTarget])livingParty()[S.kitTarget].mount=false; log(kitTargetName()+' gives up the saddle; the horse goes back to the string.'); } else if(mountsUsed()<horses){ if(S.kitTarget==='you')S.youMount=true; else if(livingParty()[S.kitTarget])livingParty()[S.kitTarget].mount=true; log(kitTargetName()+' takes a horse to ride \u2014 worth six men in a fight, on open ground.'); } else { log('You have no spare horse to give. Buy more at the livestock market.'); } render(); }
function kitTargetGear(){ return (S.kitTarget==='you')? youGear() : (livingParty()[S.kitTarget]? (livingParty()[S.kitTarget].gear||(livingParty()[S.kitTarget].gear={armor:null,bow:null,weapon:null,cloak:null})) : youGear()); }
function kitTargetName(){ return (S.kitTarget==='you')? (S.name||'You') : (livingParty()[S.kitTarget]? livingParty()[S.kitTarget].name.split(',')[0] : 'You'); }
function setKitTarget(t){ S.kitTarget=t; render(); }
function armorResale(id){ var c=city(); var k=(c&&typeof cityKit==='function')?cityKit(c.name):[]; for(var i=0;i<k.length;i++){ if(k[i][0]==='armor'&&k[i][1]===id) return Math.round(k[i][2]*0.5); } var fb={leather:12,lamellar:42,mail:62}; return fb[id]||Math.round(((ARMOR[id]&&ARMOR[id].hp)||1)*18); }
function kitBuy(slot,id,price){
  if(S.silver<price){ log('You cannot spare the '+price+' s for '+gLabel(slot,id)+'.'); render(); return; }
  var g=kitTargetGear(); var had=g[slot];
  if(had===id){ log(kitTargetName()+' already carries '+gLabel(slot,id)+'.'); render(); return; }
  S.silver-=price; g[slot]=id;
  if(slot==='armor' && had){
    var oldL=gLabel('armor',had), resale=armorResale(had), cands=[];
    livingParty().forEach(function(pp){ if(pp!==kitTargetMember() && (!pp.gear||!pp.gear.armor)) cands.push({nm:pp.name.split(',')[0], set:(function(q){return function(){ if(!q.gear)q.gear={armor:null,bow:null,weapon:null,cloak:null}; q.gear.armor=had; };})(pp)}); });
    if(S.kitTarget!=='you' && !youGear().armor) cands.push({nm:(S.name||'You'), set:function(){ youGear().armor=had; }});
    log(kitTargetName()+' is outfitted with '+gLabel('armor',id)+' ('+price+' s).');
    if(cands.length){
      var ch=cands.map(function(cc){ return {l:'Give the '+oldL+' to '+cc.nm, f:(function(x){return function(){ x.set(); log('The old '+oldL+' goes to '+x.nm+'.'); };})(cc)}; });
      ch.push({l:'Sell it back for '+resale+' s', f:function(){ S.silver+=resale; log('The old '+oldL+' is sold back for '+resale+' s.'); }});
      S.pendingEvent={h:'THE OLD KIT', t:'What of the '+oldL+' '+kitTargetName()+' set aside?', ch:ch};
    } else { S.silver+=resale; log('The old '+oldL+' is sold back for '+resale+' s.'); }
    render(); return;
  }
  log(kitTargetName()+(slot==='weapon'?' takes up ':slot==='bow'?' is fitted with ':' is outfitted with ')+gLabel(slot,id)+' ('+price+' s)'+(had?', setting aside '+gLabel(slot,had):'')+'.');
  render();
}
function renderOutfitter(m){
  var c=city(); if(!c){ S.screen='city'; render(); return; }

  var tabs=people.map(function(pr){ return '<button '+(S.kitTarget==pr[0]?'class="seal" ':'')+'onclick="setKitTarget('+(pr[0]==='you'?'\'you\'':pr[0])+')">'+pr[1]+'</button>'; }).join(' ');
  var g=kitTargetGear();
  var slots=['weapon','armor','bow','cloak'].map(function(sl){ var val=g[sl]?gLabel(sl,g[sl]):(sl==='weapon'?'<span class="sub" style="font-style:italic">— '+defaultSimpleWeapon(kitTargetMember()).label+' —</span>':'<span class="sub">— none —</span>'); return '<tr><td class="sub">'+sl+'</td><td>'+val+'</td></tr>'; }).join('');
  var _hf=((S.herd&&S.herd.horse)||0)-mountsUsed();
  var _mc=targetMounted()?'\ud83d\udc0e mounted &nbsp;<button onclick="kitMount()">return the horse</button>':(_hf>0?'<button onclick="kitMount()">give a riding horse</button> <span class="sub">('+_hf+' free)</span>':'<span class="sub">\u2014 no spare horse (buy at the livestock market) \u2014</span>');
  slots+='<tr><td class="sub">mount</td><td>'+_mc+'</td></tr>';
  function _irank(slot,id){ if(slot==='armor')return (ARMOR[id]&&ARMOR[id].hp)||0; if(slot==='weapon')return ((WEAPONS[id]&&WEAPONS[id].die)||0)+((WEAPONS[id]&&WEAPONS[id].fs)||0); if(slot==='bow')return (BOWS[id]&&BOWS[id].hs)||0; return 0; }
  var kit=cityKit(c.name).filter(function(it){ var cur=g[it[0]]; return (!cur)||(cur===it[1])||(_irank(it[0],it[1])>_irank(it[0],cur)); }).map(function(it){
    var slot=it[0],id=it[1],price=it[2];

  }).join('');
  m.innerHTML='<div class="panel"><h2>The Outfitter <span class="sub">· '+c.name+'</span></h2>'+
   '<p class="sub">Weapons set each fighter’s damage; armour adds staying power; a bow lets a hunter’s eye tell in the opening exchange; a fur coat wards the high passes. Stock and prices vary with the country. You hold <span class="gold">'+Math.round(S.silver)+' s</span>.</p>'+
   '<p><b>Outfit:</b> '+tabs+'</p>'+
   '<table><tr><th>'+kitTargetName()+'’s kit</th><th></th></tr>'+slots+'</table>'+
   '<table style="margin-top:8px"><tr><th>for sale here</th><th style="text-align:right">price</th><th></th></tr>'+kit+'</table>'+
   ((S.baggage&&S.baggage.length)?'<table style="margin-top:8px"><tr><th>from the caravan baggage</th><th></th></tr>'+S.baggage.map(function(it,bi){return '<tr><td>'+gLabel(it.slot,it.id)+' <span class="sub">('+it.slot+')</span></td><td style="text-align:right"><button onclick="kitEquipBag('+bi+')">equip</button></td></tr>';}).join('')+'</table>':'')+'<div style="margin-top:10px"><button class="seal" onclick="S.screen=\'city\';render()">Back to '+c.name+'</button></div></div>';
}

function cloakFrac(){ var n=1, c=(youGear().cloak?1:0); livingParty().forEach(function(p){ n++; if(memGear(p,'cloak')) c++; }); return n?c/n:0; }
function coldShield(){ return cloakFrac(); }
/* ============================================================
   HOMELAND HUNTING — terrain affinity helpers
   ============================================================ */
function huntSuit(p,terr){
  // returns {findAdd, dangerMul, rank} — highlanders shine in the mountains, desert-folk flounder there (and vice-versa)
  var mtn=!!(p&&p.mountainwise), des=!!(p&&p.desertwise);
  if(terr==='mountain'){ if(mtn) return {findAdd:0.20,dangerMul:0.45,rank:3}; if(des) return {findAdd:-0.18,dangerMul:1.9,rank:-3}; }
  else if(terr==='desert'||terr==='harsh'){ if(des) return {findAdd:0.15,dangerMul:0.55,rank:3}; if(mtn) return {findAdd:-0.10,dangerMul:1.35,rank:-2}; }
  return {findAdd:0,dangerMul:1,rank:0};
}
function pickHunter(terr){
  var lp=livingParty(); if(!lp.length) return null;
  return lp.reduce(function(best,p){
    var s=(p.skills&&p.skills.hunt||0)+huntSuit(p,terr).rank;
    var bs=(best.skills&&best.skills.hunt||0)+huntSuit(best,terr).rank;
    return s>bs?p:best;
  });
}

function karlukEra(){ return gameDate().t >= Date.UTC(766,5,1); }   // Karluks take Kashgar 766-775
function kashgarDesc(c){
  if(karlukEra()){
    return "Kashgar, where the Pamir, the Tian Shan and the Taklamakan all but touch — and the banners over the gate are new. The Karluk yabgu’s horsemen hold the town now, having pushed out the last Tang and Tibetan claims; the bazaar runs as it always has, jade and felt and fat-tailed sheep, but the tolls are taken in a Turkic tongue and paid to new masters.";
  }
  return "Kashgar, where the Pamir, the Tian Shan and the Taklamakan all but touch — a great knot of a market-town at the western edge of the Tang reach, its loyalties divided between the Son of Heaven far to the east, the Tibetans in the south, and the Turk lords of the steppe. Jade from Khotan, felt, and fat-tailed sheep change hands under a hundred dialects.";
}
function kashgarKarlukEvent(){
  return {h:'NEW BANNERS OVER KASHGAR', t:"You happen into Kashgar in the season the Karluks make it theirs. There is no great battle in the streets — only a changing of the men at the gate, a new yabgu’s riders watering their horses at the canals, and the old Tang garrison-flags coming down without ceremony. The caravan-masters shrug; tolls are tolls, whoever takes them. But a careful trader notes the shift: the road west to Ferghana answers to the steppe now, not to Chang’an.",
   ch:[{l:'Note it in the ledger and trade on',f:function(){}}]};

/* ============================================================
   CHANG'AN TAVERN — The Amber Cup (Western Market wine-shop)
   ============================================================ */
const CHANGAN_TAV_INTRO="Three regulars hold the long table by the wine-jars. <b>Master An</b>, an old Sogdian factor of the Western Market, who has kept his family’s accounts through a war and trusts nothing on this earth but a clean ledger. <b>Geshu the Elder</b>, a scarred soldier home from the Jade Gate, who measures every man by his water-skins and his guards. And the <b>Daoist Yun</b>, a thin recluse who drinks more than he ought and speaks of the road as though it were a river. They are arguing, as ever — just now over the price of <b>tea</b> — and nudge out a stool for a fourth opinion.";
function changanTalk(){
  const t=gameDate().t; let topics=[];
  if(t < Date.UTC(763,1,1)) topics.push("The war in the east grinds into its eighth year. The rebel Shi Chaoyi still holds the country about Luoyang, and the Uyghur horsemen the court hired to break him plunder nearly as freely as the rebels do. Everyone in this room has lost someone, or something, or both.");
  else topics.push("They are saying it is over at last — the rebel Shi Chaoyi dead by his own hand in the snow, the eight-year ruin finished. The city hardly knows how to believe it; men weep into their wine for no reason they can name.");
  if(t >= Date.UTC(763,4,1)) topics.push("A new fear now, and a worse one: a Tibetan army gathering in the west, and the frontier forts stripped bare to feed the eastern war. The careful houses are quietly sending their silver and their daughters east. A wise trader might not linger here.");
  topics.push("The old Emperor died this year; his son holds the Mandate now, in a capital still sweeping up its own ashes. Tribute embassies come up Vermilion Bird Avenue thinner than they did — but they come.");
  topics.push("Word is the great drunkard-poet Li Bai is newly dead down south — drowned, the romantics say, reaching from a boat for the moon’s reflection; of a rotted liver, say the people who actually knew him. Either way these wine-shops have lost their finest customer and their finest advertisement.");
  topics.push("The Western Market is half what the songs remember — whole rows of Sogdian and Persian shops shuttered, their masters fled or dead. Yet the jade still comes down from Khotan and the tea still comes up from the south, and a bold man with goods does very well in a thin market.");
  topics.push("Tea-bricks out of the southern hills are near as good as coin here; carry them west, though, and you’ll find no one has yet learned to want the stuff. Give it fifty years.");
  return pick(topics);
}
function renderTavernChangan(m){

  let menu='<div style="margin:10px 0">'+
    '<button onclick="tavRecruit()">Take a table — hire, and hear the news</button> '+
    '<button onclick="tavGo(\'plaques\')">Read the names lacquered on the pillar</button> '+
    '<button onclick="tavGo(\'talk\')">Listen to the talk of the market</button> '+
    '<button onclick="tavGo(\'cockfight\')">Wager on the cockfights</button> '+
    '<button onclick="tavGo(\'prophet\')">Consult the blind diviner</button> '+
    '<button onclick="tavGo(\'trader\')">Buy a road-worn factor a cup (1 s)</button> '+

  let body=''; const v=S.tavView;

  else if(v==='talk'){ if(!S.tavTalkLine)S.tavTalkLine=changanTalk(); body='<div class="panel"><p>'+S.tavTalkLine+'</p><button onclick="S.tavTalkLine=changanTalk();render()">Catch another thread of talk</button></div>'; }
  else if(v==='cockfight'){ body='<div class="panel"><p>In a corner of the market a ring of shouting men crowds a sand-pit where two birds are matched at dawn — <b style="color:#b0472f">the red cock</b>, a vicious old champion, against <b style="color:#9a9a9a">the grey</b>, a long-legged newcomer the touts favour. Name your stake and your bird; the match runs tomorrow, and you’ll know the result when you leave.</p>'+
    (S.tavBet?('<p class="gold">You have '+S.tavBet.amt+' s on '+S.tavBet.team+'.</p>'):('<p>Stake: <input type="number" id="betamt" value="20" min="1" style="width:80px"> s &nbsp; <button onclick="placeTavBet(\'the red cock\',\'cockfight\')">On the red</button> <button onclick="placeTavBet(\'the grey cock\',\'cockfight\')">On the grey</button></p>'))+
    (S.tavMsg?('<p class="sub">'+S.tavMsg+'</p>'):'')+'</div>'; }
  else if(v==='prophet'){ if(!S.tavProphLine)S.tavProphLine=tavProphecy(); body='<div class="panel"><p class="sub">A blind woman sits cross-legged on a reed mat by the door, an incense-coil smoking at her side and a handful of yarrow-stalks in her lap. The market-folk drop her coins and ask after lost caravans; her clouded eyes turn to you as though they see rather more than most.</p><p style="font-style:italic">“'+S.tavProphLine+'”</p><button onclick="S.tavProphLine=tavProphecy();render()">Ask another question</button></div>'; }
  else if(v==='trader'){ body='<div class="panel"><p class="sub">A road-worn Sogdian factor nurses an empty cup, full of routes and rumours he will trade for wine. The first cups buy the soundest counsel; after that the routes grow strange.</p>'+
    (S.traderMsg?('<p>'+S.traderMsg+'</p>'):'<p class="sub">He raises the empty cup and looks at you hopefully.</p>')+
    '<button onclick="buyTraderDrink()" '+((S.silver<1)?'disabled':'')+'>Buy him a cup (1 s)</button></div>'; }
  else if(v==='traders'){ body='<div class="panel"><p class="sub">Three regulars hold the long table by the wine-jars and shift to make you room.</p><p>'+(S.tavTraderLine||CHANGAN_TAV_INTRO)+'</p>'+

  else if(v==='facilities'){ var gg=(GRAFFITI||[]).slice(0,30); body='<div class="panel"><p class="sub">The courtyard wall behind the wine-shop is plastered white and written over by every hand that ever waited here for a caravan, a girl, or the dawn — names, verses, curses, and a few lines of real poetry left by some drunk who might have been Li Bai and almost certainly wasn’t. A stub of charcoal hangs on a string.</p>'+

/* ============================================================
   MONUMENTS — the "admire the city" tour for the two pole-hubs
   ============================================================ */
const MONUMENTS={
 'Constantinople':{
   intro:"<p>A Greek broker named Staurakios, well pleased with the morning’s bargain, does you a rare grace: he has you rowed across the strait for a day inside the walls, where caravan-men are seldom let. You will not forget it. Where do your feet take you?</p>",
   items:[
    {key:'hagia',label:'The Great Church (Hagia Sophia)',title:'Hagia Sophia — the Great Church',text:"Justinian’s Great Church, two hundred years old and still the largest enclosed space in the world. You step in beneath a dome forty paces wide that floats on a ring of windows as if hung from heaven by a golden chain; the marble runs the walls like frozen rivers, and the light comes down gold and slow and full of dust. Yet there are pale scars high up: these are the years of the image-breakers, and where saints once blazed in gold mosaic the Emperor’s men have set plain crosses and painted vines. An old verger watches them work, and will not say what he thinks."},
    {key:'hippodrome',label:'The Hippodrome',title:'The Hippodrome',text:"The great racecourse holds sixty thousand when the chariots run, and on race-days the whole city splits into Greens and Blues and screams itself hoarse. Down the central spina stands the plunder of older empires: a bronze serpent-column hauled from Delphi a thousand years ago, an Egyptian obelisk older than Rome itself, and four great bronze horses that look about to leap their plinth. Even empty, with the dust still settling, the place hums like a struck bell."},
    {key:'palace',label:'The Great Palace & Chalke Gate',title:'The Great Palace & the Chalke Gate',text:"Below Hagia Sophia sprawls the Sacred Palace — a labyrinth of halls, chapels and sea-terraces where the Emperor lives half-glimpsed behind silk and eunuchs. Its bronze vestibule, the Chalke, once carried a great image of Christ above the door; there is only a bare cross there now, and the mortar around it is still pale and fresh. The guardsmen in white wear gold, and watch you the way a cat watches a moth."},
    {key:'walls',label:'The Land Walls & Golden Gate',title:'The Land Walls & the Golden Gate',text:"Four miles of triple wall, ditch and tower march across the landward neck of the city — the Theodosian walls, which no army has yet broken and (you are assured, repeatedly, by everyone) no army ever shall. At their southern end stands the Golden Gate, a triple marble arch hung with bronze, kept shut and shining for the days an emperor rides home in triumph. Foreign traders use a humbler gate, and are grateful to be let through any."},
    {key:'mese',label:'The Mese & Column of Constantine',title:'The Mese & the Column of Constantine',text:"The Mese, the great colonnaded avenue, runs the spine of the city from the palace to the walls, and strung along it lie the forums of dead emperors. In the Forum of Constantine a vast column of dark-red porphyry, drum upon drum, lifts a statue of the founder above the rooftops; holy relics, the Greeks swear, are buried at its foot. The arcades to either hand are one unbroken shop — silver, scent, books, and silk under imperial seal."},
    {key:'market',label:'The silk-houses & the markets',title:'The silk-houses & the markets of the City',text:"Here your long road both ends and begins. The state keeps its costliest silks under lock in the imperial houses — purple-dyed cloth a commoner can be flogged for wearing — but the open markets along the Mese and down the slope to the Golden Horn sell everything the world floats in: Bulgar furs, Rus wax and amber, Syrian glass, Frankish blades, spices that came the very way you came. This is as near as your jade and musk will ever get to the throats and wrists that will wear them. Strike your bargains, and carry the rest home."},
   ]
 },
 "Chang'an":{
   intro:"<p>You stand at the eastern end of the Silk Road, in the greatest city on earth — no city anywhere holds more people in this age. A wall of rammed earth runs some thirty li around a vast grid of dead-straight avenues and walled wards, so broad that a man may lose a morning crossing from one gate to the next; northward rise the tiled roofs of the palace city, and eight years of war have thinned the crowds without humbling the scale of the place.</p><h3 style='margin:16px 0 6px;font-size:17px;color:#b0472f;letter-spacing:1px'>The Western Market 西市</h3><p>Around you spreads the market itself — two whole wards given over to trade, loud with Persian jewellers and Sogdian wine-shops and the bawling of camel-copers, and a pen of beasts that have come exactly as far as you have. The war has shuttered whole rows of it and the foreign quarter is thinner than the songs remember, but here your jade and musk and lapis find their buyers, and a thin market rewards a bold hand. Where do your feet take you?</p>",
   items:[
    {key:'daming',label:'The Daming Palace 大明宫',title:'The Daming Palace 大明宫',text:"North of the city, on the Dragon-head plain, the Daming Palace lifts its tiled roofs above a marble terrace you may approach but never climb. Up those hundred steps stands Hanyuan Hall, where the Son of Heaven receives the tribute of the world — though the new young Emperor, Daizong, holds a court still grey with the ash of rebellion. Foreign envoys wait in long silk lines at the gate; you are waved no nearer, and crane your neck like everyone else."},
    {key:'pagoda',label:'The Big Wild Goose Pagoda 大雁塔',title:'The Big Wild Goose Pagoda 大雁塔',text:"In the grounds of the Ci’en monastery rises a square pagoda of grey brick, storey stepped on storey, severe and plain against the sky. The monk Xuanzang raised it a hundred years ago to house the sutras and relics he carried home on foot from India, across the very deserts and mountains that the Road itself must cross. Pilgrims circle it murmuring; freshly-passed examination graduates climb to scratch their names at the top, insufferably pleased with themselves."},

 }
