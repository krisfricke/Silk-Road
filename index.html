/* ============================================================
   THE SOULS — the human face of the slave trade.
   A parallel manifest of named individuals kept in step with the
   'slaves' commodity count, so a coffle is people, not cargo.
   ============================================================ */
function souls(){ if(!S.souls) S.souls=[]; return S.souls; }
const SOUL_POOLS={
 zanj:{ origins:['of the Zanj coast','taken inland and walked down to the sea','from a village up a river that has no name on your maps','sold at the coast by men of their own tongue'],
        names:['Subira','Juma','Pendo','Baraka','Asha','Tumaini','Faraji','Imani','Neema','Saidi','Zuberi','Rehema','Chausiku','Maliki'] },
 basra:{ origins:['of the Zanj, bought to drain the salt-marshes','from Sindh, beyond the Indus','a Daylamite off the Caspian hills','sold for a debt that was never their own'],
        names:['Bilal','Marjana','Sapor','Mihran','Rayhana','Kafur','Anbar','Yumn','Faraj','Jawhar','Lu’lu','Nasim'] },
 central:{ origins:['a Turk of the steppe, taken in a clan-feud','a Saqlabi from the cold forests of the far north','a Soghdian whose family could not pay the season’s tax','from beyond the Jaxartes, where the grass runs to the world’s edge'],
        names:['Tolui','Aybek','Sangar','Borte','Kunduz','Sevinch','Yaruq','Altun','Bori','Chichek','Tegin','Yulduz'] },
 rum:{ origins:['a Slav from beyond the Danube','a Bulgar child of a village that no longer stands','a Circassian off the Caucasus slopes','taken in a border war already half-forgotten'],
        names:['Vladislav','Milena','Boris','Dragana','Zorka','Radomir','Tsvetan','Vesna','Goran','Ljuba','Stojan','Rada'] },
 unknown:{ origins:['whose road to this coffle you never learn','who will not say where they were born','sold so many times the first owner is forgotten'],
        names:['a thin young man','a young woman with steady eyes','an older man, grey before his time','a girl who keeps to the back','a boy of perhaps ten','a silent woman','a man who limps a little already'] }
};
const SOUL_AGES=['a child of perhaps ten','barely more than a child','a youth','in the first of their strength','in the middle of life','past their best years','grey before their time'];
const SOUL_NOTES=['who was a potter before the soldiers came','taken with a sister, since parted at some market','who flinches at a raised hand','who hummed at night until told to stop','who keeps a child’s carved toy and lets no one see it','who has tried to run twice already','who has learned a few words of your tongue, and uses them to ask after home','who tends the others’ blistered feet without being asked','who has stopped speaking altogether','who watches the road behind you as though measuring it','who prays at dawn in a language no one here shares','who says, once and never again, that they used to own a boat'];
function soulRegion(cityName){ if(cityName==='Zanzibar')return 'zanj'; if(cityName==='Basra')return 'basra'; if(cityName==='Constantinople')return 'rum'; return 'central'; }
function makeSoul(cityName){ const P=SOUL_POOLS[soulRegion(cityName)]||SOUL_POOLS.unknown;
  return { name:pick(P.names), origin:pick(P.origins), age:pick(SOUL_AGES), note:pick(SOUL_NOTES), cond:'hale', hp:100, g:(rnd()<0.5?'m':'f') }; }
function soulsBuy(n,cityName){ const A=souls(); for(let i=0;i<n;i++){ var _s=makeSoul(cityName);
  if(GHOST_NAME){ _s.name=GHOST_NAME; _s.ghost=true; GHOST_NAME=null; try{STORE.set('silkroad_enslaved','');}catch(e){}
    log("One of the souls led into your camp gives a name you have heard somewhere before \u2014 <b>"+_s.name+"</b> \u2014 and for a breath the back of your neck goes cold. Then the moment passes, as such moments do, and the ledger does not care."); }
  A.push(_s); } }
function soulHp(x){ if(x.hp==null) x.hp=(x.cond==='sick'?45:x.cond==='lame'?40:100); return x.hp; }
function soulName(x){ return x.name; }
function soulLine(x){ return '<b>'+x.name+'</b>, '+x.origin+(x.cond==='sick'?' — feverish':x.cond==='lame'?' — lamed':''); }
function soulSummary(list){ if(!list.length) return 'no one'; const nm=list.slice(0,2).map(soulName); let s=nm.join(' and '); if(list.length>2) s+=', and '+(list.length-2)+' more'; return s; }
function soulBuyMsg(n){ const A=souls(); const added=A.slice(Math.max(0,A.length-n)); 
  return "Whatever the ledger calls them, the coffle led into your camp are people: "+added.slice(0,3).map(soulLine).join('; ')+(n>3?'; and '+(n-3)+' others':'')+". Few will meet your eye."; }
function soulsSell(n){ const A=souls(); const gone=A.splice(0, Math.min(n, A.length));
  return "At the block you give up "+soulSummary(gone)+". You take the silver, and do not ask — are not told — what is to become of them."; }
function syncSouls(){ if(!S) return; const A=souls(); const want=Math.max(0, Math.round((S.goods&&S.goods.slaves)||0));
  if(A.length>want) A.splice(want);                       // losses, seizures, dumps: trim quietly
  else while(A.length<want) A.push(makeSoul((city()&&city().name)||'unknown')); }
function soulRemoveOne(idx){ const A=souls(); if(idx<0||idx>=A.length) return null; const x=A.splice(idx,1)[0];
  if(S.goods.slaves>0){ S.goods.slaves--; if(S.goods.slaves<=0) S.basis.slaves=0; } return x; }

/* ---- a humanizing road event when you are driving a coffle ---- */
function evSouls(){
  const A=souls(); if(!A.length) return null;
  const hale=A.filter(x=>x.cond==='hale');
  const r=rnd();
  // 1) sickness
  if(r<0.30 && hale.length){ const x=pick(hale);
    return {h:'FEVER IN THE COFFLE', t:x.name+", "+x.origin+", is burning with fever by evening and cannot keep the pace. The others watch to see what you will do.",
     ch:[
      {l:'Halt a day; send for a leech',f(){ passDays(1); if(S.dead)return; x.cond='hale'; S.hp=clamp(S.hp,0,100); log(x.name+"’s fever breaks by morning. It cost you a day and a little silver, and you are not certain why you spent them — only that you did."); }},
      {l:'Bind them to a camel and press on',f(){ if(rnd()<0.5){ x.cond='sick'; log(x.name+" sways through the day lashed to a pack-saddle, alive but worse. A buyer will mark it, and pay the less."); } else { const g=soulRemoveOne(A.indexOf(x)); log(g.name+", "+g.origin+", does not last the march. You leave a low cairn by the road and tell yourself the ledger is only one soul lighter. So, you notice, are you."); } }},
     ]};
  }
  // 2) lameness
  if(r<0.50 && hale.length){ const x=pick(hale);
    return {h:'A COFFLE GONE LAME', t:x.name+"’s feet have given out — split and bleeding from the road, and "+(x.g==='f'?'she':'he')+" can no longer keep up.",
     ch:[
      {l:'Ease the pace; put them up on a beast',f(){ x.cond='lame'; if(totalAnimals()>1){ log("You set "+x.name+" on a pack-camel and slow the column. The day's miles suffer; the splinter under your ribs eases, a little."); } else { log("You have no beast to spare, but you slow for "+x.name+" all the same. The caravan grumbles."); } }},
      {l:'Cut them from the coffle and go on',f(){ const g=soulRemoveOne(A.indexOf(x)); log("You cut "+g.name+" loose at the roadside with a skin of water and ride on. Whether that is mercy or murder you will have miles to decide."); }},
     ]};
  }
  // 3) a soul slips away in the night
  if(r<0.58){ const x=pick(A);
    return {h:'GONE IN THE NIGHT', t:"At the dawn count you are one short. "+x.name+", "+x.origin+", has slipped the rope in the dark and is somewhere out in the country, running.",
     ch:[
      {l:'Let them run; say nothing',f(){ soulRemoveOne(A.indexOf(x)); S.freedByFlight=(S.freedByFlight||0)+1; log("You strike "+x.name+" from the ledger and the count, and call the loss a stray. Some of the others stand a little straighter that day."); }},
      {l:'Send riders to bring them back',f(){ if((S.herd&&S.herd.horse>0) && rnd()<0.7){ x.cond='sick'; log("Your riders run "+x.name+" down by midday and drag them back, bruised and silent. The rope is doubled. No one meets your eye at the fire."); } else { soulRemoveOne(A.indexOf(x)); log("You lose half a day in the broken country and find nothing but a cast-off sandal. "+x.name+" is gone, and the silver with them."); } }},
     ]};
  }
  // 4) a quiet act of humanity (no mechanics, only weight)
  const x=pick(A);
  return {h:'A SMALL THING', t:"<b>"+x.name+"</b> sings some low, haunting lines in a language you cannot understand, before petering out again into silence.",
   ch:[{l:'Ride on',f(){}}]};
}

/* ---- the coffle manifest + manumission ---- */
function openCoffle(){ if(!S||S.dead) return; syncSouls(); S.screen='coffle'; render(); }
function renderCoffle(m){
  syncSouls(); const A=souls();
  if(!A.length){ m.innerHTML='<div class="panel"><h2>The coffle</h2><p class="sub">You hold no one in bond just now.</p><button class="seal" onclick="S.screen=\'city\';render()">Back</button></div>'; return; }
  const sickN=A.filter(x=>x.cond!=='hale').length;
  const rows=A.map((x,i)=>'<div style="margin:3px 0">'+soulLine(x)+' <span class="sub">— '+x.age+', '+x.note+'</span> <button class="tiny" onclick="manumitOne('+i+')">free</button></div>').join('');
  m.innerHTML='<div class="panel"><h2>The coffle <span class="sub">· '+A.length+' '+(A.length>1?'souls':'soul')+'</span></h2>'+
    '<p class="sub">These are the people the ledger lists as <i>Slaves</i>. You may sell them in the markets that deal in such cargo — or you may strike the ropes and let them go, and forfeit every coin they cost you.</p>'+
    '<div style="max-height:300px;overflow:auto;margin:6px 0">'+rows+'</div>'+
    '<div style="margin-top:8px">'+
    '<button onclick="S.screen=\'city\';render()">Back to '+ (city()?city().name:'the market') +'</button></div>'+
    '<p class="sub" style="margin-top:6px">Silver <b class="gold">'+Math.round(S.silver)+'</b></p></div>';
}
function manumitOne(idx){ const A=souls(); const x=A[idx]; if(!x)return; soulRemoveOne(idx); S.manumitted=(S.manumitted||0)+1;
  log("You strike the rope from <b>"+x.name+"</b> and let "+(x.g==='f'?'her':'him')+" go \u2014 free to make of the road what "+(x.g==='f'?'she':'he')+" can. You forfeit the silver "+(x.g==='f'?'she':'he')+" cost you, and find you do not much mind.");
  if(x.cond==='hale' && livingParty().length<10 && rnd()<0.5){ const sk={trade:0,cook:0,handle:0,hunt:0,fight:0}; const k=pick(['handle','cook','fight','hunt']); sk[k]=1+ri(2); S.party.push({ name:x.name, role:'a freed '+(x.g==='f'?'woman':'man')+', '+x.origin.replace(/^a /,'').replace(/^of /,'of '), skills:sk, alive:true, kind:'companion', recruited:true, freedman:true, hp:100, fromCity:(city()&&city().name) }); log(x.name+", with nowhere else to be, asks to stay on as a paid hand. You take "+(x.g==='f'?'her':'him')+" on."); }
  render(); }
function manumit(which){
  const A=souls(); let freed=[];
  if(which==='frail'){ for(let i=A.length-1;i>=0;i--){ if(A[i].cond!=='hale'){ freed.push(A[i]); soulRemoveOne(i); } } }
  else { freed=A.slice(); S.goods.slaves=0; S.basis.slaves=0; S.souls=[]; }
  S.manumitted=(S.manumitted||0)+freed.length;
  let msg="You strike the ropes. "+(which==='frail'?"The "+freed.length+" who could no longer keep up":"All "+freed.length+" of them")+" are free — to go, to stay, to make of the road what they can. You will not see a coin of what they cost you, and you find you do not much care.";
  // a holy companion approves
  const holy=livingParty().find(p=>p.kind==='monk'||/monk|dervish|priest|Brother|Sister/.test(p.role||''));
  if(holy) msg+=" "+holy.name+" says nothing, but inclines "+(pron?pron(holy).s:'their')+" head as though a weight had come off the whole caravan.";
  log(msg);
  // a freed person may choose to stay on, now as a free hand who is paid
  const stayers=freed.filter(x=>x.cond==='hale');
  if(stayers.length && livingParty().length<10 && rnd()<0.6){
    const x=pick(stayers); const sk={trade:0,cook:0,handle:0,hunt:0,fight:0}; const k=pick(['handle','cook','fight','hunt']); sk[k]=1+ri(2);
    S.party.push({ name:x.name, role:'a freed '+(x.g==='f'?'woman':'man')+', '+x.origin.replace(/^a /,'').replace(/^of /,'of '), skills:sk, alive:true, kind:'companion', recruited:true, freedman:true, hp:100, fromCity:(city()&&city().name) });
    log(x.name+", with nowhere in particular to be, asks to stay on with the caravan — now as a paid hand, not a chattel. You take "+(x.g==='f'?'her':'him')+" on. It is not nothing.");
  }
  render();
}

/* ============================================================
   CASTAWAY — shipwrecks on a coast wash you ashore, alive, to walk out.
   ============================================================ */
function castawayShore(a,b){ const key=[a,b].sort().join('|');
  const M={'Aden|Dhofar':'desert','Aden|Qulzum':'desert','Kollam|Mantai':'jungle','Kauthara|Palembang':'jungle','Mantai|Palembang':'jungle','Guangzhou|Yangzhou':'cultivated'};
  return M[key]||'rugged'; }
function castawayPossible(terr,strait){ return !!strait || terr==='coast' || terr==='med'; }
const CAST_T={
 rugged:{land:'a broken, roadless coast of grey rock and thorn-scrub',hunt:0.45,beast:'a wolf-pack',beastP:0.14,lostP:0.10,thirst:false,slow:1.0},
 desert:{land:'a blazing, waterless shore of sand and black shale',hunt:0.20,beast:'a desert leopard',beastP:0.08,lostP:0.08,thirst:true,slow:1.0},
 jungle:{land:'dense, dripping jungle loud with unseen things',hunt:0.50,beast:'a tiger',beastP:0.20,lostP:0.30,thirst:false,slow:1.5},
 cultivated:{land:'a settled coast of paddy-fields, bamboo, and village smoke',hunt:0.70,beast:null,beastP:0,lostP:0.04,thirst:false,slow:0.7},
};
function castawayWash(opts){
  const a=opts.from, b=opts.to, p=(opts.p!=null?opts.p:0.5);
  const shore = opts.strait ? 'jungle' : castawayShore(a,b);
  const dest = opts.dest || ((p>0.5)?b:a);
  const nearerFrac = Math.min(p,1-p);
  // washed ashore: each companion has a 50% chance of drowning. The heir is spared —
  // and his very presence strips YOUR plot armour: with someone to carry on, you can drown too.
  const heir=(S.party||[]).find(x=>x.nephew && x.alive);
  let drowned=[];
  (S.party||[]).filter(x=>x.alive).forEach(function(x){ if(!x.nephew && rnd()<0.5){ x.alive=false; drowned.push(x); if(typeof noteDeath==='function') noteDeath(x,'the wreck'); } });
  S.party=(S.party||[]).filter(x=>x.alive);
  const youDrowned = !!heir && rnd()<0.5;
  const survivors = (youDrowned?0:1) + livingParty().length;
  // the coffle, chained below, fares worst of all
  let freedNote='';
  if((S.goods.slaves||0)>0){ const n=S.goods.slaves; const saved=Math.max(0,Math.round(n*0.2)); S.goods.slaves=0; S.basis.slaves=0; S.souls=[]; freedNote=" Of the "+n+" chained below decks, perhaps "+saved+" claw their way to the sand alive — and in the wreck's chaos, no longer anyone's property.";
    if(saved>0) S.manumitted=(S.manumitted||0)+saved; }
  // salvage: about a tenth of the cargo, capped at 5 weight per survivor
  const capWt=5*survivors; let usedWt=0; let savedList=[];
  for(const g of GOODS){ if(g.id==='slaves')continue; const have=S.goods[g.id]||0; if(have<=0)continue;
    let keep=Math.floor(have*0.10);
    while(keep>0 && usedWt+keep*g.wt> capWt) keep--;
    if(keep>0){ usedWt+=keep*g.wt; savedList.push(keep+' '+g.u+(keep>1?'s':'')+' of '+g.n.toLowerCase()); }
    S.goods[g.id]=keep; if(keep<=0) S.basis[g.id]=0; }
  // the animals are lost to the sea
  if(S.herd) for(const k in S.herd) S.herd[k]=0; if('camels' in S) S.camels=0;
  const T=CAST_T[shore]||CAST_T.rugged;
  let days=Math.round(nearerFrac*((opts.legDays||8))*1.6*T.slow); days=Math.max(2,Math.min(10,days));
  S.food=Math.min(S.food||0, 4);
  S.hp=Math.max(1,S.hp);
  S.castaway={to:dest, terr:shore, daysLeft:days, total:days, water:(T.thirst?6:99)};
  S.sail=null; S.voy=null; S.sailing=false; S.voyaging=false; S.seaMode=false; S.pendingEvent=null; S.castMsg='';
  const cargoNote = (savedList.length? ("From the surf "+(youDrowned?heir.name.split(',')[0]+" drags":"you drag")+" "+savedList.slice(0,3).join(', ')+(savedList.length>3?', and a few scraps more':'')+".") : "Nothing of the cargo comes ashore but splinters.");
  if(youDrowned){
    log("The sea takes you. "+heir.name.split(',')[0]+" hauls what survives onto "+T.land+" — "+(drowned.length?("and "+drowned.length+" others are gone too"):("and, by a mercy, the rest live")) + "."+freedNote+" "+cargoNote+" "+dest+" lies perhaps "+days+" days off, with no road and no food.");
    S.cause='the wreck'; die(); render(); return;
  }
  log("The sea spits you onto "+T.land+". You live — "+(drowned.length? ("<b>"+drowned.length+"</b> of your people did not ("+drowned.slice(0,3).map(x=>x.name.split(',')[0]).join(', ')+(drowned.length>3?'…':'')+")") : "and so, past all reason, do all your companions")+"."+freedNote+" "+cargoNote+" "+dest+" lies perhaps "+days+" days off, and you have neither road nor food.");
  S.screen='castaway'; render();
}
function castDayCosts(){
  S.day++; if(typeof accrueGuardWages==='function') accrueGuardWages();
  S.food=Math.max(0,S.food-(typeof foodNeed==='function'?foodNeed():livingParty().length+1));
  const c=S.castaway, T=CAST_T[c.terr]; let hurt=0, notes=[];
  if(S.food<=0){ hurt+=7; notes.push('hunger gnaws at the whole party'); }
  if(T.thirst){ c.water=Math.max(0,c.water-1); if(c.water<=0){ hurt+=15; notes.push('the thirst is murderous'); } }
  if(hurt>0) S.hp=clamp(S.hp-hurt,0,100);
  return notes;
}
function castHazard(){ const c=S.castaway, T=CAST_T[c.terr]; if(!T.beast || rnd()>=T.beastP) return '';
  if(livingParty().length && rnd()<0.5){ const who=casualty(true); if(who) return ' '+cap1(T.beast)+' comes out of nowhere and takes '+who+(/\(/.test(who)?' — gone in a heartbeat.':'.'); }
  const dmg=10+ri(12); S.hp=clamp(S.hp-dmg,0,100); if(S.hp<=0) S.cause=T.beast.replace(/^a /,'');
  return ' '+cap1(T.beast)+' comes out of the green; you fight clear, bleeding [-'+dmg+' HP].'; }
function castDie(fallback){ S.cause=S.cause||fallback; S.castaway=null; S.castMsg=''; die(); render(); }
function castMarch(){ const c=S.castaway, T=CAST_T[c.terr]; if(!c)return;
  const notes=castDayCosts(); let s;
  if(rnd()<T.lostP){ s='You lose the way and spend the day getting nowhere'; }
  else { c.daysLeft--; s='You '+(T.slow>1?'hack and wade':'press')+' on toward '+c.to; }
  const hz=castHazard(); S.castMsg=cap1(s)+(notes.length?'; '+notes.join(', '):'')+'.'+hz;
  if(S.hp<=0){ castDie('exposure'); return; }
  if(c.daysLeft<=0){ castawayLand(c.to); return; }
  render();
}
function castHunt(){ const c=S.castaway, T=CAST_T[c.terr]; if(!c)return;
  const notes=castDayCosts(); let s;
  if(rnd()<T.hunt){ const got=3+ri(6); S.food+=got; s='You forage and hunt and bring back '+got+' day'+(got>1?'s':'')+' of food'; }
  else { s='You hunt the wild ground and find nothing worth the arrow'; }
  const hz=castHazard(); S.castMsg=cap1(s)+(notes.length?'; '+notes.join(', '):'')+'.'+hz;
  if(S.hp<=0){ castDie('exposure'); return; }
  render();
}
function castWater(){ const c=S.castaway; if(!c)return;
  const notes=castDayCosts(); let s;
  if(rnd()<0.4){ c.water=99; s='Against the odds you find a brackish seep among the rocks and drink your fill'; }
  else { s='You dig in the dry wadi and turn up only damp sand'; }
  const hz=castHazard(); S.castMsg=cap1(s)+(notes.length?'; '+notes.join(', '):'')+'.'+hz;
  if(S.hp<=0){ castDie('thirst'); return; }
  render();
}
function castawayLand(to){
  S.castaway=null; S.castMsg=''; S.sail=null; S.voy=null; S.sailing=false; S.voyaging=false;
  if(typeof isSeaExitCity==='function' && isSeaExitCity(to)){
    S.seaMode=false; S.portName=null; const ti=S.itin.findIndex(x=>x.name===to); if(ti>=0)S.idx=ti; S.dir=1; S.legKm=0;
  } else {
    S.seaMode=true; if(typeof addSeaMarkets==='function') addSeaMarkets(); S.portName=to;
  }
  S.water=waterMax(); S.hereSince=S.day; S.dealDays=0; S.priceLock={};
  if(typeof restockToNow==='function') restockToNow(to);
  S.screen=(S.seaMode?'port':'city');
  log("Gaunt, sun-flayed, and frankly astonished to be alive, you walk out of the wilderness and into <b>"+to+"</b>. The beasts and all but a remnant of the cargo are gone to the sea — but you have your life, which is more than the drowned can say.");
  render();
}
function renderCastaway(m){
  const c=S.castaway; if(!c){ S.screen=(S.seaMode?'port':'city'); render(); return; }
  const T=CAST_T[c.terr]||CAST_T.rugged;
  const party=livingParty().map(x=>x.name.split(',')[0]+' <span class="sub">[HP '+Math.round(memHp(x))+']</span>').join(', ')||'<span class="sub">no one but you</span>';
  m.innerHTML='<div class="panel"><h2 class="red">CAST ASHORE</h2>'+
   '<p>You are afoot in '+T.land+', making for <b>'+c.to+'</b> — perhaps <b>'+c.daysLeft+'</b> day'+(c.daysLeft===1?'':'s')+' of hard going still ahead, and no road under you.</p>'+
   '<p class="sub">You <b class="gold">[HP '+Math.round(S.hp)+']</b> &middot; food '+Math.round(S.food)+(T.thirst?' &middot; water '+Math.max(0,Math.round(c.water)):'')+' &middot; with you: '+party+'</p>'+
   (S.castMsg?'<p>'+S.castMsg+'</p>':'')+
   '<div style="margin-top:10px"><button class="seal" onclick="castMarch()">Press on toward '+c.to+' (a day)</button> '+
   '<button onclick="castHunt()">Forage &amp; hunt (a day)</button> '+
   (T.thirst?'<button onclick="castWater()">Search for water (a day)</button>':'')+'</div></div>';
}

</script>
