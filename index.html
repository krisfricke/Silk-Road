<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silk Road 762 AD</title>
<style>
  :root{
    --ink:#171210;        /* night-desert ink */
    --panel:#201813;
    --bone:#e8dcc3;       /* manuscript bone */
    --silk:#d4a35a;       /* aged silk gold */
    --dim:#8a7a5e;
    --seal:#c0392b;       /* cinnabar seal */
    --jade:#86a883;
    --blue:#6f9fd8;       /* lapis blue — a selling price */
    --line:#3a2f24;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--bone);
    font-family:Georgia,'Times New Roman',serif;
    display:flex;justify-content:center;min-height:100vh;padding:10px}
  #app{width:100%;max-width:740px}
  .mono{font-family:ui-monospace,'Cascadia Mono',Menlo,Consolas,monospace}

  header{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--line);padding:6px 2px 8px}
  header h1{font-size:1.05rem;letter-spacing:.22em;color:var(--silk);font-weight:normal}
  header h1 .zh{color:var(--seal);letter-spacing:0;margin-right:.5em}
  header .date{font-size:.8rem;color:var(--dim)}

  #stats{display:flex;flex-wrap:wrap;gap:4px 14px;padding:8px 2px;
    border-bottom:1px solid var(--line);font-size:.8rem}
  #stats b{color:var(--silk);font-weight:normal}
  #stats .bad{color:var(--seal)}

  #ribbon{display:flex;flex-wrap:wrap;gap:2px 10px;padding:8px 2px;font-size:.72rem;
    color:var(--dim);border-bottom:1px solid var(--line)}
  #ribbon .city{white-space:nowrap}
  #ribbon .done{color:#5d5141;text-decoration:line-through 1px}
  #ribbon .here{color:var(--seal)}
  #ribbon .here::before{content:"◆ ";}

  #main{padding:16px 2px;min-height:300px}
  h2{font-size:1.3rem;color:var(--silk);font-weight:normal;margin-bottom:2px}
  h2 .zh{color:var(--seal);font-size:1rem;margin-left:.4em}
  .sub{color:var(--dim);font-style:italic;margin-bottom:14px;font-size:.9rem}
  p{line-height:1.55;margin-bottom:10px}

  button{background:none;border:1px solid var(--silk);color:var(--silk);
    font-family:inherit;font-size:.85rem;padding:7px 14px;cursor:pointer;margin:3px 4px 3px 0}
  button:hover{background:var(--silk);color:var(--ink)}
  button.seal{border-color:var(--seal);color:var(--seal)}
  button.seal:hover{background:var(--seal);color:var(--bone)}
  button.tiny{padding:3px 7px;font-size:.72rem;margin:1px}
  button:disabled{opacity:.35;cursor:default}
  button:disabled:hover{background:none;color:var(--silk)}
  input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--bone);
    font-family:inherit;padding:7px;font-size:1rem;width:220px}

  table{width:100%;border-collapse:collapse;font-size:.8rem;margin:8px 0}
  th{color:var(--dim);font-weight:normal;text-align:left;padding:3px 4px;border-bottom:1px solid var(--line)}
  td{padding:4px;border-bottom:1px solid #281f18}
  td.num{text-align:right}

  .panel{border:1px solid var(--line);background:var(--panel);padding:14px;margin:10px 0}
  .event{border-color:var(--seal)}
  .event h3{color:var(--seal);font-weight:normal;letter-spacing:.1em;margin-bottom:8px}

  .bar{height:8px;background:var(--panel);border:1px solid var(--line);margin:10px 0}
  .bar i{display:block;height:100%;background:var(--silk)}

  #log{border-top:1px solid var(--line);margin-top:8px;padding:8px 2px;
    font-size:.72rem;color:var(--dim);line-height:1.5}
  #log .d{color:#665942}

  .pace label{margin-right:14px;font-size:.85rem;cursor:pointer}
  .routeopt{flex:1;min-width:240px}
  .routes{display:flex;gap:10px;flex-wrap:wrap}
  .tomb{border:1px solid var(--dim);max-width:340px;margin:20px auto;padding:18px;
    text-align:center;color:var(--dim)}
  .tomb .name{color:var(--bone);font-size:1.1rem}
  .gold{color:var(--silk)}
  .red{color:var(--seal)}
  .green{color:var(--jade)}
  .blue{color:var(--blue)}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
  .spin{animation:spin 3s linear infinite;transform-origin:60px 60px}
  /* travel scene */
  .scene{width:100%;display:block;border:1px solid var(--line);background:var(--ink);margin:4px 0}
  @keyframes duneFar{from{transform:translateX(-350px)}to{transform:translateX(0)}}
  @keyframes duneNear{from{transform:translateX(-350px)}to{transform:translateX(0)}}
  @keyframes plod{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .sFar{animation:duneFar 30s linear infinite}
  .sNear{animation:duneNear 13s linear infinite}
  .plod{animation:plod 1.5s ease-in-out infinite;transform-origin:center bottom}
  @keyframes canalFar{from{transform:translateX(0)}to{transform:translateX(-700px)}}
  @keyframes canalNear{from{transform:translateX(0)}to{transform:translateX(-700px)}}
  @keyframes canalFore{from{transform:translateX(0)}to{transform:translateX(-700px)}}
  @keyframes canalRip{from{transform:translateX(0)}to{transform:translateX(-140px)}}
  .cFar{animation:canalFar 30s linear infinite}.cNear{animation:canalNear 15s linear infinite}.cFore{animation:canalFore 9s linear infinite}.cRip{animation:canalRip 3.5s linear infinite}
  .cBob{animation:plod 2.4s ease-in-out infinite;transform-origin:center bottom}
  @keyframes sailpulse{0%,100%{transform:scaleX(0.97)}50%{transform:scaleX(1.07)}}
  .sailpulse{animation:sailpulse 2.8s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
  .twinkle{animation:plod 2.2s ease-in-out infinite}
  .speedrow button{font-size:.78rem;padding:5px 10px}
  .speedrow button.on{background:var(--silk);color:var(--ink)}
  .regionmap{width:100%;display:block;margin:2px 0 8px}
  @media(prefers-reduced-motion:reduce){.sFar,.sNear,.plod,.twinkle{animation:none}}
  .scene.paused .sFar,.scene.paused .sNear,.scene.paused .plod,.scene.paused .twinkle,.scene.paused .sailpulse,.scene.paused .cFar,.scene.paused .cNear,.scene.paused .cFore,.scene.paused .cRip,.scene.paused .cBob{animation-play-state:paused}
  @media(max-width:480px){ #stats{font-size:.72rem;gap:3px 10px} button{padding:8px 12px} }
  #crew{font-size:.72rem;color:#9a8c70;padding:1px 4px 3px;line-height:1.6}
  #crew .clbl{color:#b0472f;font-weight:bold;letter-spacing:.04em}
.cnEstab{overflow:hidden;max-width:880px;margin:6px auto;border:5px solid #6b4f2a;border-radius:3px;position:relative;line-height:0;cursor:pointer;aspect-ratio:1652/888;background:#cdbf8f}
.cnZoom{width:100%;display:block;transform-origin:23.5% 14.2%;animation:cnZoom 3.5s ease-in-out forwards}
@keyframes cnZoom{0%{transform:scale(1)}26%{transform:scale(1)}100%{transform:scale(3.7)}}
.cnCap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,0.72));color:#f3e7c6;font-style:italic;font-size:15px;padding:24px 14px 10px;line-height:1.35;font-family:Georgia,serif;animation:cnCap 4s forwards}
@keyframes cnCap{0%{opacity:1}68%{opacity:1}100%{opacity:0}}
</style>
</head>

    <h1><span class="zh">絲路</span>THE SILK ROAD · 762 <span style="font-size:.55em;opacity:.5;font-weight:normal" id="ver"></span></h1>

function baghdadVillage(){ return gameDate().t < Date.UTC(762,6,30); }
function isBaghdadVillage(nm){ return nm==='Baghdad' && baghdadVillage(); } // coconuts are stocked/buyable only in their tropical production range; they can still be SOLD anywhere you carry them (prices exist everywhere)

 'Merv':{paper:8,lapis:32},'Nishapur':{paper:9,turq:14},'Rey':{paper:10,wine:24},

 'Constantinople':{glass:24,lapis:80,silk:74,jade:80,musk:150,pepper:84,coral:36,amber:42,wine:14}

/* terr: settled | steppe | desert | harsh | mountain */
const MAIN1=[
 {name:"Chang'an",dist:0,terr:'settled',frac:0,zh:'長安',
  desc:"Capital of the Tang and the largest city on earth — a million souls, though the rebellion has thinned the markets and the smart money is heading west. Outfit your caravan well — the Jade Gate is the last easy resupply."},
 {name:'Lanzhou',dist:1200,terr:'settled',frac:.06,zh:'蘭州',

const NORTH=[
 {name:'Hami',dist:800,terr:'harsh',frac:.21,zh:'哈密',
  desc:"An oasis famous for melons so sweet that emperors demand them as tribute. After the Gashun Gobi, you would trade a camel for one."},
 {name:'Turfan',dist:800,terr:'desert',frac:.25,zh:'高昌',
  desc:"Gaochang. A depression so hot and so low that the locals farm with underground channels and a straight face."},
 {name:'Kucha',dist:1240,terr:'desert',frac:.32,zh:'龜茲',
  desc:"City of musicians. Kuchean lute-players are the fashion in Chang'an; here they are merely the noise at every tavern."},
 {name:'Aksu',dist:860,terr:'desert',frac:.36,zh:'阿克蘇',

 {name:'Kashgar',dist:920,terr:'desert',frac:.41,zh:'喀什',
  desc:"Where the routes around the Taklamakan reunite and everyone compares casualties. Pepper comes up from India over the passes; it is nearly cheap here."},

const SOUTH=[
 {name:'Miran',dist:1000,terr:'harsh',frac:.22,zh:'米蘭',
  desc:"A fortress town by the salt-crusted ghost of a lake. The frescoes here have wings; the wells, less reliably, have water."},
 {name:'Khotan',dist:1400,terr:'harsh',frac:.30,zh:'于闐',
  desc:"Kingdom of jade. They pull it green and white from the rivers. Buyers in the west pay well; buyers in Chang'an paid better, but you are going the other way, and a margin is a margin."},
 {name:'Yarkand',dist:640,terr:'desert',frac:.34,zh:'莎車',

 {name:'Beshbalik',dist:850,terr:'steppe',frac:.29,hub:'minor',zh:'北庭',

 {name:'Suyab',dist:2000,terr:'steppe',frac:.37,zh:'碎葉',

  S.goods[gid]=total;
}

function jettison(){
  let dumped=[];
  while(cargoW()>cargoCap()){
    let worst=null,wv=Infinity;
    for(const g of GOODS){ if(S.goods[g.id]>0){ const v=price(g,nextCity()||city())/g.wt; if(v<wv){wv=v;worst=g;} } }
    if(!worst)break;
    const n=Math.min(S.goods[worst.id],Math.ceil((cargoW()-cargoCap())/worst.wt));
    S.goods[worst.id]-=n; dumped.push(n+' '+worst.n.toLowerCase());
  }
  log("You lighten the loads: "+(dumped.length?dumped.join(', ')+' left':'nothing left')+" for the desert and whoever comes after.");
  render();
}

function finalGoodsValue(){
  const c=S.itin[S.idx]||S.itin[S.itin.length-1];

}
function sellAllFinal(){

function pickRumor(){
  if(rnd()<.45 && nextCity()){
    const c=nextCity();
    let dear=null,cheap=null,dv=-1,cv=1e9;
    for(const g of GOODS){ const p=price(g,c), mid=(g.e+g.w)/2, rel=p/mid;
      if(rel>dv){dv=rel;dear=g;} if(rel<cv){cv=rel;cheap=g;} }
    if(rnd()<.5 && dear) return "They say "+dear.n.toLowerCase()+" fetches a fine price in "+c.name+" just now.";
    if(cheap) return c.name+" is the place to buy "+cheap.n.toLowerCase()+" cheap, if you've the camels for it.";
  }
  const here=city()?city().frac:0;
  const pool=RUMORS.filter(r=> !(here>=.55 && /rebellion|silk grows scarce|Yangzhou|Talas|Onion/i.test(r)) && !(here<0.50 && /round city|on the Tigris/i.test(r)) );
  return pick(pool.length?pool:RUMORS);
}

async function saveScore(entry){
  try{
    const board=await loadBoard();

  else if(BOARD_VIEW==='recent'){ list=all.slice().sort(function(a,b){return (b.when||0)-(a.when||0);}).slice(0,3); }
  else { list=all.slice(); if(BOARD_VIEW==='caravan')list=list.filter(function(e){return e.mode!=='donkey';}); else if(BOARD_VIEW==='humble')list=list.filter(function(e){return e.mode==='donkey';}); list.sort(function(a,b){return b.score-a.score;}); list=list.slice(0,10); }

const FRONTIER_LEGS={'Aleppo|Iconium':'Iconium','Akhsikath|Samarkand':'Samarkand','Akhsikath|Kashgar':'Akhsikath'};
function checkFrontierLeg(){
  const n=nextCity(); if(!n||!city()) return false;
  const fname=FRONTIER_LEGS[legPairKey(city().name,n.name)]; if(!fname) return false;
  const F=FRONTIERS[fname]; if(!F) return false;
  const goingWest = n.frac > city().frac;             // toward Constantinople = westward
  const key='fr_'+fname+'_'+(goingWest?'w':'e')+'_'+(S.laps||0);
  if(S.onceFlags[key]) return false;
  let spec = goingWest ? F.w : F.e;
  if(!goingWest && F.e1 && !S.onceFlags['everFr_'+fname]) spec=F.e1;  // first-time discovery vs returning voice
  if(!spec) return false;
  S.onceFlags[key]=true; S.onceFlags['everFr_'+fname]=true;
  S.journeying=false; clearJourney(); S.pendingEvent=frontierEvent(spec); render();
  return true;
}
function maybeFrontier(name){
  if(name==='Iconium'||name==='Samarkand'||name==='Akhsikath') return; // these fire mid-leg now (see checkFrontierLeg)
  const F=FRONTIERS[name]; if(!F) return;
  const westward=(S.returning===isWest()); // true => crossing toward Constantinople
  const key='fr_'+name+'_'+(westward?'w':'e')+'_'+(S.laps||0);
  if(S.onceFlags[key]) return;
  const spec=(westward?F.w:F.e); if(!spec) return;
  S.onceFlags[key]=true;
  S.pendingEvent=frontierEvent(spec);
}
function frontierEvent(spec){
  const fee=Math.max(8, Math.round(S.silver*.04));
  return {h:spec.h, t:spec.t, ch:[
    {l:'Pay the customs toll ('+fee+' s)',f(){ if(S.silver>=fee){ S.silver-=fee; S.tollRoads=S.day+30; log("Coin changes hands and the barrier lifts. "+(spec.paid||"")+" Your stamped receipt, they note, is worth showing at the staging-posts down the road."); } else { S.silver=0; passDays(1+ri(2)); log("You come up short, and they know it. They take what little you have and hold you a day or two before the barrier grudgingly lifts."); } }},
    {l:'Present your papers and stand on them',f(){ if(rnd()<.5){ passDays(2); log("Two days of inspection and bureaucratic theatre. "+(spec.papers||"")); } else { log("The officer reads, grunts, and waves you on unbled. "+(spec.papers||"")); } }},
  ]};
}

function rollRecruit(name){
  let pool = name==='Constantinople' ? CPL_ROSTER : name==="Chang'an" ? (CITYFOLK["Chang'an"]?[CITYFOLK["Chang'an"]]:[]).concat(CHANGAN_ROSTER) : (CITYFOLK[name]?[CITYFOLK[name]]:[]);
  if(S.lucky && name===homeName() && !S.party.some(p=>p.nephew&&p.alive)) pool=pool.concat([NEPHEW_RECRUIT]);
  pool = pool.filter(c=>!S.party.some(p=>p.name===c.name && p.alive));
  if(!pool.length) return null;
  const cand = pick(pool);
  const comps = livingParty().filter(p=>p.kind!=='guard').length;
  let odds = comps>=4?0.10:comps===3?0.33:comps===2?0.50:comps===1?0.65:0.90;
  if(hasBard()) odds=Math.min(0.98, odds+0.10);   // a bard at the fire makes strangers readier to throw in with you
  return rnd()<odds ? cand : null;
}

    : "Even to you, a Roman, he is a marvel — they say his people row out of the northern mists to raid the monasteries at the edge of the world. He has little love for the drill-yard of the Emperor's guard, and when he hears you mean to cross to far Cathay his eyes light like a boy's. 'That,' he says, 'I will see.'");
  return {h:'A FAR-TRAVELLED STRANGER', t:t, ch:[
    {l:'Take Halfdan on for the road east',f(){ S.party.push({name:'Halfdan',role:'a red-bearded axeman from the cold edge of the world',skills:{fight:3},alive:true,kind:'companion',recruited:true,hp:100,fromCity:'Constantinople',gear:{weapon:'battleaxe'},die:10}); log("Halfdan shoulders his axe and his sea-chest and joins the caravan. He will, he says, follow this road to wherever it finally ends."); }},
    {l:'Wish him well, and the guard joy of him',f(){ log("You leave the Northman to his cup and his axe. He raises the one to you and does not set down the other."); }},
  ]};
}
function stChristopher(){ return {h:'THE MARTYRIUM AT CHALCEDON', t:"Before the road swallows you, you cross to the Asian shore at Chalcedon and pause at the little martyrium of Saint Christopher — patron of travellers, and you mean to travel further than most. But the shrine is troubled: where painted images of the saint once hung there are only pale rectangles on the soot and fresh chisel-marks. The Emperor and his bishops have lately declared the holy images idols, and zealous hands have been at work. An old caretaker watches you, unsure whether you have come to pray or to scrape. You leave a coin and ask the saint's blessing on the road — from whatever power is still permitted to grant it.", ch:[{l:"Take the saint's blessing and go",f(){ log("You set out under what protection Saint Christopher can still offer, in an age that has begun to doubt him."); }}]}; }
function monsoonTavernGossip(){
  if(!S||!S.seaMode||typeof seaEdges!=='function')return '';
  var here=S.portName, closed=[];
  seaEdges(here).forEach(function(e){ var lk=findLink(here,e.to); if(monsoonGated(lk) && !monsoonOpen(here,e.to)) closed.push(e.to); });
  if(!closed.length)return '';
  var to=pick(closed), when=monsoonWhen(here,to);
  return " A weather-creased ship's-master at the next bench grumbles to anyone who will listen that there will be no sailing for "+to+" until "+when+" \u2014 the wind sits dead against that course, and a cargo bound there must wait or rot.";
}
function tavernEvent(){
  const c=city();
  let cup="";
  if(S.silver>=3){ S.silver-=3; cup="You buy a round and settle in by the fire. "; }
  else { cup="You cannot afford even a cup, so you nurse the tavern-keeper's pity and listen. "; }
  const tav=(CITYFOLK[c.name]&&CITYFOLK[c.name].tav)?CITYFOLK[c.name].tav:'low-roofed and smoky, full of caravan-men and their lies';
  const flavour=(c.name==='Akhsikath')?"A communal cauldron of osh — rice, mutton, carrots, and onions — goes round, and is not refused.":(c.name==='Rey')?"A farmer in from the nearby village of Tehran nurses one cup all evening, grumbling that the city's prices are robbery and its people worse.":(c.name==='Constantinople'||c.name==='Iconium')?"In a corner two men argue in low voices over whether the holy images are idols to be smashed or windows onto heaven — the Emperor's quarrel, and not a safe one to be overheard taking a side in.":pick(["Dice rattle in the corner.","Someone is singing, badly, in a language no one admits to knowing.","A communal pot of something goes round, and is not refused.","Two traders argue over a price that concerns neither of them."]);
  const scene=cup+"The tavern in "+cityLabel(c)+" is "+tav+". "+flavour+monsoonTavernGossip();
  const rumor=pickRumor();
  if(c.name==='Akhsikath' && !S.onceFlags.osh_egg && rnd()<0.5){ S.onceFlags.osh_egg=true; return oshBeekeeperEvent(scene); }
  let recruit;
  if(S.lucky && c.name===homeName() && !S.onceFlags.nephewMet && !S.party.some(p=>p.nephew&&p.alive)){
    recruit=NEPHEW_RECRUIT; S.onceFlags.nephewMet=true;
  } else if(c.name==='Constantinople' && !S.onceFlags.halfdanMet && !S.party.some(p=>p.name==='Halfdan'&&p.alive)){
    S.onceFlags.halfdanMet=true; return halfdanTavern(scene);
  } else if(c.name==="Chang'an" && !S.onceFlags.kentoshiMet && !S.party.some(p=>p.name==='\u014ctomo no Yakatari'&&p.alive)){
    S.onceFlags.kentoshiMet=true; return kentoshiTavern(scene);
  } else {
    recruit=rollRecruit(c.name);
  }
  if(recruit && recruit.noSlaves && (S.goods.slaves||0)>0){ var _rn=recruit.name, _rr=recruit.role; return {h:'THE TAVERN', t: scene+" Across the fire "+_rn+", "+_rr+", talks easily with you \u2014 until the matter of your cargo comes up. At the word for what is chained in your camp he sets down his cup. 'I have hired my sword to many a caravan,' he says, rising, 'but never to a slaver\u2019s, and I will not start now.' He is gone into the night before the drink is cold.", ch:[{l:'Let him go',f(){ log(_rn+" would not take a slaver\u2019s coin."); }}]}; }
  if(recruit && recruit.nephew){ return nephewOffer(scene); }
  if(recruit){
    return {h:'THE TAVERN', t: scene+" Across the fire, "+recruit.name+" — "+recruit.role+", "+topSkill(recruit.skills)+" — falls into talk with you, and before the night is out asks, half in jest and half not, whether your caravan might have room for one more.",
      ch:[
       {l:'Welcome '+recruit.name+' to the company',f(){ S.party.push({...recruit,skills:{...recruit.skills},alive:true,kind:'companion',recruited:true,fromCity:c.name}); log(recruit.name+", "+recruit.role+", joins the caravan. "+(recruit.join||"")); }},
       {l:'Enjoy the night, but keep your company as it is',f(){ log('You drink with '+recruit.name+' and part as friends. Tavern talk: “'+rumor+'”'); }},
      ]};
  }
  if(S.party.some(p=>p.name==='Halfdan'&&p.alive) && rnd()<0.5){
    return {h:'THE TAVERN', t: scene+" When the talk lulls, Halfdan thumps the board and launches, unprompted, into a saga of his own cold country — a gold hall called Heorot, a fen-haunting horror named Grendel, and a hero who greets the thing bare-handed and keeps its arm for a trophy. The caravan-men are rapt; you follow perhaps a third of it, and that third is alarming.",
      ch:[{l:'Hear it out (it is long)',f(){ log("Halfdan finishes somewhere past midnight, hoarse and pleased. There was a dragon too, he assures you, and it ended well for almost no one."); }}]};
  }
  return {h:'THE TAVERN', t: scene+" Over the noise you catch the night's gossip: “"+rumor+"”",
    ch:[{l:'Drink, listen, and turn in',f(){ log('Tavern talk: “'+rumor+'”'); }}]};
}

/* ---- admire the city ---- */
function admireCity(){
  const c=city();
  if(c && (c.name==='Constantinople'||c.name==="Chang'an")){ S.screen='monuments'; S.monCity=c.name; S.monView=null; render(); return; }
  var txt; if(c.name==='Baghdad' && typeof baghdadVillage==='function' && baghdadVillage()){ txt="You walk the west bank of the Tigris where it runs nearest the Euphrates, past the mud-brick village they call Baghdad, the broken vaults of Ctesiphon \u2014 al-Mada\u02bcin, the old Persian capital \u2014 looming just downstream. But the village is the least of it: for miles the ground is staked with rope and lime, and surveyors, astrologers, brick-burners and labourers gather by the tens of thousand. The Caliph al-Mansur, they say, will raise a perfectly round city on this very spot \u2014 four gates to the quarters, a green-domed palace at its heart, Madinat al-Salam, the City of Peace. For now there is only dust, and rope, and the largest rumour you have ever stood inside of. You have come a little early to history."; } else { txt=CITY_ADMIRE[c.name]||"You walk the walls and the bazaars a while. The town is much like its neighbours, and keeps its history to itself."; }
  let extra='';
  if(S.party.some(p=>p.name==='Halfdan'&&p.alive)){ S.halfdanCarved=S.halfdanCarved||{}; if(!S.halfdanCarved[c.name]){ S.halfdanCarved[c.name]=true; extra="</p><p>As you turn to go you catch Halfdan crouched at a quiet stretch of wall, scratching angular marks into the stone with his knife-point. he sees you squinting at the angular scratches and grins. 'Ah \u2014 an illiterate,' he says cheerfully. 'It says: Halfdan was here. In runes.'"; } }
  S.pendingEvent={h:'— '+cityLabel(c).toUpperCase()+' —', t:txt+extra, ch:[{l:'Return to the bazaar',f(){}}]};
  render();
}
const CITY_ADMIRE={
 'Beshbalik':"The Turks\u2019 name means \u2018the Five Cities,\u2019 and the Tang call it Beiting \u2014 the Northern Court, the last great garrison north of the Heavenly Mountains. It stands at the foot of the Bogda massif, whose snows feed the canals of a green piedmont oasis; but ride an hour north and the grass shades into the Dzungarian sand-sea, so the town lives on a thin seam between mountain and desert, neither wholly steppe nor wholly waste. The soldiers on the walls are Tang men gone grey on the frontier, holding the Northern Court for an emperor whose armies are all spent in the eastern war; they keep their Uyghur allies close and watch the Tibetan-backed Karluks in the south.</p><p>In the horse-fairs Basmyl, T\u00fcrgesh and Karluk riders trade fat-tailed sheep and remounts beside Sogdian factors, and the talk is all of which khan the grass will answer to next year. To look at, a walled oasis of mud-brick and vines much like Hami or Turfan \u2014 but it is the farthest place where the writ of Chang\u2019an still runs, and not for long: within a generation the Tibetans will take it, and the road north will pass out of Chinese hands for a thousand years.",
  'Suyab':"You walk Suyab's bund along the Chu, where the river runs cold off the Heavenly Mountains. T\u00fcrgesh and Karluk horsemen water their mounts beside Sogdian caravan-masters; in a single street you pass a Buddhist vihara, a Nestorian church and a Zoroastrian fire kept burning by exiles from Persia. They say the poet Li Bai \u2014 Li Taibai, the Banished Immortal \u2014 was born in this borderland, a Tang child of the farthest frontier; reading his verses on the moon and wine, you can almost believe a man would have to come from the very edge of the world to write them. And neither you nor the marmot-trappers can know that the sickness sleeping in the blood of these hill-marmots will, six centuries hence, boil up out of this very valley as a plague that carries off half the world.",
 'Chach':"From a vineyard terrace above the Stone City you look out over a hundred canals threading the orchards, silver glinting in the spoil-heaps of the hill-mines. A Sogdian factor, pouring you wine, complains in three languages about Abbasid taxes and Tang treachery in a single breath. Asked the city's name he gives you two \u2014 Chach in his own Sogdian, and the Turkish the newcomers use, which carries the very same meaning: the City of Stone. He pronounces the Turkish version with a curl of the lip \u2014 Tash-kand, the newcomers say \u2014 and laughs it off: a herdsman\u2019s mouthful, he tells you, that will never stick to a city this old.",
 "Chang'an":"You stand in the greatest city on earth — and not as a flourish: no city in the world holds more people than Chang'an in this age. A million souls live within a rammed-earth wall that runs for some thirty li, laid out on a grid so vast and so straight that a man may lose a morning crossing it. Broad avenues — the central one near five hundred paces wide — divide the city into a hundred and more walled wards, each shut by drum at dusk. North sits the palace city and the imperial offices; the two great markets, East and West, swallow the goods of the world.</p><p>Yet the An Lushan rebellion has left its mark. The Western Market, where Sogdians and Persians and Turks once shouted over silk and silver, is thinner than the songs remember; some mansions stand shuttered, their owners fled or dead. Above it all the Big Wild Goose pagoda rises in brick, and beyond the walls the Zhongnan mountains hold up a hazy sky. You set your face west, toward the Jade Gate and everything past it.",
 'Lanzhou':"Lanzhou clings to the south bank of the Yellow River where the loess hills crowd down to the water. The river here is the colour of milky tea and twice as treacherous; men cross it on rafts buoyed by inflated sheepskins, swearing all the way. The town is a garrison and a crossing more than a city — mud-brick walls, a press of caravans waiting their turn, and ferrymen who have an opinion about the weight of your cargo and the state of your soul.</p><p>This is a threshold. Behind you lie the watered fields of the heartland; ahead, the Hexi corridor narrows between desert and mountain, the long stone throat down which all China breathes toward the west.",
 'Wuwei':"Liangzhou, the men here call it — first and proudest of the Hexi garrisons, strung along the corridor between the snows of the Qilian range to the south and the Gobi's edge to the north. It is horse country, and the smell of it is horse: cavalry mounts, remounts, and the dung-fires of the camps. The walls are square and serious, the market quick, the soldiers quicker.</p><p>Caravans rest here and breathe out, for the worst of the Gobi still waits ahead. In the taverns Kuchean lutes compete with the bawling of drovers, and everyone has heard a story about the desert that they are willing to sell you, cheap.",
 'Dunhuang':"The last lamp of the empire. Dunhuang sits in a green crescent of oasis where the corridor finally gives out against the dunes, the great singing-sand mountain rising gold to the south with a crescent lake cupped impossibly at its foot. West of here is the Jade Gate and the Gate of Yang, and past them the Taklamakan, which the wise go around and the foolish go into.</p><p>But it is the caves that stop your breath. In the cliffs of Mingsha, monks and merchants have for four centuries been hollowing out chapels and filling them with paradise — a thousand grottoes blazing with painted Buddhas, flying apsaras, and the donor-portraits of frightened men buying merit before the desert. Pilgrims pray here for water; you would do well to join them, and to fill every skin besides.",
 'Hami':"Hami is an island of green in a sea of black gravel, and after the Gashun Gobi you could weep at the sight of it. The melons are famous to the point of legend — so sweet that the Tang court demands them as tribute, packed in ice and snow and run east by relay. The town itself is modest: a walled oasis, vineyards, irrigation ditches, and the universal desert architecture of flat-roofed mud-brick that has not changed and will not change.</p><p>Out in the waste to the south lies dead Loulan and the bones of older roads — cities the desert ate when the rivers wandered. The locals do not go there. Neither, if you are sensible, will you.",
 'Turfan':"You descend into the Turfan depression as into an oven; the land sinks below the level of the distant sea, and the summer air shimmers like something solid. This is Gaochang, a city of rammed earth the colour of the ground it stands on, ringed by the most ingenious farms on the Road. Lacking rivers, the people tap the mountain snowmelt through karez — underground channels, mile upon mile of them, dug and maintained by hand so the precious water does not boil away before it reaches the vines.</p><p>And vines there are: Turfan grows its own grapes and presses its own wine, which is why the western vintages you may be hauling will find no buyers here. To the north the Flaming Mountains burn red and bare at noon, looking exactly as hellish as their name.",
 'Kucha':"Kucha is the city of musicians, and it sounds like it — the Kuchean lute and the Kuchean dancing-girl are the height of fashion two thousand li away in Chang'an, and here they are merely the racket at every second door. It is a rich Buddhist kingdom of the northern rim, its wealth built on the oasis fields and the caravans, its faith carved into the cave-temples of Kizil out in the cliffs, where the painters favour a cool blue-grey palette unlike anything to the east.</p><p>The town stands on its river under the snow-wall of the Tianshan, green and confident. Monks in red robes share the streets with horse-traders and Sogdian factors, and the whole place has the slightly smug air of a city that has been comfortable for a very long time.",
 'Aksu':"Aksu — the 'white water', for the pale glacial river that comes down off the Tianshan and gives the oasis its life. It is a trade town more than a great city, a cluster of mud-brick and poplar-shade under the enormous indifference of the Heavenly Mountains, which stand white and judgemental along the whole northern sky. Caravans stop to trade, to re-shoe camels, and to lie about the road behind them.</p><p>The mountains here are the point. They are a wall against the steppe to the north and a source of the water without which none of this would exist, and on a clear morning their snowfields seem close enough to touch and cold enough to kill, which from time to time they are.",
 'Kashgar':"Kashgar is where the world reconnects. The two roads around the Taklamakan — the northern by Kucha, the southern by Khotan — come back together here at the foot of the Pamirs, and every caravan that has survived either one arrives wanting to compare casualties. It is the great western mart of the Tarim: a sprawl of bazaars, mosques-to-come and Buddhist shrines, mud-brick lanes, and orchards fed by the Kashgar river.</p><p>Pepper comes up over the passes from India and is nearly cheap here; jade goes out, and silk, and slaves, and news. Beyond the town the Pamirs rise like a closed door — the Roof of the World — and somewhere up in that maze, the old itineraries say, stood the Stone Tower where the merchants of the east once handed their silk to the merchants of the west. Men still argue where it was.",
 'Miran':"Miran is a fortress and a memory by the salt-crusted ghost of Lop Nor, where a lake used to be and the wind now organises the dust. The Tang hold it as a waystation on the harsh southern road; its frescoes are older than that — winged figures with great dark eyes, painted by some long-gone hand schooled half a world to the west, in a style that has no business being here and is.</p><p>There is little comfort in Miran and less water than the maps promise. It is a place to fill the skins, distrust the wells, and move on before the salt and the silence get into your thinking.",
 'Khotan':"Khotan is the kingdom of jade and the jewel of the southern road, an ancient Buddhist realm strung along its oasis where two rivers — the White Jade and the Black Jade — come down out of the Kunlun carrying the precious stone as common gravel. Men wade the shallows in the cold months with their eyes on the riverbed, and the kings of Khotan have grown fat on what they find. The town is green and devout, ringed by mulberry and the hum of the silk that (the legend says) a smuggling princess first brought here in her hair.</p><p>To the south the Kunlun range holds up the sky, grey and immense; to the north the desert waits. Buy jade here while it is cheap — in the west they will pay through the nose, and in Chang'an they paid more still, but you are going the wrong way for that, and a margin is a margin.",
 'Yarkand':"Yarkand is a fat, green, pleasant oasis where the southern caravans rest and recover their nerve before or after the long desert. Its river rolls down from the Pamirs and Karakoram, its fields are broad and well-watered, its bazaar cheerful. After Miran and the salt-waste, it feels like a kind of mercy.</p><p>This is a place to fatten the camels, mend the harness, lay in food and water, and listen to other men lie about the crossing they have just survived or are about to attempt. Everyone in Yarkand, you will notice, is an expert on the desert, and none of them is currently in it.",
 'Akhsikath':"Akhsikath is the chief city of the Ferghana valley and the seat of its princes, set on a high bluff above the Syr Darya where the river runs broad and cold out of the eastern mountains. Its citadel and long mud walls command the river-crossing, and within them the old Iranian lords of Ferghana keep a court that has paid tribute by turns to Tang and Turk and now eyes the Arabs pressing up from the west. The old Roman geographers wrote of a 'Stone Tower' somewhere in these mountains where the silk changed hands between the merchants of the two worlds; scholars will argue forever which crag they meant, but the caravans care only that when the towers of Akhsikath lift above the river, they have come down safe out of the passes.</p><p>Below the walls spreads Ferghana itself — the valley of the famous 'heavenly horses' that sweat blood, for which a Han emperor once sent armies. Your camels regard the legend without enthusiasm. The bazaar is a crossroads of Turk, Sogdian, and Chinese goods, and the air, after the heights, tastes absurdly of orchards. Up on the surrounding slopes the round felt yurts of the Turkic herders dot the high pastures, their flocks scattered among the wildflowers — and among the burrows of the fat marmots the hill-folk hunt warily, for they say a fever lives in the little beasts' fleas.",
 'Samarkand':"Samarkand is the queen of the Sogdian cities and looks it — set on the green terraces above the Zarafshan, the 'gold-strewing' river, ringed by orchards and gardens and a long circuit of walls, fed by lead-lined aqueducts that bring water clear across the ravines. The citadel and the merchant town hum with a confidence built on centuries of being the indispensable middlemen of Asia; Sogdian is the language of trade from here to China, and Samarkand's sons are scattered along every li of the Road keeping the family accounts.</p><p>Lately the city has learned a new trick. Craftsmen — the story says prisoners taken at the Talas river a decade ago — have set up the making of paper here, fine smooth paper to rival anything from the east. It is wonderful for Samarkand and ruinous for anyone still hauling reams of the stuff west, as you may be about to discover.",
 'Bukhara':"Bukhara rises from the flat green of its oasis at the desert's edge, a city of scholars, silver, and water — domes and minarets-to-come, bath-houses, and a web of channels and pools that bring the precious river through every quarter (and, the locals admit, breed a fever in summer that they would rather you did not ask about). The citadel, the Ark, broods over a town already old and already learned. This is a place that argues theology in the morning and prices in the afternoon, and takes both seriously.</p><p>Lapis lazuli arrives here by the sackful, carried down out of the Badakhshan mountains far to the south-east — the only source worth the name in all the world — and leaves again by the caravan-load. In Constantinople they will grind that blue stone into the robes of painted saints. Here it is merely stock.",
 'Merv':"Merv is the great oasis of the Karakum, a 'queen of the world' ringed by walls and canals where the sand gives way with shocking suddenness to melon-fields and gardens. Everything passes through Merv eventually — the roads from China, India, Persia, and the steppe all knot together here — and the city has grown rich and many-walled on the toll of simply being unavoidable. Its hospitals and its scholars are famous; a sick traveller has worse places to fall ill.</p><p>The mulberry-shade and the running water are a paradise after the desert, but do not be deceived: the Karakum laps right up to the gardens, and a half-day in the wrong direction is all sand and wind again. Drink, rest, and lay in water. Merv is an island, and the sea around it is thirsty.",
 'Nishapur':"Nishapur stands on the skirts of the Binalud mountains, a handsome Khurasani city of mud-brick and walled gardens, growing fast and grand. In the hills above, the mines give up turquoise — the 'Nishapur blue', the finest in the world — and in the taverns below, the poets give up verse, both in quantities of variable quality. It is a place of trade and argument and a particular dry mountain light.</p><p>This is deep in Khurasan, the eastern heart of the Abbasid world and the country from which the black banners of the revolution lately marched on Baghdad. The talk is of governors and tax-farmers and the price of mules, and underneath it the old Persian bones of the place show through everywhere you look.",
 'Rey':"Rey is one of the oldest cities of Persia, sprawling below the snow-topped wall of the Alborz where the mountains meet the northern desert. It is a hinge of roads — the great Khurasan highway passes through, east to west — and its bazaar is a roaring confusion of Persians, Arabs, Daylamites from the mountains, and Turks from the steppe, every one of them haggling in his own language at the top of his voice. Gardens and qanat-fed orchards soften the edges; the citadel watches the plain.</p><p>It is a city that has been important for so long it has stopped being surprised by anything, including you. Buy, sell, water the camels, and try not to be cheated in four languages at once.",
 'Baghdad':"You have arrived at a miracle in mid-construction. The Caliph al-Mansur's Round City — Madinat al-Salam, the City of Peace — is barely begun, raised these last few years on the west bank of the Tigris: a perfect circle of double mud-brick walls, four gates at the quarters, and the green-domed palace and the great mosque at the dead centre, the whole thing still half scaffolding and swarming with the labour of the world. Around it a sprawl of markets, wharves, and pontoon-bridges is already outgrowing the plan.</p><p>Down on the river, ships from Basra and the Gulf unload coral and pearls and the goods of India and beyond; the canals run thick with traffic. The locals will tell you, with maddening certainty, that this raw brick circle will become the centre of the world. Locals everywhere say that. Here, standing in the dust and the hammering, you find you almost believe them.",
 'Aleppo':"Aleppo is caravans, citadel, and the smell of cumin. Its great tell — the mound that will one day carry a famous fortress — already lifts its bulk over a warren of markets where the goods of Syria, the desert, and the sea change hands under awnings. This is the last great Mediterranean bazaar before the road turns inland; behind the haggling you can almost taste the salt of a sea you have not seen in a year, and the Roman frontier is close enough that prices begin to be quoted, hopefully, in Greek.</p><p>From here a wise merchant has a choice the desert never offered him: he can keep to the camels and climb the long road over the Taurus into Anatolia — or sell the beasts, carry his cargo down to the coast, and let a ship do the work that a thousand li of mountain would otherwise demand.",
 'Iconium':"Up on the high Anatolian plateau the air thins and the world turns Roman and cold. Iconium — the Romans say Ikonion, though you hear some locals already fondly clipping it to ‘Konya’ — is a walled provincial town on a bare, treeless tableland, ringed by its own irrigated gardens like a green coin dropped on brown felt, with the Taurus a white rumour to the south. The churches are domed and the icons are everywhere; the garrison is watchful, for this is a land that has learned to expect raiders out of the east every summer.</p><p>It is a frontier town in spirit even this far inside the Empire — sober, fortified, suspicious, and very far from the golden City it answers to. The plateau wind never quite stops, and the wine is as sharp as the people.",
 'Constantinople':"You make your camp at Chalcedon, on the Asian shore, where the long road from the east finally runs out of land — and across a mile of fast grey water stands the City itself, the Queen of Cities, Constantinople. Even at this distance it stops the breath: the sea-walls and the land-walls marching over the hills, the domes, and above them all the vast shallow golden dome of the Great Church, Hagia Sophia, seeming to float without support. Ships beyond counting work the Bosphorus between you and it; the Golden Horn is a forest of masts.</p><p>The Romans are wary of caravans and careful of who they let through the gates, so the trade is done here on the near shore, brokers rowing across to dicker in Greek over your silk and jade and musk and lapis. You came two empires and a year and more to stand on this beach and look at that skyline. Whatever else the road took from you, it brought you here."
};

function seaOffer(){ S.pendingEvent=seaEvent(); render(); }
function convoyValue(){ if(!S)return 0; let v=S.silver||0; for(const g of GOODS) v+=(S.goods[g.id]||0)*((g.e+g.w)/2); if(typeof herdValue==='function' && S.itin && S.itin[S.idx]) v+=herdValue(S.itin[S.idx]); return Math.round(v); }
function piratesResolve(str,pirates){
  const margin=str-pirates;
  if(margin>=0){ banditRep(0.90,1); let s="Bows, boarding-pikes, and chaos on the wet decks. The pirates break off and pull for the shore."; if(rnd()<Math.max(.08,.40-.07*margin)){ const who=casualty(rnd()<.4); if(who) s+=" "+who+(/\(/.test(who)?" is killed in the boarding":" takes a wound but will mend"); } S.silver+=20+ri(40); s+=" You take what coin the dead were carrying."; if(S.hp<=0){S.cause='pirates';die();log(s);return;} log(s); S.pendingEvent={h:'PIRATES DRIVEN OFF',t:s,ch:[{l:'Sail on',f(){}}]}; }
  else { S.cause='pirates'; for(const p of (S.party||[])) p.alive=false; S.hp=0; die(); log("They are too many. The fight is short and one-sided; the pirates take the ship, the cargo, and every soul aboard. Your venture ends on a red deck in a foreign sea."); }

function pirateVessel(){

    return " Deep in the Roman midwinter the Christians keep their greatest feast — the birth of their God. The churches blaze with candle and lamp, the markets shut for it, and even the customs-men turn briefly, suspiciously, kind. You set it down in your journal: a festival of lights and roast goose at the dead of winter, not so unlike the New Year at home, though reckoned by another heaven.";
  }

    const snowy = c.terr==='mountain'||c.terr==='steppe'||['Iconium','Nishapur','Akhsikath','Rey','Kashgar','Wuwei','Lanzhou','Samarkand','Bukhara'].includes(c.name);

  }
  if(m>=3 && m<=4) return " Spring stirs the dust and the trade alike, and the road shakes off its winter stiffness.";

function normalizeMember(p){
  if(!p) return p;
  if(p.hp==null) p.hp=100;
  if(!p.skills) p.skills={};
  var base={trade:0,cook:0,handle:0,hunt:0,fight:0,track:0,stalk:0,archery:0};
  for(var k in base){ if(p.skills[k]==null) p.skills[k]=base[k]; }
  if(p.__subInit!==true){ var h=p.skills.hunt||0; if(h>0){ if(!p.skills.track)p.skills.track=h; if(!p.skills.stalk)p.skills.stalk=h; if(!p.skills.archery)p.skills.archery=h; } p.__subInit=true; }
  if(p.riverwise && p.salty==null) p.salty=true;            // old saves: riverwise -> salty
  if(p.mount==null) p.mount=false;                          // assigned a riding horse?
  if(!p.gear) p.gear={armor:null,bow:null,weapon:null};     // extensible: lamellar armour, recurve bow, (1271) crossbow...
  if(p.__gearInit!==true){ var _ft=p.skills.fight||0, _ht=p.skills.hunt||0;
    if(p.kind==='guard' || (_ft>=2 && _ft>=_ht)){ if(!p.gear.weapon) p.gear.weapon=originWeapon(p); }   // a fighter carries a blade fitting their homeland
    else if(_ht>=2 && _ht>=_ft){ if(!p.gear.bow) p.gear.bow='bow'; }                              // a hunter carries a bow
    p.__gearInit=true; }
  if(p.__wpnFix!==true){ if(p.gear.weapon==='sword'){ var _ow=originWeapon(p); if(_ow!=='sword') p.gear.weapon=_ow; } p.__wpnFix=true; }
  return p;
}
function normalizeParty(){ if(S&&S.party) S.party.forEach(normalizeMember); }
/* accessors so mechanics can read members uniformly (and old/unnormalised members degrade gracefully) */
function memHp(p){ return (p&&p.hp!=null)?p.hp:100; }
function memSkill(p,k){ return (p&&p.skills&&p.skills[k])||0; }
function hasMount(p){ return !!(p&&p.mount); }
function setMount(p,v){ if(p) p.mount=!!v; }
function memGear(p,slot){ return (p&&p.gear)?p.gear[slot]:null; }
function setGear(p,slot,v){ if(p){ p.gear=p.gear||{}; p.gear[slot]=v; } }

  if(!s) return s;

  if(s.huntRisk==null) s.huntRisk=0;

  if(!s.onceFlags) s.onceFlags={};
  if(!s.herd){ s.herd={donkey:0,mule:0,horse:0,bactrian:(s.camels||3),dromedary:0,hybrid:0}; }
  if(s.startSilver==null) s.startSilver=900;
  if(!s.priceLock) s.priceLock={};
  if(!s.seen) s.seen={};
  if(s.lucky==null) s.lucky=false;

  if(!s.log) s.log=[];

  '<p>Final worth: <span class="gold" style="font-size:1.25rem">'+score+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+')</span></p>'+

  '<div style="text-align:center"><button onclick="backToTitle()">Begin a new venture</button></div>';

async function loadSave(){
  try{ const r=await STORE.get('silkroad_save'); if(r && r.value){ return JSON.parse(r.value); } }catch(e){}
  return null;
}
async function resumeGame(){
  let o=null;
  try{ const r=await STORE.get('silkroad_save'); if(r && r.value) o=JSON.parse(r.value); }catch(e){}
  if(!o || !o.S){ render(); return; }
  try{ await STORE.set('silkroad_save',''); }catch(e){} // one continuity — the save is spent on loading
  S=migrate(o.S);
  S.pendingEvent=null; S.eventOutcome=null; S.journeying=false; clearJourney();
  if(S.screen==='travel' || !S.screen) S.screen='city';
  log('You take up the journey again where you laid it down. (The saved game is spent — there is only one road forward from here.)');
  if(S.screen==='sailing' && S.sail){ S.sailing=true; render(); sailTimer=setInterval(stepSail, DAY_MS); return; }
  if(S.screen==='voyage' && S.voy){ S.voyaging=true; render(); voyTimer=setInterval(stepVoy, DAY_MS); return; }
  render();
}
function fillResumeSlot(){
  const el=$('resumeslot'); if(!el) return;
  loadSave().then(o=>{
    if(!el || !o || !o.S) return;
    const s=o.S, where=(s.itin && s.itin[s.idx])?s.itin[s.idx].name:'the road';
    el.innerHTML='<div class="panel" style="border-color:var(--silk)"><h3 class="gold" style="margin-bottom:4px">A journey set aside</h3>'+
      '<p class="sub" style="margin:0 0 8px">'+(s.name||'A merchant')+' — '+(s.returning?'homeward':'outbound')+', day '+((s.day||1)-1)+', last seen at '+where+'. Saved under v'+(o.v||'?')+'.</p>'+
      '<button class="seal" onclick="resumeGame()">Take up the journey again</button> '+
      '<span class="sub">resuming clears the save — one continuity only</span></div>';
  });
}

 donkey:   {n:'donkey',         pl:'donkeys',         base:25, cap:35, carry:7,  thirst:.95, note:'cheap, sure-footed, a small load',

};
const ANIMAL_ORDER=['donkey','mule','horse','bactrian','dromedary','hybrid'];
function animalAvailable(id,c){ const A=ANIMALS[id]; if(A.gate){ const f=c.frac!=null?c.frac:.5; return f>=A.gate[0] && f<=A.gate[1]; } return true; }
function animalPrice(id,c){ const A=ANIMALS[id]; if(c && ANIMAL_OVR[id] && ANIMAL_OVR[id][c.name]!=null) return ANIMAL_OVR[id][c.name]; const f=c&&c.frac!=null?c.frac:.5; const p=A.base*(1+A.spread*Math.abs(f-A.nf)); return Math.max(Math.round(A.base*.8), Math.round(p)); }
function animalSell(id,c){ return Math.round(animalPrice(id,c)*.85); }

function totalAnimals(){ if(!S||!S.herd)return 0; let n=0; for(const k in S.herd)n+=S.herd[k]; return n; }
function herdCap(){ if(!S||!S.herd)return 0; let c=0; for(const k in S.herd) if(ANIMALS[k]) c+=S.herd[k]*ANIMALS[k].cap; return c; }
function herdCarry(){ if(!S||!S.herd)return 0; let w=0; for(const k in S.herd) if(ANIMALS[k]) w+=S.herd[k]*ANIMALS[k].carry; return w; }
function thirstFactor(){ if(!S||!S.herd)return 1; let tot=0,acc=0; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const w=S.herd[k]*ANIMALS[k].cap; acc+=w*ANIMALS[k].thirst; tot+=w; } } return Math.max(0.6, tot>0?acc/tot:1); } // floor = the people, who always drink in the desert
function speedMult(terr){ if(!S||!S.herd)return 1; let m=null; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const v=(ANIMALS[k].spd[terr]!=null)?ANIMALS[k].spd[terr]:1; m=(m===null)?v:Math.min(m,v); } } return m===null?1:m; }
function gainAnimal(id){ if(!S.herd)S.herd={}; S.herd[id]=(S.herd[id]||0)+1; }
function clearHerd(){ if(S.herd) for(const k in S.herd) S.herd[k]=0; }
function herdValue(c){ let v=0; if(S.herd) for(const k in S.herd) v+=S.herd[k]*animalSell(k,c); return v; }
function belovedNote(){
  if(!S || !S.startHerdSnap) return '';
  const types=Object.keys(S.startHerdSnap).filter(k=>S.startHerdSnap[k]>0);
  if(!types.length) return '';
  if(!types.every(k=>(S.herd[k]||0)>=S.startHerdSnap[k])) return '';
  if(types.length===1 && S.startHerdSnap[types[0]]===1){
    const a=ANIMALS[types[0]].n;
    return 'And the same '+a+' that carried your first load out of '+homeName()+' is standing here beside you still — footsore, unbothered, entirely yours. Not everyone brings their '+a+' home.';
  }
  return 'And every one of the '+types.map(k=>ANIMALS[k].pl).join(' and ')+' you first set out with is still in the string — never once sold or buried below your starting team. A drover\'s quiet pride.';
}
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function loseAnimal(){ const pool=[]; if(S.herd) for(const k in S.herd){ for(let i=0;i<S.herd[k];i++) pool.push(k); } if(!pool.length) return 'an animal'; const k=pick(pool); S.herd[k]--; return (/^[aeiou]/i.test(ANIMALS[k].n)?'an ':'a ')+ANIMALS[k].n; }

function herdCompList(sep){ const a=ANIMAL_ORDER.filter(id=>S.herd && S.herd[id]>0).map(id=>S.herd[id]+' '+(S.herd[id]>1?ANIMALS[id].pl:ANIMALS[id].n)); return a.length?a.join(sep||', '):'no animals'; }
function terrainHint(){
  const ts=['settled','steppe','desert','harsh','mountain']; const best=[],worst=[];
  for(const t of ts){ const m=speedMult(t); if(m>=1.0)best.push(TERR_DESC[t]); else if(m<.8)worst.push(TERR_DESC[t]); }
  let s='';
  if(worst.length) s+='This mix labours on '+worst.join(' and ')+'. ';
  if(best.length) s+='It is well-suited to '+best.join(', ')+'.';
  return s||'A balanced mix for any road.';
}
function caravanSummary(){
  return '<div class="panel"><p style="margin:0"><b>Your caravan:</b> '+herdCompList()+'.</p>'+
    '<p class="sub" style="margin:4px 0 0">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. '+terrainHint()+'</p>'+herdingNote()+'</div>';
}
function showHerd(){

  S.pendingEvent={h:'THE CARAVAN', t:comp+'<br><br><span class="sub">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. The train moves only as fast as its worst-suited animal for the ground underfoot — '+terrainHint()+'</span>', ch:[{l:'Close',f(){}}]};
  render();
}
function openAnimals(){ if(!S)return; if(S.screen==='city'){ S.screen='animals'; render(); } else showHerd(); }
function buyAnimal(id){
  const c=city();
  if(!animalAvailable(id,c)){ log(cap1(ANIMALS[id].pl)+' are not sold in '+cityLabel(c)+'.'); render(); return; }
  const p=animalPrice(id,c);

function sellAnimal(id){
  if(!S.herd||(S.herd[id]||0)<=0){ render(); return; }

  if(cargoW()>cargoCap()) note = totalAnimals()===0
    ? " You have no pack animal now — buy a beast before you set out, or the cargo stays here."
    : " Your remaining animals can't carry all the cargo — buy another, or sell goods, before you set out.";
  log("You sell a "+ANIMALS[id].n+" for "+sp+" silver."+note);
  render();
}
function renderAnimals(m){

    '<p class="sub">Each beast suits a different road, and the caravan moves only as fast as its worst-suited animal — so match the herd to the country ahead. Prices favour whatever is native here; the hybrid bukht is sold only in the middle lands, between Sogdiana and Mesopotamia; the Bactrian belongs to the east and is not found for sale in the Levant.</p>'+

    '<div style="margin-top:10px"><button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button></div>';

function evWildHorses(){
  if(!cooled('wildhorse',25)) return null;
  const here=city().name, ahead=nextCity()?nextCity().name:'';
  const f=(nextCity()||city()).frac;
  const near = here==='Akhsikath'||ahead==='Akhsikath'||here==='Samarkand'||ahead==='Samarkand'||(f>=.40&&f<=.56);
  if(!near) return null;
  markEv('wildhorse');
  return {h:'WILD HORSES',t:"A herd of horses runs loose on the Ferghana grass — the famed blood-sweating breed, manes streaming, supremely uninterested in your caravan. A few are young enough to gentle, if you have the nerve and a day to spare.",
  ch:[
   {l:'Try to catch one (1 day)',f(){ passDays(1); if(S.dead) return; const sk=skillMax('handle'); if(rnd()<(.35+.10*sk)){ gainAnimal('horse'); S.water=Math.min(S.water,waterMax()); log("After a day of dust and bruises, you rope a young Ferghana horse into the company. It submits with very poor grace."); } else { S.hp=clamp(S.hp-3,0,100); log("A day of glorious failure. The horses regard your efforts with the lordly contempt of the genuinely fast."); } }},
   {l:'Admire them and ride on',f(){ log("You watch the herd pour over a ridge like water, and think better of it. Some things are not for the catching."); }},
  ]};
}

// ill-suited animals don't just slow you — they can die, worse in the bad season
function applyAnimalPeril(terr){
  if(!S.herd) return;
  const f=(nextCity()||city()).frac, m=monthNum();
  const care=Math.max(.35, 1 - .14*skillMax('handle'));   // a good camel-hand keeps the beasts alive
  for(const id of ANIMAL_ORDER){
    if(!S.herd[id]) continue;
    let p=0;
    if(id==='dromedary' && terr==='mountain')                         p=.04 + .07*passDanger();    // cold kills the desert camel
    else if(id==='bactrian' && (terr==='desert'||terr==='harsh') && f>=.74) p=.025 + ((m>=5&&m<=7)?.04:0); // heat kills the woolly camel in the Levant
    else if(id==='horse' && terr==='harsh')                            p=.06;                       // the deep desert is no place for a horse
    else if(id==='horse' && terr==='desert')                          p=.035;                      // thirsty horses die in the sands
    else if(id==='horse' && terr==='mountain')                        p=.04 + .05*passDanger();    // high cold passes are no place for a horse either
    else if(id==='donkey' && terr==='harsh')                          p=.025;                      // the deep desert takes the little donkey too
    else if(id==='donkey' && terr==='desert')                         p=.015;
    else if(id==='mule' && terr==='harsh')                            p=.022;                      // tough, but not proof against the killing waste
    else if(id==='mule' && terr==='desert')                           p=.012;
    if(p<=0) continue;
    if(rnd() < p*care){ const toll=Math.max(1, Math.round(S.herd[id]*0.08)); S.herd[id]=Math.max(0,S.herd[id]-toll); perilLog(id, terr, toll); }
  }
  const over=herdOverload();
  const strayP = over>1 ? Math.min(.30,(over-1)*0.5) : (over>0.85 ? (over-0.85)*0.2 : 0);
  if(strayP>0 && totalAnimals()>1 && rnd()<strayP){ const a=loseAnimal(); log("With too few hands to mind so many beasts, "+a+" strays from the line in the night and is gone by morning."); }
}
function perilLog(id, terr, n){
  n=n||1;
  const why = id==='dromedary' ? "the cold of the high passes"
            : id==='bactrian'  ? "the furnace heat of the western desert"
            : terr==='mountain'? "the cold"
            : "the killing waste";
  const subj = n>1 ? (n+" of your "+ANIMALS[id].pl+" falter and die") : ("One of your "+ANIMALS[id].pl+" falters and dies");
  log(subj+" on the road — "+ANIMALS[id].pl+" were never bred for "+why+". You divide the loads among the rest, who are not consulted.");
}

// hunt straight from the road without a separate "make camp" click

// turn around mid-leg, retracing the distance already walked back to the last town
function turnBack(){
  if(!S || S.screen!=='travel') return;
  const wasMoving=S.journeying;
  S.journeying=false; clearJourney();
  const d=S.dir||1, x=S.legKm;
  S.idx += d;                          // step onto the city we were heading toward
  S.dir = -d;                          // and reverse
  S.legKm = Math.max(0, legDist() - x);// remaining distance back = the li already covered
  const back=nextCity();
  log("You turn the caravan around, retracing the "+Math.round(x)+" li back toward "+(back?back.name:'the last town')+".");
  if(wasMoving) startJourney(); else render();
}

/* ============ v0.9.3 — Oregon-Trail-style afflictions ============ */
function evCholera(){

  const cook=skillMax('cook');

/* ============ v0.9.7 — NaN self-healing ============ */
function sanitizeS(){
  if(!S) return;
  const fin=(v,d)=> (typeof v==='number' && isFinite(v)) ? v : d;
  if(S.herd){ for(const k in S.herd) S.herd[k]=Math.max(0,Math.round(fin(S.herd[k],0))); }
  S.silver = Math.max(0, fin(S.silver,0));
  S.food   = Math.max(0, fin(S.food,0));
  S.hp     = clamp(fin(S.hp,50),0,100);
  S.day    = Math.max(1, Math.round(fin(S.day,1)));
  S.legKm  = Math.max(0, fin(S.legKm,0));
  S.water  = clamp(fin(S.water, waterMax()), 0, waterMax());
  if(S.goods) for(const g of GOODS){
    S.goods[g.id]=Math.max(0,Math.round(fin(S.goods[g.id],0)));
    if(S.basis)     S.basis[g.id]=fin(S.basis[g.id],0);
    if(S.lastBasis) S.lastBasis[g.id]=fin(S.lastBasis[g.id],0);
  }
  S.huntLuck=fin(S.huntLuck,0); S.huntRisk=fin(S.huntRisk,0);
  S.banditMod=fin(S.banditMod,0); S.banditFreq=fin(S.banditFreq,1);
  S.dealDays=fin(S.dealDays,0);
  S.selfTrade=fin(S.selfTrade,0);
  if(S.dash && S.dash.kind!=='vara' && S.screen!=='travel' && S.screen!=='lost') S.dash=null;
  if(!S.dash && S.itin && S.itin.length===2 && typeof fullRoute==='function' && S.screen!=='travel' && S.screen!=='lost'){ var _nm=(S.itin[S.idx]&&S.itin[S.idx].name); var _ri=fullRoute(S.route||'s',isWest()); var _i=_nm?_ri.findIndex(function(x){return x.name===_nm;}):-1; if(_i>=0){ S.itin=_ri; S.idx=_i; } }
}

const HAGGLE={
  'Ratnadevi':{ jade:0.08 },   // the jade-trader's daughter knows the stone
  'Irene':{ silk:0.08 },       // the silk-factor's widow knows the bolt
};
function haggler(gid){
  let best=null, bv=0;
  for(const p of livingParty()){ const h=HAGGLE[p.name]; if(h && h[gid] && h[gid]>bv){ bv=h[gid]; best=p; } }

}

/* ============ v0.9.11 — the merchant's notes (price comparison screen) ============ */
function recordSeen(){
  if(!S) return; if(!S.seen) S.seen={};
  const c=city(); if(!c||!S.stock||!S.stock[c.name]) return;
  const mm={}; for(const g of GOODS) mm[g.id]=price(g,c);
  S.seen[c.name]=mm;
}
function noteNeighbors(){
  const c=city(), out=[];
  const back=backHub(); if(back) out.push(back);
  if(!S.returning && !S.routeChosen && c.name==='Dunhuang'){ out.push(NORTH[0]); out.push(SOUTH[0]); } // Hami (north) & Miran (south)
  else if(c.name==='Kashgar'){ const f=fwdHub(); if(f) out.push(f); const o=otherForkCity(); if(o) out.push(o); }
  else { const f=fwdHub(); if(f) out.push(f); }
  return out;
}
function noteBase(cityObj,g){
  let base=(OVR[cityObj.name]&&OVR[cityObj.name][g.id]!=null)?OVR[cityObj.name][g.id]:g.e+(g.w-g.e)*cityObj.frac;
  if(g.id==='silk'&&S.silkBoost&&cityObj.frac>.25)base*=1.25;
  return Math.max(1,Math.round(base));
}
function notePrice(cityObj,g){
  if(S.seen && S.seen[cityObj.name] && S.seen[cityObj.name][g.id]!=null) return {known:true, p:S.seen[cityObj.name][g.id]};
  return {known:false, p:noteBase(cityObj,g)};
}
function rumorWord(here,est){ const d=here>0?(est-here)/here:0; if(d>0.08)return 'higher'; if(d<-0.08)return 'lower'; return 'unknown'; }
function renderNotes(m){
  const c=city();
  let cols;
  if(S.seaMode){
    const nb=seaEdges(c.name).map(e=>cityByName(e.to)).filter(Boolean).slice(0,3); const mid=Math.floor(nb.length/2);
    cols=[...nb.slice(0,mid).map(n=>({city:n})), {here:true}, ...nb.slice(mid).map(n=>({city:n}))];
  } else {
    const back=backHub();
    const fwds=[]; if(!S.returning && !S.routeChosen && c.name==='Dunhuang'){ fwds.push(NORTH[0],SOUTH[0]); } else if(c.name==='Kashgar'){ const f=fwdHub(); if(f)fwds.push(f); const o=otherForkCity(); if(o)fwds.push(o); } else { const f=fwdHub(); if(f)fwds.push(f); }
    cols=[...fwds.map(n=>({city:n})), {here:true}, ...(back?[{city:back}]:[])];
  }
  const head='<tr><th>Good</th>'+cols.map(col=>col.here?'<th class="num">here</th>':'<th class="num">'+cityLabel(col.city)+'</th>').join('')+'<th>buy / sell</th></tr>';
  const noteCols=cols.map(col=>col.here?c:col.city).filter(Boolean);
  const _sellable={}; noteCols.forEach(function(X){ cityShownGoods(X).forEach(function(g){ _sellable[g.id]=1; }); });
  const shownNoteGoods=GOODS.filter(g=>(S.goods[g.id]||0)>0 || _sellable[g.id]);
  const rows=shownNoteGoods.map(g=>{
    const hp=price(g,c), held=S.goods[g.id], avail=S.stock[c.name][g.id];
    const ref=held>0?(S.basis[g.id]||0):(S.lastBasis[g.id]||0);
    const pcls=ref>0?(hp<ref?'green':(hp>ref?'blue':'gold')):'gold';
    let useful=false;
    const cells=cols.map(col=>{
      if(col.here){ return '<td class="num '+pcls+'">'+hp+'</td>'; }
      const np=notePrice(col.city,g);
      if(np.known){ useful=true; const cls=np.p>hp?'blue':(np.p<hp?'green':'gold'); return '<td class="num '+cls+'">'+np.p+'</td>'; }
      let w=rumorWord(hp,np.p); if(w!=='unknown' && hashf((S.runId||'r')+col.city.name+g.id)<0.2) w='unknown'; if(w!=='unknown') useful=true; const cls=w==='higher'?'blue':(w==='lower'?'green':'');
      const style=w==='unknown'?' style="color:var(--dim);font-size:.82em"':' style="font-size:.82em"';
      return '<td class="num"><span class="'+cls+'"'+style+'>'+w+'</span></td>';
    }).join('');
    const availTxt=avail>0?'<span style="color:var(--dim)"> · '+avail+'</span>':'<span class="red"> · none</span>';
    return '<tr><td>'+g.n+availTxt+'</td>'+cells+
      '<td><button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',1)">+1</button>'+
      '<button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',10)">+10</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',1)">−1</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',10)">−10</button></td></tr>';
  }).join('');
  m.innerHTML='<h2>The Merchant’s Notes <span class="sub">· '+cityLabel(c)+'</span></h2>'+
    '<p class="sub">Prices here against the neighbouring towns. A town you have <b>been to</b> shows its remembered prices; one you have not shows only road-rumour of how it compares to here — <span class="blue">higher</span>, <span class="green">lower</span>, or unknown. <span class="blue">Blue</span> = dearer there (carry it and sell); <span class="green">green</span> = cheaper there.</p>'+
    '<table>'+head+rows+'</table>'+
    '<p class="sub">Silver <b class="gold">'+Math.round(S.silver)+'</b> · cargo '+cargoW()+(S.seaMode?' aboard':'/'+cargoCap())+'. Remembered prices are what you saw last time you stood in that market.</p>'+
    '<button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button>';
}

// handling capacity vs. herd demand — real caravans run ~3-6 animals per drover
const ANIMAL_TEND={donkey:0.8, mule:1.0, horse:1.3, bactrian:0.8, dromedary:0.8, hybrid:0.9};

  const msg = over>1 ? 'too few hands for the herd — beasts will stray.' : (over>0.85 ? 'hands stretched thin — a beast could stray.' : 'well in hand.');
  return '<p class="'+cls+'" style="margin:4px 0 0;font-size:.78rem">Herding: '+herdDemand().toFixed(1)+' of '+herdCapacity().toFixed(0)+' capacity — '+msg+'</p>';

function lostBlurb(){
  const lp=livingParty();
  if(lp.length>=2){ const a=pick(lp); let b=pick(lp),g=0; while(b===a&&g++<6)b=pick(lp); return "The track forks where no fork should be. "+a.name+" and "+b.name+" disagree at volume."; }
  if(lp.length===1) return "The track forks where no fork should be. You and "+lp[0].name+" argue it out, which settles nothing.";
  return "The track forks where no fork should be, and you have no one to argue the point with — you wish, briefly, for a companion and a second opinion.";
}
function wealthArc(start,end){
  const r = start>0 ? end/start : end;
  if(start<=120){ // a humble origin
    if(r>=50) return "You set out with barely the clothes on your back and a single donkey; you come home a merchant prince, your name fit to be spoken in the same breath as the great houses. Songs will outlive you.";
    if(r>=10) return "You left with next to nothing and return genuinely, improbably rich — the kind of turn of fortune that founds dynasties and ends in legend.";
    if(r>=2)  return "From a donkey and a dream to a respectable estate: not bad at all for a nobody who saved their coppers.";
    if(r>=1)  return "You come home no poorer than you left, which, starting from nothing, is its own quiet triumph.";
    return "The Road gave you a story, if not a fortune. You are home, and that is more than many manage.";
  }
  if(r>=8)   return "You set out comfortable and return fabulously, almost embarrassingly wealthy. The ledger can scarcely hold the figure.";
  if(r>=2.5) return "A magnificent venture — your fortune multiplied many times over.";
  if(r>=1)   return "A solid profit, soberly earned.";
  return "You come home poorer than you set out. The Road keeps its own ledger, and this time it kept more than it gave.";
}

let sailTimer=null;

function startSailTimer(){ clearSail(); S.sailing=true; render(); sailTimer=setInterval(stepSail, DAY_MS); }
function stepSail(){
  if(!S || !S.sailing || S.pendingEvent || S.eventOutcome || S.screen!=='sailing' || !S.sail){ clearSail(); return; }
  if(S.food < foodNeed()){ S.sailing=false; clearSail(); S.pendingEvent=evSeaFood(); render(); return; }
  S.day++; S.food=Math.max(0,S.food-foodNeed()); S.hp=clamp(S.hp+0.3,0,100);
  if(!S.sail.sickRolled && (S.sail.total-S.sail.daysLeft)<=7){ S.sail.sickRolled=true; if(rnd()<0.5){ S.seasick=true; log("You are violently, comprehensively seasick — green at the rail, certain you will die and then afraid you won’t. It does no lasting harm; the sea does this to nearly everyone once."); } }
  S.sail.daysLeft--;
  if(S.sail.daysLeft<=0){ S.sailing=false; clearSail(); sailArrive(); render(); return; }
  const _p=(S.sail.total-S.sail.daysLeft)/S.sail.total;
  if(!S.sail.ephesusDone && _p>=0.5){ S.sail.ephesusDone=true; S.sailing=false; clearSail(); S.pendingEvent=evEphesus(); render(); return; }
  const _cp=(S.sail.target==='Aleppo')?0.75:0.25;
  if(!S.sail.chimeraDone && _p>=_cp){ S.sail.chimeraDone=true; log(CHIMERA_LINE); }
  const wreckP=(S.sail.winter?0.035:0.009)*(hasPilot()?0.9:1);
  if(rnd()<wreckP){ S.sailing=false; clearSail(); S.pendingEvent=evShipwreck(); render(); return; }
  if(rnd()<(hasPilot()?0.054:0.06)){ S.sailing=false; clearSail(); S.pendingEvent=evSeaWinds(); render(); return; }
  { const _r=seaLeg(_p,S.sail.target); let _pp=(/Eastern Med/.test(_r)?0.045:/Aegean/.test(_r)?0.022:0.006)*(S.banditFreq||1); if(convoyValue()>10000)_pp*=2; if(rnd()<_pp){ S.sailing=false; clearSail(); S.pendingEvent=evPirates(); render(); return; } }
  updateSail();
}

  const e=$('sDay'); if(e)e.textContent='Day '+S.day;
  const sl=$('sLoc'); if(sl)sl.textContent=seaLeg((S.sail.total-S.sail.daysLeft)/S.sail.total, S.sail.target);
  const r=$('sRemain'); if(r)r.textContent=S.sail.daysLeft+' day'+(S.sail.daysLeft!==1?'s':'')+' to '+S.sail.target;
  const p=$('sProg'); if(p)p.style.width=Math.round((1-S.sail.daysLeft/S.sail.total)*100)+'%';
  const ph=SKY[skyPhase()], set=(id,a,v)=>{const el=$(id);if(el)el.setAttribute(a,v);};
  set('sSkyTop','stop-color',ph.t); set('sSkyBot','stop-color',ph.b);

    { const _r=seaLeg(_p,S.sail.target); let _pp=(/Eastern Med/.test(_r)?0.045:/Aegean/.test(_r)?0.022:0.006)*(S.banditFreq||1); if(convoyValue()>10000)_pp*=2; if(rnd()<_pp){ S.pendingEvent=evPirates(); render(); return; } }

function evShipwreck(){

   ch:[{l:'Ride it out, and pray',f(){

function evSeaWinds(){
  const deep=(S.voy && S.voy.terr==='deep'); const tongue=captainTongue();
  const t = deep
    ? "The wind backs round and dies, then comes hard from the wrong quarter. There is no shore to run to out here \u2014 the captain curses in "+tongue+" as the ship is driven back on her course, ground she will have to make up again."
    : "The wind backs round and dies, then comes hard from the wrong quarter. The captain swears in "+tongue+" and puts in to a sheltered cove to wait it out.";

function evSeaFood(){

     if(S.silver>=cost){ S.silver-=cost; S.food+=amt; log("You pay the captain’s outrageous price for "+amt+" days of ship’s biscuit and salt fish. Robbery on the high seas, and entirely legal."); }
     else { let owed=cost-S.silver; S.silver=0; const sold=[];
       for(const g of GOODS){ if(owed<=0)break; if(S.goods[g.id]>0){ const unit=Math.max(1,Math.round(price(g,city())*0.5)); const need=Math.ceil(owed/unit); const n=Math.min(S.goods[g.id],need); S.goods[g.id]-=n; if(S.goods[g.id]<=0)S.basis[g.id]=0; owed-=n*unit; sold.push(n+' '+g.u+(n>1?'s':'')+' of '+g.n.toLowerCase()); } }
       if(sold.length){ S.food+=amt; log("You haven’t the coin, so the captain takes his price in cargo — "+sold.join(', ')+" — at a wrecker’s rate. You will eat, at least."); }
       else { recordRun('pressed into a ship\'s crew, day '+(S.day-1)); S.gameOverFate={h:'PRESSED INTO SERVICE', t:"You have nothing — no coin, no cargo, not even the means to feed yourself on the open water. The captain, not unkindly, signs you onto the ship's books as a common hand: you will work your passage and a good deal more, and there is no walking off a ship in the middle of the sea. The merchant you set out to be ends here, somewhere off the Anatolian coast, learning the names of ropes. It is, at least, a living."}; S.screen='fate'; } }
   }}]};
}

const CHIMERA_LINE="Off to the south, on the dark Lycian shore, a bare hillside flickers with pale flames that never die — the breath of the Chimera, the sailors say, the fire-breathing beast that Bellerophon pinned beneath the mountain. They have burned there longer than Rome has stood, and will burn long after.";
function seaLeg(p, target){
  const f=(target==='Aleppo')?p:(1-p); // f: 0 at Constantinople, 1 at Aleppo
  if(f<0.25) return 'the Sea of Marmara';
  if(f<0.33) return 'the Dardanelles';
  if(f<0.50) return 'the Aegean';
  return 'the Eastern Mediterranean';
}

]}; }

    {l:'Go ashore and look about',f(){ S.pendingEvent={h:'— EPHESUS —', t:"You climb from the silting harbour into a city living among its own giants. The vast theatre is still cut into the hillside — twenty-odd thousand seats where, the deacons will tell you, Saint Paul once started a riot among the silversmiths of Artemis. Above the town the great basilica of Saint John the Theologian crowns Ayasoluk hill, raised over the apostle's tomb and thick with pilgrims; its domes are the pride of the coast. Of the Temple of Artemis — one of the seven wonders of the old world — there is almost nothing: thrown down and burned centuries ago, its marbles long since carted off to raise churches, a few stumps in a marsh where herons fish. The old gods went quietly here; the new ones keep better upkeep.", ch:[{l:'Back to the harbour',f(){}}]}; }},

function renderSail(m){
  const s=S.sail; if(!s){ S.screen='city'; renderCity(m); return; }
  const pct=Math.round((1-s.daysLeft/s.total)*100);
  m.innerHTML='<h2>At sea, bound for '+s.target+'</h2>'+
    '<p class="sub"><span id="sDay">Day '+S.day+'</span> · <span id="sLoc">'+seaLeg((s.total-s.daysLeft)/s.total, s.target)+'</span> · <span id="sRemain">'+s.daysLeft+' day'+(s.daysLeft!==1?'s':'')+' to '+s.target+'</span></p>'+
    '<div class="bar"><i id="sProg" style="width:'+pct+'%"></i></div>'+
    sailScene()+
    '<p class="sub" style="margin-top:8px;border-left:2px solid var(--line);padding-left:10px">The coast is never long out of sight — the rugged mountains of Anatolia slide past to the north, and you are quietly glad you are not trying to drive a mule-train across them. The captain keeps the water-casks; your only cares are the food and the weather.</p>'+
    '<button class="seal" onclick="skipSail()">Skip ahead</button>';
}

/* ============ BANDIT-HIDEOUT REVENGE (local store; mirrors the Supabase graves table) ============ */
let GRAVES=null;
async function loadGraves(){ if(GRAVES)return GRAVES;
  if(SB_ON){ try{ const rows=await sbGet('graves?select=data,claimed&order=created_at.desc&limit=80'); GRAVES=rows.map(r=>Object.assign({}, r.data, {claimed:!!r.claimed})).filter(g=>g&&g.runId); return GRAVES; }catch(e){ /* offline */ } }
  try{ const r=await STORE.get('silkroad_graves'); GRAVES=r&&r.value?JSON.parse(r.value):[]; }catch(e){ GRAVES=[]; } return GRAVES; }
function saveGraves(){ try{ if(GRAVES) STORE.set('silkroad_graves', JSON.stringify(GRAVES.slice(-60))); }catch(e){} }
function writeGrave(bandits, cache){ GRAVES=GRAVES||[]; const _g={ runId:(S.runId||('g'+Date.now())), merchant:S.name, bandits:Math.max(1,bandits|0), cache:cache||{silver:0,goods:{}}, city:(city()&&city().name)||'', leg:(nextCity()&&nextCity().name)||'', terr:(nextCity()&&nextCity().terr)||'desert', version:VERSION, when:Date.now(), claimed:false }; GRAVES.push(_g); saveGraves(); if(SB_ON){ try{ sbSend('graves','POST',{run_id:_g.runId, claimed:false, data:_g}).catch(()=>{}); }catch(e){} } }
function cacheWorth(cache){ if(!cache)return 0; let v=cache.silver||0; if(cache.goods)for(const g of GOODS)v+=(cache.goods[g.id]||0)*((g.e+g.w)/2); return Math.round(v); }
function openGrave(){ if(!GRAVES)return null; return GRAVES.find(g=>!g.claimed && g.runId!==S.runId) || null; }
function evHideout(){
  if(!cooled('hideout',60)) return null;
  const grave=openGrave(); if(!grave) return null;
  markEv('hideout');
  const worth=cacheWorth(grave.cache);
  return {h:'A DESTROYED CARAVAN', t:"By the trail you come on the picked-over bones of a caravan — scattered packs, a broken cart, and a rough cairn where someone, later, buried what was left of "+(grave.merchant||'the merchant')+", who came this way before you and did not come through. The tracks of the killers — perhaps "+grave.bandits+" riders — lead off into the broken country toward a hideout that cannot be far."+(worth>0?" Word on the road is they carried off a haul worth something like "+worth+" silver.":""),
   ch:[
    {l:'Follow the tracks to their hideout',f(){
      enterBattle({n:Math.max(1,grave.bandits|0), sea:false, grave:grave, cache:{silver:Math.round(S.silver), goods:Object.assign({},S.goods)}});
    }},
    {l:'Bury the dead and move on',f(){ log("You say what words you know over the cairn, take nothing that is not yours, and put the broken caravan behind you. Some debts are not yours to collect."); }},
   ]};
}
/* T5.1: a hunter forages during a forced halt for injury/illness, so the lost days aren't wholly wasted */
function autoForage(days){ const h=bestAt('hunt'); if(!h||days<=0||S.dead)return; const got=Math.round(days*(1+skillMax('hunt'))*(0.5+rnd()*0.6)); if(got>0){ S.food+=got; log(h.name+", idle while the camp tends its hurt, slips off to hunt and brings back about "+got+" days of meat — the halt is not wholly wasted."); } }

 {name:'Luoyang', zh:'洛陽', frac:.015, desc:"The eastern capital, lately wrenched back from the rebels and still smelling of smoke. Here the Grand Canal begins — barges south to the Yangtze and the sea.",

 {name:'Yangzhou', zh:'揚州', frac:.03, desc:"The great canal-and-sea port at the mouth of the Yangtze — a cosmopolitan boomtown of foreign merchants, and lately a place of mourning.",
   arr:"The canal delivers you to Yangzhou on the Yangtze, where seagoing junks ride at anchor and a dozen languages haggle on the quay. Here you take ship at last.",
   adm:"Yangzhou, where the Grand Canal meets the Yangtze and the river meets the sea — the richest entrepôt of the south, thick with Persian and Arab traders, Sogdians, monks, and money. But the wharf-talk is grim: only two years past, in the chaos of the rebellion, the warlord Tian Shengong loosed his soldiers on the foreign merchants and thousands of Arabs and Persians were massacred in a single night for the silver in their strongrooms. The survivors do business with one eye on the gate. Seagoing junks ride at anchor here, high-sterned and many-sailed, bound for Canton and the South Seas."},
 {name:'Guangzhou', zh:'廣州', frac:.05, desc:"Canton — the Tang's great southern port, its walled foreign quarter loud with the merchants of half the world.",
