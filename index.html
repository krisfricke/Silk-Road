            spd:{settled:1.05,steppe:1.0, desert:.8,  harsh:.7,  mountain:1.1}, nf:.9,  spread:.5},
 horse:    {n:'horse',          pl:'horses',          base:110,cap:45, carry:9,  thirst:1.5, note:'fast on grass and road; thirsty in the sands',
            spd:{settled:1.15,steppe:1.2, desert:.65, harsh:.55, mountain:.85}, nf:.42, spread:.7},
 bactrian: {n:'Bactrian camel', pl:'Bactrian camels', base:68, cap:80, carry:16, thirst:.4,  note:'the eastern all-rounder; cold desert and high pass alike',
            spd:{settled:.9,  steppe:1.0, desert:1.05,harsh:1.05,mountain:1.0}, nf:.22, spread:1.25, gate:[0,.66]},
 dromedary:{n:'dromedary',      pl:'dromedaries',     base:78, cap:80, carry:16, thirst:.4,  note:'master of the hot western desert; suffers in cold mountains',
            spd:{settled:.9,  steppe:1.0, desert:1.15,harsh:1.15,mountain:.6},  nf:.9,  spread:1.45, gate:[.41,1]},
 hybrid:   {n:'hybrid bukht',   pl:'hybrid bukht',    base:150,cap:100,carry:18, thirst:.45, note:'the prized crossbreed; strong on desert and mountain both',
            spd:{settled:.95,steppe:1.05,desert:1.1, harsh:1.1, mountain:1.0}, nf:.66, spread:.6, gate:[.46,.82]},
};
const ANIMAL_ORDER=['donkey','mule','horse','bactrian','dromedary','hybrid'];
function animalAvailable(id,c){ const A=ANIMALS[id]; if(A.gate){ const f=c.frac!=null?c.frac:.5; return f>=A.gate[0] && f<=A.gate[1]; } return true; }
function animalPrice(id,c){ const A=ANIMALS[id]; if(c && ANIMAL_OVR[id] && ANIMAL_OVR[id][c.name]!=null) return ANIMAL_OVR[id][c.name]; const f=c&&c.frac!=null?c.frac:.5; const p=A.base*(1+A.spread*Math.abs(f-A.nf)); return Math.max(Math.round(A.base*.8), Math.round(p)); }
function animalSell(id,c){ return Math.round(animalPrice(id,c)*.85); }

function totalAnimals(){ if(!S||!S.herd)return 0; let n=0; for(const k in S.herd)n+=S.herd[k]; return n; }
function herdCap(){ if(!S||!S.herd)return 0; let c=0; for(const k in S.herd) if(ANIMALS[k]) c+=S.herd[k]*ANIMALS[k].cap; return c; }
function herdCarry(){ if(!S||!S.herd)return 0; let w=0; for(const k in S.herd) if(ANIMALS[k]) w+=S.herd[k]*ANIMALS[k].carry; return w; }
function thirstFactor(){ if(!S||!S.herd)return 1; let tot=0,acc=0; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const w=S.herd[k]*ANIMALS[k].cap; acc+=w*ANIMALS[k].thirst; tot+=w; } } return Math.max(0.6, tot>0?acc/tot:1); } // floor = the people, who always drink in the desert
function speedMult(terr){ if(!S||!S.herd)return 1; let m=null; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const v=(ANIMALS[k].spd[terr]!=null)?ANIMALS[k].spd[terr]:1; m=(m===null)?v:Math.min(m,v); } } return m===null?1:m; }
function gainAnimal(id){ if(!S.herd)S.herd={}; S.herd[id]=(S.herd[id]||0)+1; }
function clearHerd(){ if(S.herd) for(const k in S.herd) S.herd[k]=0; }
function herdValue(c){ let v=0; if(S.herd) for(const k in S.herd) v+=S.herd[k]*animalSell(k,c); return v; }
function belovedNote(){
  if(!S || !S.startHerdSnap) return '';
  const types=Object.keys(S.startHerdSnap).filter(k=>S.startHerdSnap[k]>0);
  if(!types.length) return '';
  if(!types.every(k=>(S.herd[k]||0)>=S.startHerdSnap[k])) return '';
  if(types.length===1 && S.startHerdSnap[types[0]]===1){
    const a=ANIMALS[types[0]].n;
    return 'And the same '+a+' that carried your first load out of '+homeName()+' is standing here beside you still — footsore, unbothered, entirely yours. Not everyone brings their '+a+' home.';
  }
  return 'And every one of the '+types.map(k=>ANIMALS[k].pl).join(' and ')+' you first set out with is still in the string — never once sold or buried below your starting team. A drover\'s quiet pride.';
}
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function loseAnimal(){ const pool=[]; if(S.herd) for(const k in S.herd){ for(let i=0;i<S.herd[k];i++) pool.push(k); } if(!pool.length) return 'an animal'; const k=pick(pool); S.herd[k]--; return (/^[aeiou]/i.test(ANIMALS[k].n)?'an ':'a ')+ANIMALS[k].n; }

function herdCompList(sep){ const a=ANIMAL_ORDER.filter(id=>S.herd && S.herd[id]>0).map(id=>S.herd[id]+' '+(S.herd[id]>1?ANIMALS[id].pl:ANIMALS[id].n)); return a.length?a.join(sep||', '):'no animals'; }
function terrainHint(){
  const ts=['settled','steppe','desert','harsh','mountain']; const best=[],worst=[];
  for(const t of ts){ const m=speedMult(t); if(m>=1.0)best.push(TERR_DESC[t]); else if(m<.8)worst.push(TERR_DESC[t]); }
  let s='';
  if(worst.length) s+='This mix labours on '+worst.join(' and ')+'. ';
  if(best.length) s+='It is well-suited to '+best.join(', ')+'.';
  return s||'A balanced mix for any road.';
}
function caravanSummary(){
  return '<div class="panel"><p style="margin:0"><b>Your caravan:</b> '+herdCompList()+'.</p>'+
    '<p class="sub" style="margin:4px 0 0">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. '+terrainHint()+'</p>'+herdingNote()+'</div>';
}
function showHerd(){
  if(!S||S.pendingEvent)return;
  const comp=ANIMAL_ORDER.filter(id=>S.herd && S.herd[id]>0).map(id=>'<b>'+S.herd[id]+'</b> '+(S.herd[id]>1?ANIMALS[id].pl:ANIMALS[id].n)+' <span class="sub">— '+ANIMALS[id].note+'</span>').join('<br>')||'No animals — you are carrying the load on your own back.';
  S.pendingEvent={h:'THE CARAVAN', t:comp+'<br><br><span class="sub">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. The train moves only as fast as its worst-suited animal for the ground underfoot — '+terrainHint()+'</span>', ch:[{l:'Close',f(){}}]};
  render();
}
function openAnimals(){ if(!S)return; if(S.screen==='city'){ S.screen='animals'; render(); } else showHerd(); }
function buyAnimal(id){
  const c=city();
  if(!animalAvailable(id,c)){ log(cap1(ANIMALS[id].pl)+' are not sold in '+cityLabel(c)+'.'); render(); return; }
  const p=animalPrice(id,c);
  if(S.silver<p){ log("You haven't the silver for a "+ANIMALS[id].n+" ("+p+" s)."); render(); return; }
  S.silver-=p; gainAnimal(id); S.water=waterMax();
  log("You buy a "+ANIMALS[id].n+" at "+p+" silver"+(['bactrian','dromedary','hybrid'].includes(id)?", its water-skins filled at the wells":"")+". The others size it up.");
  render();
}
function sellAnimal(id){
  if(!S.herd||(S.herd[id]||0)<=0){ render(); return; }
  const sp=animalSell(id,city()); S.herd[id]--; S.silver+=sp; S.water=Math.min(S.water,waterMax());
  let note="";
  if(cargoW()>cargoCap()) note = totalAnimals()===0
    ? " You have no pack animal now — buy a beast before you set out, or the cargo stays here."
    : " Your remaining animals can't carry all the cargo — buy another, or sell goods, before you set out.";
  log("You sell a "+ANIMALS[id].n+" for "+sp+" silver."+note);
  render();
}
function renderAnimals(m){
  const c=city();
  const rows=ANIMAL_ORDER.map(id=>{
    const A=ANIMALS[id], avail=animalAvailable(id,c), owned=(S.herd&&S.herd[id])||0;
    const p=animalPrice(id,c), sp=animalSell(id,c);
    return '<tr><td><b>'+cap1(A.n)+'</b><br><span class="sub">'+A.note+'</span></td>'+
      '<td class="num">'+(avail?p+' s':'<span class="sub">not sold here</span>')+'</td>'+
      '<td class="num">'+owned+'</td>'+
      '<td><button class="tiny" '+((!avail||S.silver<p)?'disabled':'')+' onclick="buyAnimal(\''+id+'\')">buy'+(avail?' ('+p+')':'')+'</button>'+
      '<button class="tiny" '+((owned<=0)?'disabled':'')+' onclick="sellAnimal(\''+id+'\')">sell ('+sp+')</button></td></tr>';
  }).join('');
  m.innerHTML='<h2>Livestock market <span class="sub">· '+cityLabel(c)+'</span></h2>'+
    '<p class="sub">Each beast suits a different road, and the caravan moves only as fast as its worst-suited animal — so match the herd to the country ahead. Prices favour whatever is native here; the hybrid bukht is sold only in the middle lands, between Sogdiana and Mesopotamia; the Bactrian belongs to the east and is not found for sale in the Levant.</p>'+
    caravanSummary()+
    '<table><tr><th>Animal</th><th class="num">price</th><th class="num">owned</th><th>buy / sell</th></tr>'+rows+'</table>'+
    '<div style="margin-top:10px"><button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button></div>';
}

/* ============ v0.9.1 — wild horses, animal peril, humble start ============ */
function evWildHorses(){
  if(!cooled('wildhorse',25)) return null;
  const here=city().name, ahead=nextCity()?nextCity().name:'';
  const f=(nextCity()||city()).frac;
  const near = here==='Osh'||ahead==='Osh'||here==='Samarkand'||ahead==='Samarkand'||(f>=.40&&f<=.56);
  if(!near) return null;
  markEv('wildhorse');
  return {h:'WILD HORSES',t:"A herd of horses runs loose on the Ferghana grass — the famed blood-sweating breed, manes streaming, supremely uninterested in your caravan. A few are young enough to gentle, if you have the nerve and a day to spare.",
  ch:[
   {l:'Try to catch one (1 day)',f(){ passDays(1); if(S.dead) return; const sk=skillMax('handle'); if(rnd()<(.35+.10*sk)){ gainAnimal('horse'); S.water=Math.min(S.water,waterMax()); log("After a day of dust and bruises, you rope a young Ferghana horse into the company. It submits with very poor grace."); } else { S.hp=clamp(S.hp-3,0,100); log("A day of glorious failure. The horses regard your efforts with the lordly contempt of the genuinely fast."); } }},
   {l:'Admire them and ride on',f(){ log("You watch the herd pour over a ridge like water, and think better of it. Some things are not for the catching."); }},
  ]};
}

// ill-suited animals don't just slow you — they can die, worse in the bad season
function applyAnimalPeril(terr){
  if(!S.herd) return;
  const f=(nextCity()||city()).frac, m=monthNum();
  const care=Math.max(.35, 1 - .14*skillMax('handle'));   // a good camel-hand keeps the beasts alive
  for(const id of ANIMAL_ORDER){
    if(!S.herd[id]) continue;
    let p=0;
    if(id==='dromedary' && terr==='mountain')                         p=.04 + .07*passDanger();    // cold kills the desert camel
    else if(id==='bactrian' && (terr==='desert'||terr==='harsh') && f>=.74) p=.025 + ((m>=5&&m<=7)?.04:0); // heat kills the woolly camel in the Levant
    else if(id==='horse' && terr==='harsh')                            p=.06;                       // the deep desert is no place for a horse
    else if(id==='horse' && terr==='desert')                          p=.035;                      // thirsty horses die in the sands
    else if(id==='horse' && terr==='mountain')                        p=.04 + .05*passDanger();    // high cold passes are no place for a horse either
    else if(id==='donkey' && terr==='harsh')                          p=.02;
    if(p<=0) continue;
    if(rnd() < p*care){ const toll=Math.max(1, Math.round(S.herd[id]*0.08)); S.herd[id]=Math.max(0,S.herd[id]-toll); perilLog(id, terr, toll); }
  }
  const over=herdOverload();
  const strayP = over>1 ? Math.min(.30,(over-1)*0.5) : (over>0.85 ? (over-0.85)*0.2 : 0);
  if(strayP>0 && totalAnimals()>1 && rnd()<strayP){ const a=loseAnimal(); log("With too few hands to mind so many beasts, "+a+" strays from the line in the night and is gone by morning."); }
}
function perilLog(id, terr, n){
  n=n||1;
  const why = id==='dromedary' ? "the cold of the high passes"
            : id==='bactrian'  ? "the furnace heat of the western desert"
            : terr==='mountain'? "the cold"
            : "the killing waste";
  const subj = n>1 ? (n+" of your "+ANIMALS[id].pl+" falter and die") : ("One of your "+ANIMALS[id].pl+" falters and dies");
  log(subj+" on the road — "+ANIMALS[id].pl+" were never bred for "+why+". You divide the loads among the rest, who are not consulted.");
}

function startHumble(){
  const nm=$('pname')?$('pname').value.trim():'';
  if(!nm){ const w=$('nameWarn'); if(w)w.textContent='A name is required before you set out.'; return; }

// hunt straight from the road without a separate "make camp" click
function huntRoad(){ if(!S)return; S.journeying=false; clearJourney(); huntFood(); }

// turn around mid-leg, retracing the distance already walked back to the last town
function turnBack(){
  if(!S || S.screen!=='travel') return;
  const wasMoving=S.journeying;
  S.journeying=false; clearJourney();
  const d=S.dir||1, x=S.legKm;
  S.idx += d;                          // step onto the city we were heading toward
  S.dir = -d;                          // and reverse
  S.legKm = Math.max(0, legDist() - x);// remaining distance back = the li already covered
  const back=nextCity();
  log("You turn the caravan around, retracing the "+Math.round(x)+" li back toward "+(back?back.name:'the last town')+".");
  if(wasMoving) startJourney(); else render();
}

/* ============ v0.9.7 — NaN self-healing ============ */
function sanitizeS(){
  if(!S) return;
  const fin=(v,d)=> (typeof v==='number' && isFinite(v)) ? v : d;
  if(S.herd){ for(const k in S.herd) S.herd[k]=Math.max(0,Math.round(fin(S.herd[k],0))); }
  S.silver = Math.max(0, fin(S.silver,0));
  S.food   = Math.max(0, fin(S.food,0));
  S.hp     = clamp(fin(S.hp,50),0,100);
  S.day    = Math.max(1, Math.round(fin(S.day,1)));
  S.legKm  = Math.max(0, fin(S.legKm,0));
  S.water  = clamp(fin(S.water, waterMax()), 0, waterMax());
  if(S.goods) for(const g of GOODS){
    S.goods[g.id]=Math.max(0,Math.round(fin(S.goods[g.id],0)));
    if(S.basis)     S.basis[g.id]=fin(S.basis[g.id],0);
    if(S.lastBasis) S.lastBasis[g.id]=fin(S.lastBasis[g.id],0);
  }
  S.huntLuck=fin(S.huntLuck,0); S.huntRisk=fin(S.huntRisk,0);
  S.banditMod=fin(S.banditMod,0); S.banditFreq=fin(S.banditFreq,1);
  S.dealDays=fin(S.dealDays,0);
  S.selfTrade=fin(S.selfTrade,0);
}

/* ============ v0.9.8 — per-good haggling specialists ============ */
const HAGGLE={
  'Ratnadevi':{ jade:0.08 },   // the jade-trader's daughter knows the stone
  'Irene':{ silk:0.08 },       // the silk-factor's widow knows the bolt
};
function haggler(gid){
  let best=null, bv=0;
  for(const p of livingParty()){ const h=HAGGLE[p.name]; if(h && h[gid] && h[gid]>bv){ bv=h[gid]; best=p; } }
  return best ? {p:best, b:bv} : null;
}

function tradeSkill(){ return Math.max(skillMax('trade'), (S&&S.selfTrade)||0); }

/* ============ v0.9.11 — the merchant's notes (price comparison screen) ============ */
function recordSeen(){
  if(!S) return; if(!S.seen) S.seen={};
  const c=city(); if(!c||!S.stock||!S.stock[c.name]) return;
  const mm={}; for(const g of GOODS) mm[g.id]=price(g,c);
  S.seen[c.name]=mm;
}
function noteNeighbors(){
  const c=city(), out=[];
  const back=backCity(); if(back) out.push(back);
  if(!S.returning && !S.routeChosen && c.name==='Dunhuang'){ out.push(NORTH[0]); out.push(SOUTH[0]); } // Hami (north) & Miran (south)
  else if(c.name==='Kashgar'){ const f=fwdCity(); if(f) out.push(f); const o=otherForkCity(); if(o) out.push(o); }
  else { const f=fwdCity(); if(f) out.push(f); }
  return out;
}
function noteBase(cityObj,g){
  let base=(OVR[cityObj.name]&&OVR[cityObj.name][g.id]!=null)?OVR[cityObj.name][g.id]:g.e+(g.w-g.e)*cityObj.frac;
  if(g.id==='silk'&&S.silkBoost&&cityObj.frac>.25)base*=1.25;
  return Math.max(1,Math.round(base));
}
function notePrice(cityObj,g){
  if(S.seen && S.seen[cityObj.name] && S.seen[cityObj.name][g.id]!=null) return {known:true, p:S.seen[cityObj.name][g.id]};
  return {known:false, p:noteBase(cityObj,g)};
}
function rumorWord(here,est){ const d=here>0?(est-here)/here:0; if(d>0.08)return 'higher'; if(d<-0.08)return 'lower'; return 'unknown'; }
function renderNotes(m){
  const c=city();
  let cols;
  if(S.seaMode){
    const nb=seaEdges(c.name).map(e=>cityByName(e.to)).filter(Boolean).slice(0,3); const mid=Math.floor(nb.length/2);
    cols=[...nb.slice(0,mid).map(n=>({city:n})), {here:true}, ...nb.slice(mid).map(n=>({city:n}))];
  } else {
    const back=backCity();
    const fwds=[]; if(!S.returning && !S.routeChosen && c.name==='Dunhuang'){ fwds.push(NORTH[0],SOUTH[0]); } else if(c.name==='Kashgar'){ const f=fwdCity(); if(f)fwds.push(f); const o=otherForkCity(); if(o)fwds.push(o); } else { const f=fwdCity(); if(f)fwds.push(f); }
    cols=[...fwds.map(n=>({city:n})), {here:true}, ...(back?[{city:back}]:[])];
  }
  const head='<tr><th>Good</th>'+cols.map(col=>col.here?'<th class="num">here</th>':'<th class="num">'+cityLabel(col.city)+'</th>').join('')+'<th>buy / sell</th></tr>';
  const noteCols=cols.map(col=>col.here?c:col.city).filter(Boolean);
  const shownNoteGoods=GOODS.filter(g=>(S.goods[g.id]||0)>0 || noteCols.some(X=>g.id!=='conut'||conutHere(X.name)));
  const rows=shownNoteGoods.map(g=>{
    const hp=price(g,c), held=S.goods[g.id], avail=S.stock[c.name][g.id];
    const ref=held>0?(S.basis[g.id]||0):(S.lastBasis[g.id]||0);
    const pcls=ref>0?(hp<ref?'green':(hp>ref?'blue':'gold')):'gold';
    const cells=cols.map(col=>{
      if(col.here){ return '<td class="num '+pcls+'">'+hp+'</td>'; }
      const np=notePrice(col.city,g);
      if(np.known){ const cls=np.p>hp?'blue':(np.p<hp?'green':'gold'); return '<td class="num '+cls+'">'+np.p+'</td>'; }
      let w=rumorWord(hp,np.p); if(w!=='unknown' && hashf((S.runId||'r')+col.city.name+g.id)<0.2) w='unknown'; const cls=w==='higher'?'blue':(w==='lower'?'green':'');
      const style=w==='unknown'?' style="color:var(--dim);font-size:.82em"':' style="font-size:.82em"';
      return '<td class="num"><span class="'+cls+'"'+style+'>'+w+'</span></td>';
    }).join('');
    const availTxt=avail>0?'<span style="color:var(--dim)"> · '+avail+'</span>':'<span class="red"> · none</span>';
    return '<tr><td>'+g.n+availTxt+'</td>'+cells+
      '<td><button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',1)">+1</button>'+
      '<button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',10)">+10</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',1)">−1</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',10)">−10</button></td></tr>';
  }).join('');
  m.innerHTML='<h2>The Merchant’s Notes <span class="sub">· '+cityLabel(c)+'</span></h2>'+
    '<p class="sub">Prices here against the neighbouring towns. A town you have <b>been to</b> shows its remembered prices; one you have not shows only road-rumour of how it compares to here — <span class="blue">higher</span>, <span class="green">lower</span>, or unknown. <span class="blue">Blue</span> = dearer there (carry it and sell); <span class="green">green</span> = cheaper there.</p>'+
    '<table>'+head+rows+'</table>'+
    '<p class="sub">Silver <b class="gold">'+Math.round(S.silver)+'</b> · cargo '+cargoW()+(S.seaMode?' aboard':'/'+cargoCap())+'. Remembered prices are what you saw last time you stood in that market.</p>'+
    '<button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button>';
}

const ANIMAL_OVR={ horse:{
 "Chang'an":145,"Lanzhou":82,"Wuwei":72,"Dunhuang":95,"Hami":98,"Turfan":100,"Kucha":102,"Aksu":96,

// handling capacity vs. herd demand — real caravans run ~3-6 animals per drover
const ANIMAL_TEND={donkey:0.8, mule:1.0, horse:1.3, bactrian:0.8, dromedary:0.8, hybrid:0.9};
function herdCapacity(){ const bodies=1+livingComps(); return bodies*4 + skillSum('handle')*3; }
function herdDemand(){ let d=0; if(S&&S.herd) for(const k in S.herd) d+=S.herd[k]*(ANIMAL_TEND[k]||1); return d; }
function herdOverload(){ const cap=herdCapacity(); return cap>0 ? herdDemand()/cap : 99; }
function herdingNote(){
  const over=herdOverload();
  const cls = over>1 ? 'red' : (over>0.85 ? 'gold' : 'sub');
  const msg = over>1 ? 'too few hands for the herd — beasts will stray.' : (over>0.85 ? 'hands stretched thin — a beast could stray.' : 'well in hand.');
  return '<p class="'+cls+'" style="margin:4px 0 0;font-size:.78rem">Herding: '+herdDemand().toFixed(1)+' of '+herdCapacity().toFixed(0)+' capacity — '+msg+'</p>';
}

function maybeHuntress(terr){
  if(!S || S.dead || S.pendingEvent) return;
  if(terr!=='steppe') return;
  if(S.party.some(p=>p.huntress&&p.alive)) return;
  const chance=Math.min(0.8, 0.25 + 0.10*(S.turkHosp||0));
  if(rnd()<chance) S.pendingEvent=huntressOffer();
}

/* ============ v0.9.17 — runthrough-8 fixes ============ */
function lostBlurb(){
  const lp=livingParty();
  if(lp.length>=2){ const a=pick(lp); let b=pick(lp),g=0; while(b===a&&g++<6)b=pick(lp); return "The track forks where no fork should be. "+a.name+" and "+b.name+" disagree at volume."; }
  if(lp.length===1) return "The track forks where no fork should be. You and "+lp[0].name+" argue it out, which settles nothing.";
  return "The track forks where no fork should be, and you have no one to argue the point with — you wish, briefly, for a companion and a second opinion.";
}
function wealthArc(start,end){
  const r = start>0 ? end/start : end;
  if(start<=120){ // a humble origin
    if(r>=50) return "You set out with barely the clothes on your back and a single donkey; you come home a merchant prince, your name fit to be spoken in the same breath as the great houses. Songs will outlive you.";
    if(r>=10) return "You left with next to nothing and return genuinely, improbably rich — the kind of turn of fortune that founds dynasties and ends in legend.";
    if(r>=2)  return "From a donkey and a dream to a respectable estate: not bad at all for a nobody who saved their coppers.";
    if(r>=1)  return "You come home no poorer than you left, which, starting from nothing, is its own quiet triumph.";
    return "The Road gave you a story, if not a fortune. You are home, and that is more than many manage.";
  }
  if(r>=8)   return "You set out comfortable and return fabulously, almost embarrassingly wealthy. The ledger can scarcely hold the figure.";
  if(r>=2.5) return "A magnificent venture — your fortune multiplied many times over.";
  if(r>=1)   return "A solid profit, soberly earned.";
  return "You come home poorer than you set out. The Road keeps its own ledger, and this time it kept more than it gave.";
}

function reorient(fwd, west){
  if(!west) return fwd.map(c=>({...c}));
  const rev=[]; for(let i=fwd.length-1;i>=0;i--) rev.push({...fwd[i]});
  for(let i=1;i<rev.length;i++) rev[i].dist=fwd[fwd.length-i].dist;
  return rev;
}
function fullRoute(r, west){ return reorient([...MAIN1,...(r==='n'?NORTH:SOUTH),...MAIN2], west); }
function preForkItin(west){ const full=fullRoute('n', west); return west ? full.slice(0, MAIN2.length+1) : full.slice(0, MAIN1.length); }
function fmtDist(li){ if(isWest()){ const mi=Math.max(1,Math.round(li/3)); return mi+' mile'+(mi!==1?'s':''); } return li+' li'; }

}

function randomSkills(){ const sk={trade:0,cook:0,handle:0,hunt:0,fight:0}; const keys=Object.keys(sk); let pts=4+ri(2); while(pts>0){ sk[pick(keys)]++; pts--; } return sk; }

  if(SETUP.style==='donkey'){ SETUP_PAGE=1; newGame(SETUP.name,[],'', SETUP.origin==='west'?'cpl-humble':'humble'); }
  else { SETUP_PAGE=2; render(); } }
function setupBack(){ SETUP_PAGE=1; render(); }
function setupRoster(){ return SETUP.origin==='west' ? CPL_ROSTER : ROSTER; }
function setupTick(){
  if(SETUP.companyMode==='custom'){ const b=$('btnVenture'); if(b)b.disabled=!SETUP.custom.every(c=>c.n.trim()); return; }
  const ros=setupRoster(); const n=ros.filter(r=>{const e=$('rc_'+r.id);return e&&e.checked}).length;
  const w=$('rosterWarn'); if(w)w.textContent=n===3?'A fine company.':(n+' of 3 chosen.');

  if(SETUP.companyMode==='custom'){ saveCustom(); if(!SETUP.custom.every(c=>c.n.trim())) return;

    const members=SETUP.custom.map(c=>{ const sk=randomSkills(); return {name:c.n.trim().slice(0,18), role:topSkill(sk), skills:sk, g:(gm[c.t]||'m'), custom:true}; });

  const ros=setupRoster(); const chosen=ros.filter(r=>{const e=$('rc_'+r.id);return e&&e.checked}).map(r=>r.id);
  if(chosen.length!==3){ const w=$('rosterWarn'); if(w)w.textContent='Pick exactly three.'; return; }
  SETUP_PAGE=1; newGame(SETUP.name, chosen, SETUP.nephewName||'', SETUP.origin==='west'?'cpl':undefined); }

/* ============ v0.9.19 — animated sea voyage ============ */
let sailTimer=null;
function clearSail(){ if(sailTimer){clearInterval(sailTimer);sailTimer=null;} }
function startSailTimer(){ clearSail(); S.sailing=true; render(); sailTimer=setInterval(stepSail, DAY_MS); }
function stepSail(){
  if(!S || !S.sailing || S.pendingEvent || S.eventOutcome || S.screen!=='sailing' || !S.sail){ clearSail(); return; }
  if(S.food < foodNeed()){ S.sailing=false; clearSail(); S.pendingEvent=evSeaFood(); render(); return; }
  S.day++; S.food=Math.max(0,S.food-foodNeed()); S.hp=clamp(S.hp+0.3,0,100);
  if(!S.sail.sickRolled && (S.sail.total-S.sail.daysLeft)<=7){ S.sail.sickRolled=true; if(rnd()<0.5){ S.seasick=true; log("You are violently, comprehensively seasick — green at the rail, certain you will die and then afraid you won’t. It does no lasting harm; the sea does this to nearly everyone once."); } }
  S.sail.daysLeft--;
  if(S.sail.daysLeft<=0){ S.sailing=false; clearSail(); sailArrive(); render(); return; }
  const _p=(S.sail.total-S.sail.daysLeft)/S.sail.total;
  if(!S.sail.ephesusDone && _p>=0.5){ S.sail.ephesusDone=true; S.sailing=false; clearSail(); S.pendingEvent=evEphesus(); render(); return; }
  const _cp=(S.sail.target==='Aleppo')?0.75:0.25;
  if(!S.sail.chimeraDone && _p>=_cp){ S.sail.chimeraDone=true; log(CHIMERA_LINE); }
  const wreckP=(S.sail.winter?0.045:0.012)*(hasPilot()?0.9:1);
  if(rnd()<wreckP){ S.sailing=false; clearSail(); S.pendingEvent=evShipwreck(); render(); return; }
  if(rnd()<(hasPilot()?0.054:0.06)){ S.sailing=false; clearSail(); S.pendingEvent=evSeaWinds(); render(); return; }
  { const _r=seaLeg(_p,S.sail.target); let _pp=(/Eastern Med/.test(_r)?0.045:/Aegean/.test(_r)?0.022:0.006)*(S.banditFreq||1); if(convoyValue()>10000)_pp*=2; if(rnd()<_pp){ S.sailing=false; clearSail(); S.pendingEvent=evPirates(); render(); return; } }
  updateSail();
}
function updateSail(){ if(!S||!S.sail)return; renderStats(); renderLog();
  const e=$('sDay'); if(e)e.textContent='Day '+S.day;
  const sl=$('sLoc'); if(sl)sl.textContent=seaLeg((S.sail.total-S.sail.daysLeft)/S.sail.total, S.sail.target);

function skipSail(){
  S.sailing=false; clearSail();
  for(let i=0;i<80 && S.sail;i++){
    if(S.food<foodNeed()){ S.pendingEvent=evSeaFood(); render(); return; }
    S.day++; S.food=Math.max(0,S.food-foodNeed()); S.sail.daysLeft--;
    if(S.sail.daysLeft<=0){ sailArrive(); render(); return; }
    const _p=(S.sail.total-S.sail.daysLeft)/S.sail.total;
    if(!S.sail.ephesusDone && _p>=0.5){ S.sail.ephesusDone=true; S.pendingEvent=evEphesus(); render(); return; }
    const _cp=(S.sail.target==='Aleppo')?0.75:0.25;
    if(!S.sail.chimeraDone && _p>=_cp){ S.sail.chimeraDone=true; log(CHIMERA_LINE); }
    const wreckP=(S.sail.winter?0.045:0.012)*(hasPilot()?0.9:1);
    if(rnd()<wreckP){ S.pendingEvent=evShipwreck(); render(); return; }
    if(rnd()<(hasPilot()?0.054:0.06)){ S.pendingEvent=evSeaWinds(); render(); return; }
    { const _r=seaLeg(_p,S.sail.target); let _pp=(/Eastern Med/.test(_r)?0.045:/Aegean/.test(_r)?0.022:0.006)*(S.banditFreq||1); if(convoyValue()>10000)_pp*=2; if(rnd()<_pp){ S.pendingEvent=evPirates(); render(); return; } }
  }
  render();
}
function evShipwreck(){

function evSeaFood(){

     if(S.silver>=cost){ S.silver-=cost; S.food+=amt; log("You pay the captain’s outrageous price for "+amt+" days of ship’s biscuit and salt fish. Robbery on the high seas, and entirely legal."); }
     else { let owed=cost-S.silver; S.silver=0; const sold=[];
       for(const g of GOODS){ if(owed<=0)break; if(S.goods[g.id]>0){ const unit=Math.max(1,Math.round(price(g,city())*0.5)); const need=Math.ceil(owed/unit); const n=Math.min(S.goods[g.id],need); S.goods[g.id]-=n; if(S.goods[g.id]<=0)S.basis[g.id]=0; owed-=n*unit; sold.push(n+' '+g.u+(n>1?'s':'')+' of '+g.n.toLowerCase()); } }

const CHIMERA_LINE="Off to the south, on the dark Lycian shore, a bare hillside flickers with pale flames that never die — the breath of the Chimera, the sailors say, the fire-breathing beast that Bellerophon pinned beneath the mountain. They have burned there longer than Rome has stood, and will burn long after.";
function seaLeg(p, target){

  if(f<0.25) return 'the Sea of Marmara';
  if(f<0.33) return 'the Dardanelles';
  if(f<0.50) return 'the Aegean';
  return 'the Eastern Mediterranean';
}

   adm:"Mantai — Mahatittha, 'the great ford' — is the chief port of Sarandib, the teardrop island the Sinhalese call Lanka, the Arabs Sarandib, and the old Greeks Taprobane. Inland lies Anuradhapura of the great stupas and tanks, where the Sinhalese kings keep the tooth-relic of the Buddha; here on the coast it is gems and cinnamon and pearl. To the southeast a single mountain stands clear above the hills — the Peak of the Footprint, Adam's Peak, where in one stone a hollow the shape of a giant foot draws pilgrims of four faiths: the Buddhists call it the Buddha's, the Muslims Adam's, and they climb it together by lamplight."},
 {name:'Kollam', zh:'', frac:.35, desc:"Quilon, on the Malabar pepper coast — the Arabs call it Kulam. Pepper by the shipload, and an ancient community of St Thomas Christians.",
   arr:"You raise the green Malabar shore and put in at Kollam — Kulam to the Arab pilots — where the pepper comes down to the sea in sacks beyond counting.",
   adm:"Kollam, which the Arabs call Kulam-Mali, is the great pepper-port of the Malabar coast — and pepper is why half the ships in the Indian Ocean are here. The green hills inland drip with it; on the quays it is weighed out by the bahar and fought over by Persian, Arab, Chinese, and Jewish factors. Strangest to a traveller from the west is the church: a community of Christians who trace their faith not to Rome or Constantinople but to the Apostle Thomas himself, who they say came to this coast to preach and was buried in its soil seven centuries ago. This is the great parting of the waters — east lies India and China, west the long road to Arabia and home."},
 {name:'Basra', zh:'', frac:.78, desc:"The Abbasid port at the head of the Gulf, gateway to Baghdad up the Tigris. Lately a city in revolt, and uneasy with it.",
   arr:"You come up the Gulf and into the muddy reaches of the Shatt, and tie up at Basra — the Caliph's great southern port, gateway to Baghdad and uneasy these days with rebellion.",
   adm:"Basra, where the Tigris and Euphrates run together and the Gulf trade comes ashore for Baghdad — a young city already grown vast, a place of canals, date-gardens, grammarians, and theologians who will argue you into the ground. The China-ships unload here, or up the coast at Siraf; the goods go on by river and road to the Caliph's new Round City. But the talk in the souk just now is all of rebellion: Ibrahim, of the House of Ali, has raised his standard against al-Mansur, and Basra has declared for him. Soldiers are everywhere, and everyone is reckoning which way to jump."},
 {name:'Dhofar', zh:'', frac:.50, desc:"The frankincense coast of southern Arabia — the port of Zafar. Gnarled incense-trees inland, and the resin the whole world burns.",
   arr:"You make the harsh frankincense coast of Arabia and put in at Zafar, in the land of Dhofar, where the air itself smells of the resin the whole world burns.",
   adm:"Dhofar — a green-hilled coast on the southern shoulder of Arabia, and its harbour-town of Zafar. This is the frankincense coast, where the gnarled boswellia trees weep the pale resin that has gone up in smoke before every altar from Rome to Chang'an since before anyone was counting years. The monsoon-fed hills behind the town are green half the year, a freak of weather in all that desert. Ships here choose their road: north and west into the Gulf of Aden and the Red Sea, or south across the open water to the coast of the Zanj and the gold of Africa."},
 {name:'Socotra', zh:'', frac:.55, hub:'minor', cash:150, desc:"A strange dragon-blood island off the Horn — aloes, frankincense, and an old community of Christians far from any bishop.",
   arr:"You water the ship at Socotra, the island of the dragon's-blood trees, where the people cross themselves in a tongue no priest of Rome would know.",
   adm:"Socotra, an island out of a sailor's tale, set off the Horn of Africa where the Gulf of Aden opens to the ocean. Its mountains bristle with trees found nowhere else: the dragon's-blood, whose red resin the apothecaries prize, and the bitter aloe the physicians swear by. Strangest of all is the people — Christians, of a sort, baptised long ago by missionaries from the east and left to themselves so long that their faith has gone its own way, far from any bishop. There is little here for a merchant but water, aloes, and wonder; ships put in, fill the casks, and press on."},
 {name:'Zanzibar', zh:'', frac:.45, hub:'minor', cash:350, desc:"On the Zanj coast of Africa — the trading-town of Unguja Ukuu. Ivory, mangrove-poles, gold from the far interior, and a darker traffic in men.",
   arr:"After a long reach down the African coast you come to Unguja Ukuu, on the island of the Zanj. Indian beads and Chinese stoneware lie in the market beside ivory and gold.",
   adm:"Unguja Ukuu, on the island the Arabs call Zanjibar — 'coast of the blacks' — is the southern edge of the known sea, where the monsoon at last gives out. The traders here are Africans and the Arabs and Persians who have begun to settle among them, and the goods are the raw wealth of a continent: ivory by the tusk, ambergris off the beaches, mangrove-poles for the treeless ports of Arabia, rock-crystal, and gold carried down from mines a thousand miles inland that no foreigner has ever seen. There is a darker cargo too — men, taken from the interior and shipped north to the marshes of Iraq; you note it, and say nothing. In the heat of the evening the traders sit with gourds of palm-wine, cloudy and sharp, tapped from the coconut palms, and the talk runs on gold, ivory, and the turning of the monsoon."},
 {name:'Aden', zh:'', frac:.60, desc:"The gateway of the Red Sea, in a ring of dead volcanoes. Every cargo bound for Egypt and the Mediterranean is transshipped here.",
   arr:"You come in to Aden, cupped in its ring of burnt volcanic crags — the gate of the Red Sea, where the India trade changes ships for Egypt.",
   adm:"Aden sits in the broken crater of a dead volcano, a near-waterless rock that thrives on one thing only: position. It is the gate of the Red Sea, the place where the cargoes of the whole Indian Ocean — pepper, spice, silk, ivory, slaves — are landed and reloaded for the run up to Egypt, because few captains will risk the reef-strewn northern Red Sea in a deep-laden India ship. Persian and Arab merchants grow rich here on other men's goods passing through. Behind it, Yemen — 'Arabia the Fortunate' — rises green into the highlands, the one corner of the peninsula the rains remember."},
 {name:'Qulzum', zh:'', frac:.85, hub:'minor', cash:250, desc:"Clysma, at the head of the Red Sea below Sinai — where the Canal of the Commander of the Faithful joins the sea to the Nile.",
   arr:"You reach al-Qulzum at the head of the Red Sea, under the dry mountains of Sinai. Here the salt water ends and the Caliph's canal runs off west toward the Nile.",
   adm:"Al-Qulzum, known to the ancients as Clysma, is a sun-blasted little port at the very head of the Red Sea, in the shadow of the Sinai peninsula. Somewhere in those mountains stands Mount Sinai, where Moses is said to have received the Law, and at its foot the great fortified monastery of Saint Catherine that the Emperor Justinian raised two centuries ago — a name any traveller out of Constantinople would know. It would be nothing at all but for the canal: the old channel of the Pharaohs and Trajan, redug after the Muslim conquest, that joins the Red Sea to the Nile and lets a cargo go by water from the Indies clear to the Middle Sea. (Enjoy it while it lasts; men say the Caliph is minded to fill it in, to starve his enemies in the Hijaz.) Pilgrims for Mecca and grain-barges for Arabia crowd the wharves."},
 {name:'Fustat', zh:'', frac:.90, desc:"The capital of Egypt — a teeming city of tall mud-brick houses where the canal from the Red Sea meets the Nile, and the Great Pyramids stand on the desert edge to the west.",
   arr:"The canal brings you up to Fustat, the capital of Egypt on the Nile — a roaring city of tall mud-brick houses, the greatest market between Baghdad and the sea.",
   adm:"Fustat — the city of the tent, raised where the conquering general Amr pitched his camp a century past for the Caliph (Egypt is Abbasid country now, governed from here), now the teeming capital of Egypt and one of the great cities of Islam. Its houses climb five and six storeys in mud-brick, packed along lanes that never see the sun; its markets sell the goods of three continents; the Nile at its feet carries the grain that feeds a third of the Caliphate. Old Alexandria on the coast may keep the famous lighthouse, but Fustat keeps the money and the power. From its quays the river-boats run down to the sea, and from the sea, the Romans' City."},
 {name:'Alexandria', zh:'', frac:.92, desc:"The faded great city on the Mediterranean — now an Abbasid port under Muslim governors, though still full of Greek-speaking Christians — the Pharos lighthouse yet standing. From here ship for Constantinople or Aleppo.",
   arr:"You drop down the Nile and out to Alexandria on the Middle Sea, the great lighthouse still throwing its beam — diminished, but a wonder yet.",
   adm:"Alexandria, the city of Alexander and the Ptolemies, of the great library long since scattered and the lighthouse that still — battered by earthquakes, shortened by centuries — throws its fire out to sea each night, one of the seven wonders and the last still standing. Once the second city of the Roman world; now a faded port in the shadow of upstart Fustat, its colonnades quarried for newer towns, its Greek-speaking Christians living quietly under Muslim governors. But the harbour still works, and from it the sea-lanes run north to Constantinople — into the teeth of the Roman fleet, for Egypt and the Romans are at war as often as not — and east along the coast to the Syrian ports below Aleppo."},
 {name:'Ephesus', zh:'', frac:.965, hub:'minor', cash:200, taste:['wine','glass','paper','tea'], desc:"A faded great city of Roman Asia, its silting harbour drawing back year by year — the theatre, the basilica of St John, the lost Temple of Artemis. A small port now, with dry Anatolian hill-country climbing inland to the plateau.",
   arr:"The ship works into the silting harbour of Ephesus, once the first city of Roman Asia, its marble wharves stranded among the reeds.",
   adm:"Ephesus, once the first city of Roman Asia and now visibly sliding past its glory \u2014 the great harbour silting up, the sea drawing away and leaving the wharves among the reeds. The vast theatre is still cut into the hillside, twenty-odd thousand seats where, the deacons say, Saint Paul once started a riot among the silversmiths of Artemis. Above the town the basilica of Saint John the Theologian crowns Ayasoluk hill, thick with pilgrims; of the Temple of Artemis, one of the seven wonders, there is almost nothing but a few stumps in a marsh where herons fish. A small place now, and a holy one \u2014 and from its gate the road climbs inland to Iconium and the cold Anatolian plateau."},
 {name:'Gortyn', zh:'', frac:.935, hub:'minor', cash:600, desc:"The Byzantine seat of Crete, in the fertile Messara plain — a crossroads of the Middle Sea where enterprising traders warehouse goods bound four ways.",
   arr:"You raise the long mountainous island of Crete and put in below Gortyn, the Byzantine capital, in its broad green plain.",
   adm:"Gortyn, capital of Crete under the Romans and now the Byzantines, seat of the island's archbishop, set in the rich Messara plain between the mountains and the southern sea. It is an old place \u2014 by the river stand the ruins where, the poets say, Zeus in the shape of a bull carried Europa ashore, and in the hills are caves of a labyrinth that some name the Minotaur's. Crete sits squarely athwart the lanes between Constantinople, Egypt, and Syria, so for all that the town is modest, its harbours are busy and its merchants well-informed, warehousing and re-shipping the goods of three coasts."},
 {name:'Trebizond', zh:'', frac:.96, hub:'minor', cash:420, desc:"A walled Byzantine port on the Black Sea, the sea-end of the long road up from Armenia and Persia. Silk and spice cross the mountains to be shipped west; the city watches its frontier and keeps its own counsel.",
   arr:"You come down to Trebizond on its shelf above the grey Black Sea, the mountains at its back and the road to Persia climbing away behind.",

function seaEdges(name){ const out=[]; for(const e of SEA_EDGES){ if(e.oneway && e.oneway!==name) continue; if(e.a===name)out.push({to:e.b,d:e.d,terr:e.terr,water:e.water,sight:e.sight}); else if(e.b===name)out.push({to:e.a,d:e.d,terr:e.terr,water:e.water,sight:e.sight}); } return out; }
function findLink(a,b){ for(const e of SEA_EDGES){ if((e.a===a&&e.b===b)||(e.a===b&&e.b===a)) return e; } return null; }
function isSeaExitCity(name){ return name==='Constantinople'||name==='Aleppo'||name==='Baghdad'||name==='Iconium'||name==="Chang'an"; }

/* monsoon: one direction favoured at a time. order rises toward the west/homeward end. */
const SEA_ORDER={"Chang'an":-1,'Luoyang':0,'Yangzhou':0.5,'Guangzhou':1,'Kauthara':2,'Palembang':3,'Mantai':4,'Kollam':5,'Dhofar':6,'Socotra':7,'Aden':7,'Zanzibar':8,'Basra':8,'Baghdad':8,'Qulzum':9,'Fustat':10,'Alexandria':11,'Constantinople':12,'Aleppo':11.3,'Gortyn':11.5,'Ephesus':11.8,'Iconium':12.5,'Trebizond':12.7};
const MON_WEST=[10,11,12,1,2,3,4]; // toward Arabia/Africa/Med — the NE monsoon, winter
const MON_EAST=[4,5,6,7,8,9,10];  // toward India/China — the SW monsoon, summer
function monsoonGated(link){ return link && (link.terr==='coast'||link.terr==='deep'); }
function monsoonDir(a,b){ return (SEA_ORDER[b]>SEA_ORDER[a])?'west':'east'; }
function monsoonOpen(a,b){ const link=findLink(a,b); if(!monsoonGated(link)) return true; const m=gameDate().m; if(link.coreMon) return link.coreMon.indexOf(m)>=0; const winter=(link.a===a); return winter ? MON_WEST.indexOf(m)>=0 : MON_EAST.indexOf(m)>=0; }
function monsoonWhen(a,b){ const link=findLink(a,b); const winter=!!(link&&link.a===a); return winter ? 'the winter monsoon (roughly November to March)' : 'the summer monsoon (roughly May to September)'; }

function addSeaMarkets(){ if(!S)return; S.jit=S.jit||{}; S.stock=S.stock||{};
  for(const p of SEA){ if(!S.jit[p.name]){ S.jit[p.name]={}; for(const g of GOODS) S.jit[p.name][g.id]=.85+rnd()*.3; }
    if(!S.stock[p.name]){ const st={}; const hubf=(p.hub==='minor')?0.35:1; for(const g of GOODS){ const base=(OVR[p.name]&&OVR[p.name][g.id]!=null)?OVR[p.name][g.id]:g.e+(g.w-g.e)*p.frac; const cheap=goodMin(g); let b=STOCKBASE[g.id]; if(base<=cheap*1.3)b*=2.4; st[g.id]=Math.max(1,Math.round(b*(.6+rnd()*.8)*hubf)); } S.stock[p.name]=st; } }
}

/* The wider maritime network (Gortyn->Egypt, Basra, the Indian Ocean, the Chang'an sea-road) stays shut until the
   caravan proves the overland road and reaches the far capital (west->Chang'an, east->Constantinople). The coastal
   Anatolian/Levant hops Constantinople<->Ephesus<->Aleppo stay open, as does the Black Sea passage once Trebizond is
   reached. Gortyn and everything beyond it are hidden until the network opens. "Horatio McCallister" unlocks all. */
function maritimeOpen(){ if(S&&S.cheats){ if(S.cheats.seaOff)return false; if(S.cheats.seaOn)return true; } if(!S)return false; if(S.seaUnlocked)return true; if(S.seaMode&&S.portName&&S.portName!=='Ephesus')return true; /* already out in the deep network: never strand a loaded voyage */ return false; }
function voyAllowed(a,b){ var lk=findLink(a,b); if(!lk)return false; if(lk.oneway && lk.oneway!==a) return false; if(lk.terr==='land')return true; if(maritimeOpen())return true;
  var p=[a,b].sort().join('|');
  if(p==='Constantinople|Ephesus'||p==='Aleppo|Ephesus')return true;  // the Anatolian/Levant coastal road, always open
  if(p==='Constantinople|Trebizond'&&S&&S.onceFlags&&S.onceFlags.trebizondSea)return true;
  return false; }
function seaLockedMsg(a,b){ return "No ship out of "+a+" is bound for "+b+" just now."; }
function seaLockedEvent(a,b){ return {h:'NO PASSAGE \u2014 YET', t:seaLockedMsg(a,b), ch:[{l:'Very well',f(){}}]}; }
function enterSeaPort(cityName){ if(!S)return; S.seaMode=true; addSeaMarkets(); if(S.townCash)delete S.townCash[cityName]; S.portName=cityName; S.hereSince=S.day; S.dir=1; S.dealDays=0; S.priceLock={}; S.screen='port'; log("You go down to the harbour at "+cityName+" to look for a ship."); render(); }
function stepAshore(){ if(!S)return; const n=S.portName; S.seaMode=false; const ti=S.itin.findIndex(x=>x.name===n); if(ti>=0)S.idx=ti; S.portName=null; S.screen='city'; render(); }
function enterSeaFrom(fromName, toName){
  const fare=voyFare(fromName,toName); const hv=(totalAnimals()>0)?herdValue(city()):0;
  if(fare.total>0 && (S.silver+hv) < fare.total){ S.pendingEvent={h:'PASSAGE BY SEA', t:"You price the passage to "+toName+" — "+fare.total+" silver, head and cargo — and find that even selling the beasts you could not cover it. The captain will not carry a man who cannot pay. You keep to the land road for now.", ch:[{l:'Keep to the land',f(){}}]}; render(); return; }
  if(totalAnimals()>0){ const v=herdValue(city()); S.silver+=v; clearHerd(); if(v>0) log("You sell off the caravan beasts at "+fromName+" for "+v+" s — there is no driving camels onto a ship. You will buy fresh animals at the far end."); }
  S.seaMode=true; addSeaMarkets();
  beginVoyage(fromName, toName);
}
function voyFare(from,to){ const lk=findLink(from,to); if(!lk)return {per:0,cargo:0,total:0,days:0};
  if(lk.free)return {per:0,cargo:0,total:0,days:lk.d};
  const days=lk.d, people=Math.max(1,livingComps()+1);
  const mult=(lk.terr==='canal'||lk.terr==='land'||lk.terr==='med')?0.6:1.0; // river-barge, canal and short Med hops cost less per day than the open ocean
  const per=Math.round(people*(0.6+0.25*days)*mult);     // a head of passage — far below what the food for the far longer overland march would run
  const cargo=Math.round(cargoW()*(0.10+0.012*days)*mult); // porterage by the weight; a fraction of the route's trading margins
  return {per:per, cargo:cargo, total:per+cargo, days:days};
}
function beginVoyage(fromName, toName){
  const lk=findLink(fromName,toName); if(!lk){ log("There is no passage that way."); render(); return; }
  if(!voyAllowed(fromName,toName)){ S.pendingEvent=seaLockedEvent(fromName,toName); render(); return; }
  if(monsoonGated(lk) && !monsoonOpen(fromName,toName)){ S.pendingEvent=noCaptainsEvent(fromName,toName); render(); return; }
  if(totalAnimals()>0 && lk.terr!=='land'){ const v=herdValue(city()); S.silver+=v; clearHerd(); if(v>0) log("You sell off the caravan beasts at "+fromName+" for "+v+" s \u2014 there is no driving a herd onto a ship; you will buy fresh animals when you next take to the land."); }
  const fare=voyFare(fromName,toName);
  if(fare.total>0 && S.silver<fare.total){ var _lnd=lk&&lk.terr==='land'; S.pendingEvent={h:(_lnd?'THE ROAD TO '+toName.toUpperCase():'PASSAGE BY SEA'), t:(_lnd?"The guide shakes his head at your purse: "+fare.total+" silver for the road ("+fare.per+" for "+(livingComps()+1)+" head, "+fare.cargo+" in porterage), and he will not lead a party that cannot pay the mountain toll. Come back when you have raised it.":"The master of the "+toName+" ship counts your purse and shakes his head: "+fare.total+" silver for the passage ("+fare.per+" for "+(livingComps()+1)+" head, "+fare.cargo+" porterage on "+cargoW()+" of cargo), and he will not carry a merchant who cannot pay it. You keep ashore until you have raised the fare."), ch:[{l:(_lnd?'Back to Iconium':'Stay in port'),f(){}}]}; render(); return; }
  if(fare.total>0){ S.silver-=fare.total; log("You book passage for "+toName+": "+fare.per+" s for "+(livingComps()+1)+" head and "+fare.cargo+" s porterage on "+cargoW()+" of cargo — "+fare.total+" s in all."); }
  let d=Math.max(2, Math.round(lk.d*(0.85+rnd()*0.30))); if(monsoonGated(lk)&&(gameDate().m===4||gameDate().m===10)) d=Math.round(d*1.4);
  S.portName=toName; // city() resolves to the destination during the leg
  const _rev=(lk.b===fromName); const _water=(_rev&&lk.waterB)?lk.waterB:lk.water;
  S.voy={from:fromName, to:toName, daysLeft:d, total:d, terr:lk.terr, strait:!!lk.strait, storm:lk.storm||1, water:_water, sight:lk.sight||null, sightDone:false, crossFounder:lk.founder||0, east:(SEA_ORDER[fromName]>SEA_ORDER[toName])};
  S.screen='voyage'; S.voyaging=true; render(); voyTimer=setInterval(stepVoy, DAY_MS);
}
function noCaptainsEvent(a,b){ return {h:'THE MONSOON IS AGAINST YOU', t:"You go down to the wharves to take ship for "+b+", and find every captain ashore, their vessels idle. The wind sits dead against that course: nothing will sail for "+b+" until "+monsoonWhen(a,b)+". The sea keeps its own calendar, and there is no arguing with it. You must wait for the wind to turn — or take another road.", ch:[{l:'Wait for the wind',f(){}}]}; }

function stepVoy(){
  if(!S || !S.voyaging || S.pendingEvent || S.eventOutcome || S.screen!=='voyage' || !S.voy){ clearVoy(); return; }
  if(S.food < foodNeed()){ S.voyaging=false; clearVoy(); S.pendingEvent=evSeaFood(); render(); return; }
  S.day++; S.food=Math.max(0,S.food-foodNeed()); S.hp=clamp(S.hp+0.25,0,100); accrueGuardWages();
  S.voy.daysLeft--;
  // dated events on the Basra–Baghdad road, during the Alid revolt
  if(S.voy.terr==='land' && (S.voy.from==='Basra'||S.voy.to==='Basra') && (S.voy.from==='Baghdad'||S.voy.to==='Baghdad')){
    if(!S.onceFlags.sawBakhamra && gameDate().y===763 && gameDate().m===1 && gameDate().d>=21){ S.onceFlags.sawBakhamra=true; S.voyaging=false; clearVoy(); S.pendingEvent=witnessBakhamra(); render(); return; }
    if(!S.voy.inspDone && dateBetween(762,11,1,763,2,14) && rnd()<0.28){ S.voy.inspDone=true; S.voyaging=false; clearVoy(); S.pendingEvent=revoltInspection(); render(); return; }
    if(dateBetween(762,11,1,763,2,14) && rnd()<0.10){ S.voyaging=false; clearVoy(); S.pendingEvent=revoltBandits(); render(); return; }
  }
  if(S.voy.daysLeft<=0){ S.voyaging=false; clearVoy(); voyArrive(); render(); return; }
  const p=(S.voy.total-S.voy.daysLeft)/S.voy.total;
  if(S.voy.crossFounder && !S.voy.founderRolled && p>=0.45){ S.voy.founderRolled=true; if(rnd()<S.voy.crossFounder){ S.voyaging=false; clearVoy(); for(const _q of (S.party||[])) _q.alive=false; S.hp=0; S.cause='shipwreck'; const _f=S.voy; S.voy=null; die(); log("Far out of sight of any land, in the heart of the great crossing from "+_f.from+", the monsoon that carried you turns and breaks the ship. No boat, no shore, no morning \u2014 the open ocean between Africa and India keeps you, your cargo, and every soul aboard."); render(); return; } }
  if(S.voy.sight && !S.voy.sightDone && p>=0.5){ S.voy.sightDone=true; log(S.voy.sight); }
  if(S.voy.terr==='deep' || S.voy.terr==='coast' || S.voy.terr==='med'){
    if(!S.voy.sickRolled && p>=0.3){ S.voy.sickRolled=true; if(rnd()<0.4){ S.seasick=true; log("You are wretchedly seasick — green at the rail and certain you will die. It passes; the sea does this to nearly everyone once."); } }
    const wreckP=(S.voy.terr==='deep'?0.016:0.009)*(hasPilot()?0.9:1)*winterStormMult(S.voy.terr)*(S.voy.storm||1);
    if(rnd()<wreckP){ S.voyaging=false; clearVoy(); S.pendingEvent=voyStorm(); render(); return; }
    if(rnd()<0.05){ S.voyaging=false; clearVoy(); S.pendingEvent=evSeaWinds(); render(); return; }
    let pp=(S.voy.terr==='coast'?0.020:0.011)*(S.banditFreq||1); if(S.voy.strait)pp*=2.8; if(convoyValue()>10000)pp*=2;
    if(rnd()<pp){ S.voyaging=false; clearVoy(); S.pendingEvent=evPirates(); render(); return; }
  }
  updateVoy();
}
function voyStorm(){
  return {h:'STORM AT SEA', t:"The sky goes green-black and the swell stands up in walls. For a night and a day the ship is a toy on the water, the crew lashed to their work, the cargo groaning in the hold.",
   ch:[{l:'Ride it out, and pray',f(){
     S.hp=clamp(S.hp-16,0,100);
     const deep=S.voy&&S.voy.terr==='deep';
     const founder=deep?0.13:0.06;
     if(rnd()<founder){ S.cause='shipwreck'; for(const p of (S.party||[])) p.alive=false; S.hp=0; die(); log("The ship is overwhelmed and goes down in the dark — no boat, no shore, no morning. The sea takes the cargo, the crew, and every one of you."); return; }
     const g=loseRandomGoods(.3); let s="The sea boards her and takes "+g;
     if(rnd()<0.28){ const who=casualty(true); if(who) s+=", and "+who+" is swept over the side and lost"; }
     else if(rnd()<0.4){ const who=casualty(false); if(who) s+=", and "+who+(/\(/.test(who)?" is drowned":" is half-drowned but hauled back inboard"); }
     if(S.hp<=0){ S.cause='shipwreck'; die(); log(s+". You never see the far shore."); return; }
     if(S.voy) S.voy.daysLeft+=2+ri(3); log(s+". The battered ship limps on, days behind.");
   }}]};
}
function witnessBakhamra(){
  return {h:'THE BATTLE OF BAKHAMRA', t:"On the dusty road between the rivers, somewhere short of Kufa, you blunder to the edge of history. Two armies are locked at a place called Bakhamra: the Alid rebel Ibrahim and his fifteen thousand against the Caliph's general Isa ibn Musa. You shelter in a ditch with your cargo and watch the Abbasid line buckle, hold, and then surge forward; you see the rebel centre break, and a knot of horsemen carry a wounded man from the field. It is, though you cannot know it yet, the death of the revolt — and very nearly the death of you, had an arrow flown a little wider.",
   ch:[
    {l:'Lie low until it passes',f(){ const d=1+ri(2); S.day+=d; S.food=Math.max(0,S.food-foodNeed()*d); if(S.voy)S.voy.daysLeft+=d; log("You keep your head down for "+d+" day"+(d>1?'s':'')+" while the victors scour the field, then slip on toward Baghdad."); }},
   ]};
}
function revoltInspection(){
  const fee=Math.max(15,Math.round(S.silver*0.06));
  const abbasid = rnd()<0.5;
  const who = abbasid ? "a checkpoint of the Caliph's troops" : "a rebel patrol flying Ibrahim's banner";
  return {h:'PAPERS AND TOLLS', t:"On the road between Basra and Baghdad you are stopped by "+who+". With the country in revolt, every armed party is taxing the traffic and sniffing for the enemy's gold. They want "+fee+" silver, and a look at who you've been paying.",
   ch:[
    {l:'Pay the '+fee+' s and keep your peace',f(){ if(S.silver>=fee){ S.silver-=fee; S.lastTollSide=abbasid?'abbasid':'rebel'; log("You pay, smile, and volunteer nothing. They wave you on into the contested country."); } else { S.silver=0; log("You scrape together what you have; it is not all they wanted, but enough to be rid of them."); } }},
    {l:'Protest that you already paid the other side',f(){
       const otherHeld = S.lastTollSide && ((abbasid && S.lastTollSide==='rebel')||(!abbasid && S.lastTollSide==='abbasid'));
       if(otherHeld){ const d=2+ri(4); S.day+=d; S.food=Math.max(0,S.food-foodNeed()*d); if(S.voy)S.voy.daysLeft+=d; S.hp=clamp(S.hp-6,0,100); log("It is exactly the wrong thing to say. To have paid fees to "+(abbasid?'the rebels':'the Caliph')+" — a government these men consider treasonous — enrages them. They arrest you on the spot, and you spend "+d+" days under guard, your cargo picked over, before a bored officer decides you are a fool and not a spy, and lets you go."); }
       else { if(S.silver>=fee){ S.silver-=fee; log("They are unimpressed by your protest and simply take the toll anyway. You pay, and learn to keep your mouth shut."); } else { S.silver=0; log("They take what you have and tell you to save your breath."); } }
    }},
   ]};
}
function revoltBandits(){
  const demand=Math.max(20,Math.round(S.silver*0.18));
  return {h:'DESERTERS ON THE ROAD', t:"With the country at war the roads have filled with broken men — deserters and bandits who can no longer tell the difference. A dozen of them block the track between the rivers, armed with whatever they carried off from the fighting.",
   ch:[
    {l:'Pay them off ('+demand+' s)',f(){ if(S.silver>=demand){ S.silver-=demand; log("You buy your passage. They melt back into the date-groves to wait for the next traveller."); } else { S.silver=0; const lost=loseRandomGoods(.3); S.hp=clamp(S.hp-10,0,100); log("You haven't the silver; they take "+lost+" and leave you bruised."); if(S.hp<=0){S.cause='deserters on the Basra road';die();} } }},
    {l:'Stand and fight',f(){ const str=combatStrength(), foes=8+ri(6); if(str>=foes){ S.hp=clamp(S.hp-8,0,100); log("Your people close up and show steel, and the rabble decides you are not worth the bleeding. They scatter."); } else { const lost=loseRandomGoods(.35); const who=casualty(rnd()<0.3); S.hp=clamp(S.hp-16,0,100); log("They are too many. You lose "+lost+(who?", and "+who+" is hurt in the scrum":"")+", and break free only by leaving them something to fight over."); if(S.hp<=0){S.cause='deserters on the Basra road';die();} } }},
   ]};
}
function bakhamraTalk(cityName){
  if(dateBetween(763,1,21,763,4,21)){
    if(cityName==='Basra' && dateBetween(763,2,14,763,2,14)){ S.pendingEvent={h:'THE REVOLT IS ENDED', t:"The news runs through Basra like fire through reeds: Ibrahim is dead — died of the wound he took at Bakhamra, they say, an arrow in the throat — and with him the rising of the House of Ali. The Caliph al-Mansur has won. Men who shouted for Ibrahim a month ago discover they were always loyal subjects; the soldiers grow bold, and the careful merchant settles his accounts and looks to the road.", ch:[{l:'Say nothing, and trade',f(){}}]}; return true; }
    if(cityName==='Basra' && dateBetween(763,1,21,763,2,13)){ S.pendingEvent={h:'A REVOLT CRUMBLING', t:"Basra is jittery with bad news for the rebels. Word of a defeat at Bakhamra has come down the river — Ibrahim beaten, wounded, his army melting away. No one yet knows whether he lives. The market is half-shuttered, the soldiers nervous, and prices swing on every fresh rumour. A wise trader keeps his head down and his goods close.", ch:[{l:'Keep your head down',f(){}}]}; return true; }
    S.pendingEvent={h:'ALL THE TALK IS OF BAKHAMRA', t:"You can hardly buy a melon without hearing of it: the great battle at Bakhamra, where the Caliph's army broke the Alid rebel Ibrahim. Everyone has a cousin who was there; everyone knew all along how it would end. The roads between "+(cityName==='Baghdad'?'here and Basra':'here and Baghdad')+" are said to be thick with deserters and Caliphal patrols alike.", ch:[{l:'Listen, and move on',f(){}}]}; return true;
  }
  return false;
}
function checkSeaHistory(port){
  if(port==='Trebizond' && S.onceFlags && !S.onceFlags.trebizondSea){ S.onceFlags.trebizondSea=true; S.pendingEvent={h:'THE BLACK SEA ROAD', t:"Having found your way overland to Trebizond, you have also found the captains who run the wild Black Sea coast west to the capital. It is a stormy passage \u2014 the old Greeks named this the Inhospitable Sea before they dared flatter it as the Euxine \u2014 but it is swift, and direct. You may now take ship between Trebizond and Constantinople without the long road back through Iconium.", ch:[{l:'Good to know',f(){}}]}; return; }
  if(port==='Yangzhou' && !S.onceFlags.yangzhouMassacre){ S.onceFlags.yangzhouMassacre=true; S.pendingEvent={h:'A CITY THAT REMEMBERS', t:"In the foreigners' quarter an old Persian factor, hearing your trade, grips your sleeve. 'Two years,' he says. 'Two years since the soldiers came over the wall and cut the throats of every Tazi and Persian merchant they could find — thousands of us, for the silver in our chests. My sons among them.' He lets go, and straightens. 'And yet here I am, and here you are, and the ships still sail. Trade is a kind of forgetting.' He wishes you good trade in his own tongue's nearest equivalent, and is gone back into the crowd.", ch:[{l:'Take his meaning, and trade on',f(){}}]}; return; }
  if(port==='Basra'){ if(bakhamraTalk('Basra')) return; }
}

/* ---- voyage screen ---- */
function updateVoy(){ if(!S||!S.voy)return; renderStats(); renderLog();
  const e=$('sDay'); if(e)e.textContent='Day '+S.day;
  const sl=$('sLoc'); if(sl)sl.textContent=S.voy.water;
  const r=$('sRemain'); if(r)r.textContent=fmtDist(S.voy.daysLeft*voyLiPerDay(S.voy.terr))+' \u00b7 '+S.voy.daysLeft+' day'+(S.voy.daysLeft!==1?'s':'')+' to '+S.voy.to;
  const p=$('sProg'); if(p)p.style.width=Math.round((1-S.voy.daysLeft/S.voy.total)*100)+'%';
  const ph=SKY[skyPhase()], set=(id,a,v)=>{const el=$(id);if(el)el.setAttribute(a,v);};
  set('sSkyTop','stop-color',ph.t); set('sSkyBot','stop-color',ph.b);
  set('sSun','opacity',ph.sun); set('sMoon','opacity',ph.moon); set('sStars','opacity',ph.star); set('sVeil','opacity',ph.veil);
}
function voyLine(){
  const t=S.voy.terr;
  if(t==='land')  return "The caravan track winds on through dust and heat, with the long patience of the road.";
  if(t==='canal') return "The barge slides between green banks, poled and towed, the cultivated land sliding by close enough to touch.";
  if(t==='med')   return "The galley keeps the coast in sight, island to headland to island, in the crowded and contested waters of the Middle Sea.";
  return "Blue water in every direction. The captain keeps the casks; your only cares are the food and the weather, and the long roll of the monsoon swell.";
}
function renderVoy(m){
  const v=S.voy; if(!v){ S.screen=S.seaMode?'port':'city'; render(); return; }
  const pct=Math.round((1-v.daysLeft/v.total)*100);
  m.innerHTML='<h2>'+(v.terr==='land'?'On the road, bound for ':v.terr==='canal'?'On the water, bound for ':'At sea, bound for ')+v.to+'</h2>'+
    '<p class="sub"><span id="sDay">Day '+S.day+'</span> · <span id="sLoc">'+v.water+'</span> · <span id="sRemain">'+fmtDist(v.daysLeft*voyLiPerDay(v.terr))+' \u00b7 '+v.daysLeft+' day'+(v.daysLeft!==1?'s':'')+' to '+v.to+'</span></p>'+
    '<div class="bar"><i id="sProg" style="width:'+pct+'%"></i></div>'+
    (v.terr==='land'?journeyScene():sailScene())+
    '<p class="sub" style="margin-top:8px;border-left:2px solid var(--line);padding-left:10px">'+voyLine()+'</p>'+
    '<button class="seal" onclick="skipVoy()">Skip ahead</button>';
}
function skipVoy(){
  S.voyaging=false; clearVoy();
  for(let i=0;i<160 && S.voy;i++){
    if(S.food<foodNeed()){ S.pendingEvent=evSeaFood(); render(); return; }
    S.day++; S.food=Math.max(0,S.food-foodNeed()); accrueGuardWages(); S.voy.daysLeft--;
    if(S.voy.terr==='land' && (S.voy.from==='Basra'||S.voy.to==='Basra') && (S.voy.from==='Baghdad'||S.voy.to==='Baghdad')){
      if(!S.onceFlags.sawBakhamra && gameDate().y===763 && gameDate().m===1 && gameDate().d>=21){ S.onceFlags.sawBakhamra=true; S.pendingEvent=witnessBakhamra(); render(); return; }
    }
    if(S.voy.daysLeft<=0){ voyArrive(); render(); return; }
    const p=(S.voy.total-S.voy.daysLeft)/S.voy.total;
    if(S.voy.sight && !S.voy.sightDone && p>=0.5){ S.voy.sightDone=true; log(S.voy.sight); }
    if(S.voy.terr==='deep'||S.voy.terr==='coast'||S.voy.terr==='med'){
      const wreckP=(S.voy.terr==='deep'?0.016:0.009)*(hasPilot()?0.9:1)*winterStormMult(S.voy.terr)*(S.voy.storm||1);
      if(rnd()<wreckP){ S.pendingEvent=voyStorm(); render(); return; }
      if(rnd()<0.05){ S.pendingEvent=evSeaWinds(); render(); return; }
      let pp=(S.voy.terr==='coast'?0.020:0.011)*(S.banditFreq||1); if(S.voy.strait)pp*=2.8; if(convoyValue()>10000)pp*=2;
      if(rnd()<pp){ S.pendingEvent=evPirates(); render(); return; }
    }
  }
  render();
}
function voyArrive(){
  const to=S.voy.to, from=S.voy.from; S.voy=null; S.voyaging=false; clearVoy(); S.seasick=false;
  S.dealDays=0; S.priceLock={};
  if(isSeaExitCity(to)){
    S.seaMode=false; S.portName=null;
    const ti=S.itin.findIndex(x=>x.name===to); if(ti>=0)S.idx=ti;
    S.dir=1; S.legKm=0; S.water=waterMax();
    if(!S.cityDay)S.cityDay={}; restockToNow(to);
    log("You come ashore at "+to+", the sea-road behind you. You will want fresh pack-animals here before you take to the land again.");
    if(!S.returning && to===goalName()){ S.reachedCpl=true; S.seaUnlocked=true; S.bySea=true; growNephew(); S.screen='end'; return; }
    if(S.returning && to===homeName()){ S.bySea=true; S.screen='home'; return; }
    if(to==='Baghdad'){ bakhamraTalk('Baghdad'); }
    if(to==='Aleppo' && S.onceFlags && !S.onceFlags.leoMet && !S.party.some(p=>p.name==='Leo the Pilot'&&p.alive)){ S.onceFlags.leoMet=true; S.pendingEvent=leoOffer(); }
    S.screen='city'; return;
  }
  S.portName=to; S.dir=1; S.water=waterMax(); S.hereSince=S.day; if(S.townCash)delete S.townCash[to];
  if(!S.cityDay)S.cityDay={}; restockToNow(to);
  log(SEA_BYNAME[to].arr || ("You raise "+to+" and put in."));
  checkSeaHistory(to);
  if(!S.pendingEvent){ if(guardOweTotal(to)>0){ S.pendingEvent=exGuardConfront(to); } else if((S.wageDebt||0)>0){ S.pendingEvent=guardDebtReminder(); } }
  S.screen='port';
}

/* ---- a sea-port city screen (markets + onward passages) ---- */
function renderPort(m){
  const c=city(); if(!c){ S.screen='city'; render(); return; }
  recordSeen();
  let rows=cityShownGoods(c).map(g=>{
    const p=price(g,c), held=S.goods[g.id], avail=(S.stock[c.name]&&S.stock[c.name][g.id])||0;
    const ref = held>0 ? (S.basis[g.id]||0) : (S.lastBasis[g.id]||0);
    const pcls = ref>0 ? (p<ref?'green':(p>ref?'blue':'gold')) : 'gold';
    let paid; if(held>0 && ref>0) paid='<span class="'+pcls+'">'+Math.round(ref)+' s</span>'; else if(ref>0) paid='<span style="font-style:italic;color:var(--dim)">'+Math.round(ref)+' s</span>'; else paid='<span style="color:var(--dim)">—</span>';
    const availTxt = avail>0?'<span style="color:var(--dim)"> · '+avail+' here</span>':'<span class="red"> · none</span>';
    return '<tr><td>'+g.n+' <span style="color:var(--dim)">('+g.u+', wt '+g.wt+')</span>'+availTxt+'</td>'+
    '<td class="num '+pcls+'">'+p+' s</td><td class="num">'+paid+'</td><td class="num">'+held+'</td>'+
    '<td><button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',1)">+1</button><button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',10)">+10</button>'+
    '<button class="tiny" onclick="sell(\''+g.id+'\',1)">−1</button><button class="tiny" onclick="sell(\''+g.id+'\',10)">−10</button></td></tr>';
  }).join('');
  const edges=seaEdges(c.name);

function exploreWilds(){

function regionMap(){
  const d=nextCity(); if(!d)return '';
  const itin=((!S.routeChosen && !S.returning) ? MAIN1.concat(MAIN2) : S.itin), n=itin.length, x0=14, x1=306, span=x1-x0;
  // geographic: east (frac 0) on the RIGHT, west (frac 1) on the LEFT — independent of travel direction
  const xf=(frac)=> x1 - span*clamp(frac,0,1);
  const terrCol={settled:'#6a5630',steppe:'#5a6a3a',desert:'#caa66a',harsh:'#a8763e',mountain:'#7a7488'};
  let segs='';
  for(let i=0;i<n-1;i++){ const passed = S.returning ? (i>=S.idx) : (i<S.idx); segs+='<line x1="'+xf(itin[i].frac)+'" y1="30" x2="'+xf(itin[i+1].frac)+'" y2="30" stroke="'+(terrCol[itin[i+1].terr]||'#888')+'" stroke-width="3" '+(passed?'opacity=".4"':'')+'/>'; }
  let nodes='';
  for(let i=0;i<n;i++){
    const x=xf(itin[i].frac), here=i===S.idx;
    const future = S.returning ? (i>S.idx) : (i>S.idx); // cities still ahead are hollow either way
    const passed = S.returning ? (i<S.idx) : (i<S.idx);
    nodes+='<circle cx="'+x+'" cy="30" r="'+(here?4:2.6)+'" fill="'+(future?'none':'var(--silk)')+'" '+(future?'stroke="var(--line)" stroke-width="1.3"':'')+' '+(passed?'opacity=".45"':'')+'/>';
  }
  const lab=(frac,anchor,txt,cls)=>'<text x="'+xf(frac)+'" y="46" fill="'+(cls||'var(--dim)')+'" font-size="9.5" font-family="Georgia,serif" text-anchor="'+anchor+'">'+txt+'</text>';
  // endpoints by geography: easternmost (frac 0) anchored right, westernmost (frac 1) anchored left
  let east=itin[0], west=itin[0]; for(const c of itin){ if(c.frac<east.frac)east=c; if(c.frac>west.frac)west=c; }
  let labels=lab(east.frac,'end',east.name)+lab(west.frac,'start',west.name);
  if(itin[S.idx]!==east && itin[S.idx]!==west) labels+=lab(itin[S.idx].frac,'middle',itin[S.idx].name,'var(--silk)');
  const frac=clamp(S.legKm/(legDist()||1),0,1);
  const mx=xf(city().frac + (d.frac-city().frac)*frac);

    '<text x="14" y="12" fill="var(--dim)" font-size="8" font-family="Georgia,serif">west</text>'+

    '<g id="jMark" transform="translate('+mx+',30)"><path d="M0 -7 L5 0 L0 7 L-5 0 Z" fill="var(--seal)"/></g>'+
  '</svg>';
}
