      '<button onclick="huntRoad()">Hunt (1 day)</button>'+
      '<button onclick="turnBack()">Turn back</button>'+
      '<button class="seal" onclick="skipToStop()">Skip ahead</button>';
  } else {
    html+='<div class="panel speedrow" id="pacelive">Caravan pace: '+paceButtons(true)+
      '<span style="color:var(--dim);font-size:.7rem"> — Leisurely rests the party, Grueling costs health</span></div>'+
      (cargoW()>cargoCap()?'<p class="red">The caravan is overloaded — pace is halved. <button class="seal tiny" onclick="jettison()">Abandon excess cargo</button></p>':'')+
      '<button class="seal" onclick="startJourney()">Break camp & press on</button>'+
      '<button onclick="huntFood()">Hunt for food (1 day)</button>'+
      '<button onclick="turnBack()">Turn back</button>'+
      '<button onclick="skipToStop()">Skip ahead</button>';
  }
  m.innerHTML=html;
}
function renderRoute(m){
  m.innerHTML='<h2>'+(isWest()?'Kashgar — the Taklamakan ahead':'The Jade Gate <span class="zh">玉門關</span>')+'</h2>'+
  '<p class="sub">The Taklamakan begins — "go in and you do not come out." No one crosses it; you go around, north or south, the two roads rejoining at '+fork2Name()+'.'+((S.routeReuse||0)>0?' <span class="gold">You have run the same road several times now; the markets you favour have grown stale to your trade, and a fresh road may pay better.</span>':'')+'</p>'+
  '<div class="routes">'+
  '<div class="panel routeopt"><h3 class="gold">The Northern Road</h3>'+
  '<p>By Hami, Turfan, and Kucha — longer ('+fmtDist(2310)+'), but the oasis towns are richer and closer together, and the wells mostly honest.</p>'+
  '<button onclick="chooseRoute(\'n\')">Set out for Hami (northern road, '+fmtDist(2310)+')</button></div>'+
  '<div class="panel routeopt"><h3 class="gold">The Southern Road</h3>'+
  '<p>By Miran and Khotan — shorter ('+fmtDist(1720)+'), but crueler, the wells fewer. Khotan sells river jade at a fraction of its eastern worth. Bring water. Bring more water.</p>'+
  '<button onclick="chooseRoute(\'s\')">Set out for Miran (southern road, '+fmtDist(1720)+')</button></div>'+
  '</div>';
}
function renderRouteReturn(m){
  const fc=fork2Name(); const fz={'Dunhuang':'敦煌','Kashgar':'疏勒'}[fc]||'';
  m.innerHTML='<h2>'+fc+((fz&&(!isWest()||S.inChina))?' <span class="zh">'+fz+'</span>':'')+' <span class="sub">· homeward</span></h2>'+
  '<p class="sub">'+fc+' again — and the Taklamakan again, to be gone around, not crossed. Which way home?</p>'+
  '<div class="routes">'+
  '<div class="panel routeopt"><h3 class="gold">The Northern Road</h3>'+
  '<p>By Aksu, Kucha, Turfan, and Hami — the richer chain of oases, the wells mostly honest. Turfan still sells its grape-wine cheap.</p>'+
  '<button onclick="chooseReturnRoute(\'n\')">Northern road home</button></div>'+
  '<div class="panel routeopt"><h3 class="gold">The Southern Road</h3>'+
  '<p>By Yarkand, Khotan, and Miran — shorter, crueler, paved with jade money. Your last chance to buy Khotan jade before the long desert.</p>'+
  '<button onclick="chooseReturnRoute(\'s\')">Southern road home</button></div>'+
  '</div>';
}
function renderEvent(m){
  const e=S.pendingEvent;
  m.innerHTML='<div class="panel event"><h3>'+e.h+'</h3><p>'+e.t+'</p>'+
  e.ch.map((c,i)=>'<button onclick="evChoice('+i+')">'+c.l+'</button>').join('')+'</div>';
}
function renderOutcome(m){
  m.innerHTML='<div class="panel event"><h3>'+(S.outcomeH||'OUTCOME')+'</h3><p>'+S.eventOutcome+'</p>'+
  '<button class="seal" onclick="continueOutcome()">Continue</button></div>';
}
function continueOutcome(){ S.eventOutcome=null; resumeAfterEvent(); }
function evChoice(i){
  const e=S.pendingEvent;
  const before=S.log.length;
  e.ch[i].f();
  if(S.dead){ S.eventOutcome=null; resumeAfterEvent(); return; }
  if(S.deathQueue && S.deathQueue.length && !(S.pendingEvent && S.pendingEvent!==e)){ S.pendingEvent=deathDialog(); render(); return; }
  if(S.pendingEvent && S.pendingEvent!==e){ render(); return; } // the choice queued a follow-up dialogue
  // gather whatever the choice just wrote to the log and show it as the outcome
  const added=[]; for(let k=0;k<S.log.length-before;k++) added.push(S.log[k].t);
  if(added.length){ S.eventOutcome=added.reverse().join(' '); S.outcomeH=e.h; render(); }
  else resumeAfterEvent();
}
function renderEnd(m){
  const sold=S.onceFlags.soldOut;
  const gv=finalGoodsValue();
  const west=isWest();
  if(!sold){
    if(west){
      m.innerHTML='<h2>Chang’an <span class="zh">長安</span> <span class="sub">· the journey’s far end</span></h2>'+
      '<p>After '+(S.day-1)+' days on the road, the towers of Chang’an rise at last out of the loess haze — the capital of the Tang, greatest city of the East, the very end of the world as the Romans reckon it. The market-wardens eye your foreign face and your road-worn beasts with frank curiosity, and a fortune’s worth of buyers behind them.</p>'+
      '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop the <span class="gold">'+Math.round(S.silver)+'</span> in your strongbox.</p>'+
      '<button class="seal" onclick="sellAllFinal()">Sell everything</button>';
    } else {
      m.innerHTML='<h2>Constantinople '+(S.bySea?'<span class="sub">· into the Golden Horn</span>':'<span class="sub">· the market at Chalcedon, across the strait</span>')+'</h2>'+
      '<p class="sub">'+(S.itin[S.itin.length-1].desc||'')+'</p>'+
      '<p>'+(S.bySea?'Your ship works up the Bosphorus under oar and sail and runs at last into the Golden Horn itself — no ferry, no near shore. You have come to Constantinople entire, the Queen of Cities rising sheer from the water on every side: the sea-walls, the domes, and over them the vast golden dome of Hagia Sophia. You came two empires and a year by sea and land to stand on this quay.':'After '+(S.day-1)+' days on the road, you halt at Chalcedon on the Asian shore. Across the Bosphorus the City of the Romans rises in gold — too grand, and too wary of caravans, to enter lightly — so here at the water’s edge you make your market, and Greek-speaking brokers row over to meet you.')+'</p>'+
      '<p>Your remaining cargo would fetch <span class="gold">'+gv+' silver</span> here, on top of the <span class="gold">'+Math.round(S.silver)+'</span> in your strongbox.</p>'+
      '<button class="seal" onclick="sellAllFinal()">Sell everything</button>';
    }
    return;
  }
  const total=Math.round(S.silver);
  const [r,flavor]=rank(total);
  const survivors=livingParty().map(c=>c.name);
  const lost=S.party.filter(c=>!c.alive&&!c.married).map(c=>c.name);
  recordRun('reached '+goalName());
  m.innerHTML='<h2>'+(west?'The Eastern Market':'The Western Market')+'</h2>'+
  '<p class="sub">'+S.name+' · '+(S.route==='n'?'the northern road':'the southern road')+' · '+(S.day-1)+' days out</p>'+
  '<div class="panel"><p>Worth so far: <span class="gold" style="font-size:1.3rem">'+total+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+')</span></p>'+
  '<p>Standing: <span class="gold">'+r+'</span></p><p>'+flavor+'</p>'+
  '<p class="green">With you: '+(survivors.length?survivors.join(', '):'no one but yourself')+', and '+totalAnimals()+' animal'+(totalAnimals()!==1?'s':'')+'.</p>'+
  (lost.length?'<p class="red">Buried on the road out: '+lost.join(', ')+'.</p>':'')+settledLine()+
  '</div>'+
  '<div class="panel"><p>You could conclude the venture here — or load the beasts with '+(west?'eastern silk, jade, and spice and run the whole road back to Constantinople, where the Romans pay in gold':'western glass, coral, and amber and run the whole road back to Chang’an, where such things fetch Tang prices')+'. Home is another '+(S.day-1)+'-odd days and every risk again.</p>'+
  '<button class="seal" onclick="startReturn()">Buy '+(west?'eastern':'western')+' goods & head home</button> '+
  '<button onclick="concludeHere()">Conclude the venture here</button></div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
function concludeHere(){ S.screen='conclude'; render(); }
function yearsPhrase(days){
  const y=days/360;
  if(y<1.3) return "the better part of a year";
  if(y<1.8) return "a year and a half on the road";
  if(y<2.4) return "two hard years";
  if(y<3.2) return "the better part of three years";
  return Math.round(y)+" years away";
}
function renderHome(m){
  if(!S.onceFlags.soldHome){
    const gv=finalGoodsValue();
    if(isWest()){
      m.innerHTML='<h2>Constantinople <span class="sub">· home at last</span></h2>'+
      '<p>The sea-walls and the great dome of the Holy Wisdom again, after '+(S.day-1)+' days — '+yearsPhrase(S.day-1)+'. The City is as you left it, eternal and indifferent, but it is home, and it pays in gold for the silk and spice and jade of the East.</p>'+
      '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop <span class="gold">'+Math.round(S.silver)+'</span> in hand.</p>'+
      '<button class="seal" onclick="sellAllFinal();S.onceFlags.soldHome=true;render()">Sell everything</button>';
      return;
    }
    m.innerHTML='<h2>Chang\'an <span class="zh">長安</span></h2>'+
    '<p>The western gate again, after '+(S.day-1)+' days — '+yearsPhrase(S.day-1)+'. The rebellion has guttered out; the city is thinner and stranger, but it is home, and it pays in full for coral, glass, and wine.</p>'+
    '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop <span class="gold">'+Math.round(S.silver)+'</span> in hand.</p>'+
    '<button class="seal" onclick="sellAllFinal();S.onceFlags.soldHome=true;render()">Sell everything</button>';
    return;
  }
  renderFinal(m, 'home to '+homeName()+' (round trip)', true);
}
function setOutAgain(){
  // continue the same merchant on a fresh westward lap; everything earned and everyone alive carries over
  S.laps=(S.laps||0)+1;
  S.itin=preForkItin(isWest()); S.idx=0; S.legKm=0;
  S.returning=false; S.reachedCpl=false; S.routeChosen=false; S.returnRouteChosen=false; S.dir=1;
  S.onceFlags.soldHome=false; S.onceFlags.soldOut=false; S.onceFlags.lostBeforeKashgar=false; S.priceLock={};
  S.stock=makeStock([...MAIN1,...NORTH,...SOUTH,...MAIN2,...SEA]);
  S.water=waterMax(); S.screen='city'; S.journeying=false; clearJourney();
  log("You cannot sit still. The camels are restless, the strongbox has room, and the road west is, after all, right there. You set out again — venture number "+(S.laps+1)+".");
  render();
}
function renderFinal(m,outcomeText,canContinue){
  const score=Math.round(S.silver + (typeof herdValue==='function'?herdValue(city()):0)); // silver plus the beasts you could sell here
  const [r,flavor]=rank(score);
  const survivors=livingParty().map(c=>c.name);
  const lost=S.party.filter(c=>!c.alive&&!c.married).map(c=>c.name);
  recordRun(outcomeText);
  m.innerHTML='<h2>'+(canContinue?'Home again':'Journey\'s end')+'</h2>'+
  '<p class="sub">'+S.name+' · '+(S.laps?(S.laps+1)+' ventures · ':'')+(S.returning?'round trip':(S.route==='n'?'northern road':'southern road'))+' · '+(S.day-1)+' days'+(S.day-1>360?' ('+yearsPhrase(S.day-1)+')':'')+'</p>'+
  '<div class="panel"><p>Total worth: <span class="gold" style="font-size:1.3rem">'+score+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+')</span></p>'+(totalAnimals()>0?'<p class="sub">Including '+totalAnimals()+' head of livestock, worth '+Math.round(herdValue(city()))+' silver sold here.</p>':'')+(belovedNote()?'<p class="gold">'+belovedNote()+'</p>':'')+'<p class="gold">'+wealthArc(S.startSilver||900,score)+'</p>'+
  '<p>Rank: <span class="gold">'+r+'</span></p><p>'+flavor+'</p>'+
  '<p class="green">'+(canContinue?'Still standing':'Arrived')+': you'+(survivors.length?', '+survivors.join(', '):'')+', and '+totalAnimals()+' animal'+(totalAnimals()!==1?'s':'')+'.</p>'+
  (lost.length?'<p class="red">Buried on the road: '+lost.join(', ')+'.</p>':'<p class="green">You buried no one — a rare and unfashionable achievement.</p>')+settledLine()+
  '</div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>'+
  (canContinue?'<button class="seal" onclick="setOutAgain()">Load up and set out again</button> ':'')+
  '<button onclick="backToTitle()">'+(canContinue?'Retire — begin a new venture':'Begin a new venture')+'</button>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
function deathWhere(){
  if(S.voy){ var t=S.voy.terr; var md=(t==='land')?'on the road':(t==='canal')?'on the river':'at sea'; return md+' between '+S.voy.from+' and '+S.voy.to; }
  if(S.seaMode){ return 'in the harbour at '+(S.portName||(city()&&city().name)||'a far port'); }
  if(typeof nextCity==='function' && nextCity()){ return 'on the road short of '+nextCity().name; }
  if(city()){ return 'at '+city().name; }
  return 'on the road';
}
function renderSuccession(m){
  var sw=S.heirSwap||{};
  var s='<h2 class="red">You have died of '+(sw.cause||'the road')+'.</h2>'+
    '<div class="panel"><p>'+ (sw.fallen||'The merchant') +' is dead on the road, far from home. The men stand uncertain over the cargo \u2014 and then they look to '+ S.name +', your sister\'s boy, who set out a green youth and has, in this hard hour, nobody above him. The whole weight of the caravan, its debts and its beasts and its long road still to run, settles onto his shoulders. He takes it up.</p>';
  if(sw.placeholder){
    s+='<p class="sub">In the confusion one of the drivers asks the young master his name again, to set it rightly in the ledger.</p>'+
       '<div style="margin:8px 0"><input id="heirName" type="text" maxlength="18" placeholder="his name" value="'+escAttr((S.name||'').replace(/^little\s+/i,''))+'" style="padding:6px 8px;font-size:1rem;background:#f3e7c8;border:1px solid #6b4f2a;border-radius:3px;font-family:Georgia,serif"> <span id="heirWarn" class="sub red"></span></div>'+
       '<button class="seal" onclick="confirmHeir()">Take up the lead</button>';
  } else {
    s+='<button class="seal" onclick="confirmHeir()">'+S.name+' takes up the lead</button>';
  }
  s+='</div>';
  m.innerHTML=s;
}
function renderDead(m){
  const c=city(); // nearest market reached
  const goodsVal=GOODS.reduce((a,g)=>a+S.goods[g.id]*price(g,c),0);
  const herdVal=(typeof herdValue==='function'?herdValue(c):0);
  const worth=Math.round(S.silver+goodsVal+herdVal);
  const [r,flavor]=rank(worth);
  const lost=S.party.filter(x=>!x.alive&&!x.married).map(x=>x.name);
  recordRun('died of '+S.cause+(S.returning?' (homeward)':'')+', day '+(S.day-1));
  m.innerHTML='<h2 class="red">You have died of '+S.cause+'.</h2>'+
  '<p class="sub">Day '+(S.day-1)+', '+deathWhere()+'.</p>'+
  '<div class="tomb"><div style="letter-spacing:.2em;margin-bottom:8px">HERE LIES</div>'+
  '<div class="name">'+S.name+'</div>'+
  '<div style="margin-top:8px;font-style:italic">"'+epitaphFor(S.cause)+'"</div></div>'+
  '<div class="panel"><p>Final reckoning, valued at '+c.name+'’s prices:</p>'+
  '<p>Silver in the strongbox: <span class="gold">'+Math.round(S.silver)+'</span><br>'+
  'Goods on the camels: <span class="gold">'+Math.round(goodsVal)+'</span><br>'+(totalAnimals()>0?'Livestock, sold here: <span class="gold">'+Math.round(herdVal)+'</span><br>':'')+
  'Estate total: <span class="gold" style="font-size:1.25rem">'+worth+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+', '+(S.day-1)+' days)</span></p>'+
  '<p>Posthumous rank: <span class="gold">'+r+'</span></p><p class="sub">'+deathFlavor()+'</p>'+
  (lost.length?'<p class="red">Lost along the way: '+lost.join(', ')+'.</p>':'')+settledLine()+
  '</div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>'+
  '<div style="text-align:center"><button onclick="backToTitle()">Begin again</button></div>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
render();
</script>
</body>
</html>
