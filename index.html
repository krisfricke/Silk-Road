<style>
  :root{

    --dim:#8a7a5e;
    --seal:#c0392b;       /* cinnabar seal */
    --jade:#86a883;
    --blue:#6f9fd8;       /* lapis blue — a selling price */

  body{background:var(--ink);color:var(--bone);
    font-family:Georgia,'Times New Roman',serif;

  #app{width:100%;max-width:740px}
  .mono{font-family:ui-monospace,'Cascadia Mono',Menlo,Consolas,monospace}

  header{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--line);padding:6px 2px 8px}
  header h1{font-size:1.05rem;letter-spacing:.22em;color:var(--silk);font-weight:normal}
  header h1 .zh{color:var(--seal);letter-spacing:0;margin-right:.5em}
  header .date{font-size:.8rem;color:var(--dim)}

  #stats{display:flex;flex-wrap:wrap;gap:4px 14px;padding:8px 2px;

  #stats b{color:var(--silk);font-weight:normal}
  #stats .bad{color:var(--seal)}

  #ribbon{display:flex;flex-wrap:wrap;gap:2px 10px;padding:8px 2px;font-size:.72rem;
    color:var(--dim);border-bottom:1px solid var(--line)}
  #ribbon .city{white-space:nowrap}
  #ribbon .done{color:#5d5141;text-decoration:line-through 1px}
  #ribbon .here{color:var(--seal)}
  #ribbon .here::before{content:"◆ ";}

  #main{padding:16px 2px;min-height:300px}
  h2{font-size:1.3rem;color:var(--silk);font-weight:normal;margin-bottom:2px}
  h2 .zh{color:var(--seal);font-size:1rem;margin-left:.4em}
  .sub{color:var(--dim);font-style:italic;margin-bottom:14px;font-size:.9rem}
  p{line-height:1.55;margin-bottom:10px}

  button{background:none;border:1px solid var(--silk);color:var(--silk);
    font-family:inherit;font-size:.85rem;padding:7px 14px;cursor:pointer;margin:3px 4px 3px 0}
  button:hover{background:var(--silk);color:var(--ink)}
  button.seal{border-color:var(--seal);color:var(--seal)}
  button.seal:hover{background:var(--seal);color:var(--bone)}
  button.tiny{padding:3px 7px;font-size:.72rem;margin:1px}
  button:disabled{opacity:.35;cursor:default}
  button:disabled:hover{background:none;color:var(--silk)}
  input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--bone);
    font-family:inherit;padding:7px;font-size:1rem;width:220px}

  table{width:100%;border-collapse:collapse;font-size:.8rem;margin:8px 0}
  th{color:var(--dim);font-weight:normal;text-align:left;padding:3px 4px;border-bottom:1px solid var(--line)}
  td{padding:4px;border-bottom:1px solid #281f18}
  td.num{text-align:right}

  .panel{border:1px solid var(--line);background:var(--panel);padding:14px;margin:10px 0}
  .event{border-color:var(--seal)}
  .event h3{color:var(--seal);font-weight:normal;letter-spacing:.1em;margin-bottom:8px}

  .bar{height:8px;background:var(--panel);border:1px solid var(--line);margin:10px 0}
  .bar i{display:block;height:100%;background:var(--silk)}

  #log{border-top:1px solid var(--line);margin-top:8px;padding:8px 2px;
    font-size:.72rem;color:var(--dim);line-height:1.5}
  #log .d{color:#665942}

  .pace label{margin-right:14px;font-size:.85rem;cursor:pointer}
  .routeopt{flex:1;min-width:240px}
  .routes{display:flex;gap:10px;flex-wrap:wrap}
  .tomb{border:1px solid var(--dim);max-width:340px;margin:20px auto;padding:18px;
    text-align:center;color:var(--dim)}
  .tomb .name{color:var(--bone);font-size:1.1rem}
  .gold{color:var(--silk)}
  .red{color:var(--seal)}
  .green{color:var(--jade)}
  .blue{color:var(--blue)}
  /* travel scene */
  .scene{width:100%;display:block;border:1px solid var(--line);background:var(--ink);margin:4px 0}
  @keyframes duneFar{from{transform:translateX(-350px)}to{transform:translateX(0)}}
  @keyframes duneNear{from{transform:translateX(-350px)}to{transform:translateX(0)}}
  @keyframes plod{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .sFar{animation:duneFar 30s linear infinite}
  .sNear{animation:duneNear 13s linear infinite}
  .plod{animation:plod 1.5s ease-in-out infinite;transform-origin:center bottom}
  .twinkle{animation:plod 2.2s ease-in-out infinite}
  .speedrow button{font-size:.78rem;padding:5px 10px}
  .speedrow button.on{background:var(--silk);color:var(--ink)}
  .regionmap{width:100%;display:block;margin:2px 0 8px}
  @media(prefers-reduced-motion:reduce){.sFar,.sNear,.plod,.twinkle{animation:none}}
  .scene.paused .sFar,.scene.paused .sNear,.scene.paused .plod,.scene.paused .twinkle{animation-play-state:paused}
  @media(max-width:480px){ #stats{font-size:.72rem;gap:3px 10px} button{padding:8px 12px} }
</style>
</head>

      : "You set out from Constantinople, Queen of Cities, with "+S.silver+" silver, three mules, and your sister's boy in tow. The whole length of the world lies eastward — through the Saracen lands and the high passes to the silk-markets of the Tang. Your mules are steady on road and mountain alike; trade them for desert camels when the sands begin, if you are wise.")
    : (humble

      : "You leave the western gate of Chang'an with "+S.silver+" silver, three camels, and a head full of prices. The rebellion smolders behind you; the whole world is in front."));

let GMIN=null;
function goodMin(g){
  if(!GMIN){ GMIN={}; const cities=[...MAIN1,...NORTH,...SOUTH,...MAIN2];
    for(const gg of GOODS){ let m=Infinity; for(const c of cities){ const base=(OVR[c.name]&&OVR[c.name][gg.id]!=null)?OVR[c.name][gg.id]:gg.e+(gg.w-gg.e)*c.frac; if(base<m)m=base; } GMIN[gg.id]=m; } }
  return GMIN[g.id];
}
function makeStock(allCities){
  const stock={};
  for(const c of allCities){ if(!stock[c.name]){stock[c.name]={}; for(const g of GOODS){
    const base=(OVR[c.name]&&OVR[c.name][g.id]!=null)?OVR[c.name][g.id]:g.e+(g.w-g.e)*c.frac;
    const cheap=goodMin(g);
    let b=STOCKBASE[g.id];
    if(base<=cheap*1.3) b*=2.4; // abundant where this good is near its cheapest (a source town)
    stock[c.name][g.id]=Math.max(1,Math.round(b*(.6+rnd()*.8)));
  }}}
  return stock;
}
// ---- party & skills ----
function livingParty(){return S.party.filter(p=>p.alive)}
function livingComps(){return livingParty().length}
function someoneName(fb){ const lp=livingParty(); return lp.length?pick(lp).name:(fb||'someone'); }
function desertBonus(){ return S ? Math.min(0.4, 0.20*livingParty().filter(p=>p.desertwise).length) : 0; } // oasis-bred companions: +20% each to finding water
function guardCount(){return S.party.filter(p=>p.alive&&p.kind==='guard').length}
function skillMax(s){return livingParty().reduce((m,p)=>Math.max(m,p.skills[s]||0),0)}
function skillSum(s){return livingParty().reduce((m,p)=>m+(p.skills[s]||0),0)}
function bestAt(s){const a=livingParty().filter(p=>(p.skills[s]||0)>0); if(!a.length)return null; return a.reduce((b,p)=>(p.skills[s]>b.skills[s])?p:b);}
// ---- season / passes ----
function monthNum(){return ((Math.floor((S.day-1)/30)+2)%12)+1;} // game opens in the 3rd month
function passDanger(){ // 0 clear .. 1 deadly, by month
  const m=monthNum();
  return ({11:1,12:1,1:1,2:.7,10:.55,3:.3,9:.2}[m])||0;
}
function rangeName(){
  const n=nextCity(); if(!n) return 'the high passes';
  const c=city(); if(c){ const k=legPairKey(c.name,n.name); if(k==='Aleppo|Iconium') return 'the Taurus'; if(k==='Kashgar|Osh') return 'the Tian Shan and the high Pamirs'; }
  if((n.name==='Iconium'&&city().name==='Constantinople')||(n.name==='Constantinople'&&city().name==='Iconium')) return 'the Anatolian plateau';
  return {Osh:'the Pamirs — the Onion Mountains', Nishapur:'the Kopet Dag', Iconium:'the Taurus'}[n.name] || 'the high passes';
}
function passWord(){
  const d=passDanger(), m=monthNum();
  const improving = m>=2 && m<=5; // late winter into spring: the thaw
  if(d>=.9) return 'sealed by snow';
  if(d>=.5) return improving?'opening, but still treacherous':'treacherous';
  if(d>=.15) return improving?'opening soon':'closing soon';
  return 'open';
}
const PASS_LEGS={'Kashgar|Osh':1,'Aleppo|Iconium':1}; // legs that are really high passes regardless of city terrain
function legPairKey(a,b){ return [a,b].sort().join('|'); }
function legTerr(){ const n=nextCity(); if(!n) return 'settled'; const c=city(); if(c&&PASS_LEGS[legPairKey(c.name,n.name)]) return 'mountain'; return n.terr; }
function upcomingMountain(){ return legTerr()==='mountain'; }
// ---- trade skill ----
function tradeFactor(){ const t=tradeSkill(); return Math.min(.12, .022*t + .0025*Math.min(S.dealDays,28)*(t>0?1:.3)); }
function restock(cityName,days){
  const c=S.itin.find(x=>x.name===cityName)||{name:cityName,frac:.5};
  for(const g of GOODS){
    const base=(OVR[cityName]&&OVR[cityName][g.id]!=null)?OVR[cityName][g.id]:g.e+(g.w-g.e)*(c.frac||.5);
    const cheap=goodMin(g);
    const isSource= base<=cheap*1.3;
    const rate=(isSource?0.9:0.18)*days; // local produce replenishes faster
    const cap=Math.round(STOCKBASE[g.id]*(isSource?3:1.2));
    S.stock[cityName][g.id]=Math.min(cap, Math.round(S.stock[cityName][g.id]+rate));
  }
}
function waterMax(){return 25+herdCarry()}
const FOOD_WT=0.25; // each day of provisions weighs on the camels too
function cargoW(){return GOODS.reduce((a,g)=>a+S.goods[g.id]*g.wt,0)+Math.round(S.food*FOOD_WT)}
function footCap(){ return 5*(1+livingComps()); }
function cargoCap(){ return totalAnimals()>0 ? herdCap() : footCap(); }
function city(){return S.itin[S.idx]}
function nextCity(){return S.itin[S.idx+(S.dir||1)]} // the city we're heading toward (dir +1 onward, -1 back)
function fwdCity(){return S.itin[S.idx+1]}
function backCity(){return S.itin[S.idx-1]}
function otherForkCity(){
  // At Kashgar (confluence) offer the nearest city of the OTHER Taklamakan branch
  if(!S.routeChosen || city().name!=='Kashgar') return null;
  const tookNorth = S.route==='n';
  return tookNorth
    ? {name:'Yarkand', dist:400, terr:'desert', frac:.34, zh:'莎車', desc:'A green and pleasant oasis where caravans fatten back up and lie about the crossing.'}
    : {name:'Aksu',    dist:920, terr:'desert', frac:.36, zh:'阿克蘇', desc:"A trade town under the Tianshan, the 'Heavenly Mountains', which look down on your dusty caravan with what you suspect is judgement."};
}
function setOutToOtherFork(){
  const other=otherForkCity(); if(!other) return;
  const ki=S.idx; // currently at Kashgar
  // insert the other-fork city AFTER Kashgar; then travel forward (+1) into it.
  // Arriving there sets idx to ki+1; back from there is Kashgar at ki.
  if(S.itin[ki+1] && S.itin[ki+1].name===other.name){ setOut(1); return; } // already inserted
  S.itin.splice(ki+1, 0, {...other}); // Kashgar at ki; other at ki+1; old ki+1 (Osh) shifts to ki+2
  setOut(1); // travel forward from Kashgar into the detour city
}
function legDist(){ return (S.dir||1)>0 ? (S.itin[S.idx+1]?S.itin[S.idx+1].dist:0) : (S.itin[S.idx]?S.itin[S.idx].dist:0); } // length of the current leg, whichever way you walk it
function price(g,c){
  let p=(OVR[c.name]&&OVR[c.name][g.id]!=null)?OVR[c.name][g.id]:g.e+(g.w-g.e)*c.frac;
  if(g.id==='silk'&&S.silkBoost&&c.frac>.25)p*=1.25;
  p*=S.jit[c.name][g.id];
  return Math.max(1,Math.round(p));
}
function hpWord(){if(S&&S.seasick)return 'ailing';return S.hp>75?'hale':S.hp>50?'weary':S.hp>25?'ailing':'<span class="bad">failing</span>'}
function dateStr(){
  const i=Math.floor((S.day-1)/30)%12;
  if(isWest()) return 'Day '+S.day+' · '+MONTHS_WEST[i];
  return 'Day '+S.day+' · '+MONTHS[i]+' month';
}
function log(t){S.log.unshift({d:S.day,t}); if(S.log.length>40)S.log.pop();}

/* ============ TIME & TRAVEL ============ */
function applyDeprivation(cause,penalty){
  S.cause=cause;
  S.hp-=penalty;
  // under sustained deprivation the weakest of the party succumb first, one by one
  if(S.hp<58 && livingComps()>0 && rnd()<.22){
    const c=pick(livingParty());
    c.alive=false;
    log(c.name+(pdesc(c)===c.name?"":", "+pdesc(c))+", has died of "+cause+". You divide the load and the silence between you.");
  }
  if(S.hp<=0) die();
}
function foodNeed(){
  const mouths=1+livingComps();
  const cookMult=clamp(1-.06*skillMax('cook'),.72,1);
  return mouths*.5*cookMult;
}
function consumeDay(travelling, terrOverride){
  S.day++;
  S.food-=foodNeed();
  if(S.food<0){S.food=0; applyDeprivation('hunger',4);}
  const terr=terrOverride||(travelling?legTerr():'settled');
  if(travelling) applyAnimalPeril(terr);
  S.water-=WATER_USE[terr]*thirstFactor();
  if(travelling&&(terr==='desert'||terr==='harsh')&&S.water<8&&rnd()<(.25+desertBonus())){
    S.water+=10;log("A brackish well, half-buried — foul water, but water. The camels drink without comment.");
  }
  if(S.water<0){S.water=0; applyDeprivation('thirst',9);}
  if(travelling)S.hp+=PACES[S.pace].hp; else S.hp+=.5;
  S.hp=clamp(S.hp,0,100);
  if(S.hp<=0)die();
}
function passDays(n){for(let i=0;i<n&&!S.dead;i++)consumeDay(false);}
function daySpeed(){
  const terr=legTerr();
  let sp=70*SPEED_MOD[terr]*PACES[S.pace].sp; // ~20-25 mi/day on good ground, ~8-15 in the mountains
  sp*=speedMult(terr);                 // the caravan moves only as fast as its slowest-suited beast — count does not matter
  if(cargoW()>cargoCap()){sp*=.5;}     // overloaded
  if(totalAnimals()===0)sp*=.7;        // on foot, shouldering the loads yourselves
  if(S.hp<40)sp*=.8;
  return Math.round(sp);
}
function legEventChance(terr){return {settled:.16,steppe:.2,desert:.2,harsh:.24,mountain:.24}[terr];}
let journeyTimer=null;
const DAY_MS=1500; // one fixed, brisk day cadence
function clearJourney(){ if(journeyTimer){clearInterval(journeyTimer);journeyTimer=null;} }
function startJourney(){
  clearJourney();
  if(cargoW()>cargoCap())log("The caravan is overloaded — the camels make their feelings known. Pace suffers.");
  S.journeying=true; render();
  journeyTimer=setInterval(stepDay, DAY_MS);
}
function stepDay(){
  if(!S || !S.journeying || S.pendingEvent || S.screen!=='travel'){clearJourney();return;}
  if(S.food < foodNeed() && (S.foodGrace||0)<=S.day){ // provisions gone — stop and let the player deal with it
    S.journeying=false;clearJourney();S.pendingEvent=evStarving();render();return;
  }
  consumeDay(true);
  if(S.dead){S.journeying=false;clearJourney();S.screen='dead';render();return;}
  S.legKm+=daySpeed();
  if(S.legKm>=legDist()){S.journeying=false;clearJourney();arrive();render();return;}
  if(S.legKm>=legDist()*0.5 && checkFrontierLeg()) return;
  const terr=legTerr();
  // winter passes: extra danger on mountain legs out of season
  if(terr==='mountain' && passDanger()>0 && rnd()<passDanger()*.09){
    S.journeying=false;clearJourney();S.pendingEvent=evSnowedIn();render();return;
  }
  if(rnd()<legEventChance(terr)){
    const e=buildEvent(terr);
    if(e){S.pendingEvent=e;S.journeying=false;clearJourney();render();return;}
  }

}
function setPaceLive(k){ S.pace=k; const r=$('pacelive'); if(r)[...r.querySelectorAll('button')].forEach(b=>b.classList.toggle('on',b.dataset.k===k)); }
function makeCamp(){ S.journeying=false; clearJourney(); log("You make camp where you stand. The fire is small; the stars are not."); render(); }
function skipToStop(){ S.journeying=false; clearJourney(); pressOn(); }
function doHunt(terr, inTown){
  // returns a log message; caller handles the day passing and render
  const hunter=bestAt('hunt')||pick(livingParty())||{name:'You',skills:{hunt:0}};
  const skill=(hunter.skills&&hunter.skills.hunt)||0;
  const bigTown = inTown && ['Chang\'an','Lanzhou','Dunhuang','Kashgar','Samarkand','Bukhara','Merv','Rey','Baghdad','Aleppo','Constantinople'].includes(city().name);
  // hunting scares wild bactrians off the area for a month
  S.camelScare = S.day+30;
  // chance of FINDING game at all, by the bounty of the setting
  let find={steppe:.85,settled:.78,mountain:.62,desert:.42,harsh:.32}[terr]||.6;
  if(inTown) find*=0.35;     // the country round any town is hunted over
  if(bigTown) find=0.05;     // a great city: you cannot just walk out and find a deer
  find += skill*0.05;
  find -= (S.huntLuck||0);   // a recent run of luck means the ground is thinning out
  find = clamp(find, .05, .95);
  // danger to the hunter — worst in the mountains, and rising when the larder is desperate
  let dangerBase={mountain:.14,settled:.10,steppe:.09,desert:.06,harsh:.06}[terr]||.08;
  let danger=Math.max(.02, dangerBase - .03*skill + (S.huntRisk||0));
  // 1) the hazard roll first (desperation makes each failed hunt riskier than the last)
  if(rnd()<danger){
    const beast=terr==='mountain'?'a wolf-pack':(terr==='settled'||terr==='steppe')?(rnd()<.5?'a boar':'a bear'):(terr==='desert'||terr==='harsh')?'a desert leopard':'a cornered beast';
    const fatal = terr==='mountain'? .40 : .28;
    if(hunter.alive!==undefined && rnd()<fatal){
      hunter.alive=false; S.huntLuck=0; S.huntRisk=0;
      return hunter.name+(terr==='mountain'
        ? " went up after an ibex and did not come back — a slip on the ice, a long fall, no body to carry home."
        : " went out for game and met "+beast+". They did not come back.");
    }
    S.hp=clamp(S.hp-12,0,100); S.huntLuck=0; S.huntRisk=Math.min(.5,(S.huntRisk||0)+.10);
    if(S.hp<=0){S.cause='a wild beast';die();}
    return "The hunt turns bad — "+beast+" in the brush. "+hunter.name+" limps back bloodied and empty-handed.";
  }
  // 2) did the hunter find anything?
  if(rnd()>=find){
    S.huntLuck=0; S.huntRisk=Math.min(.5,(S.huntRisk||0)+.10); // empty-handed, and growing desperate
    return inTown
      ? "You range the picked-over country around "+city().name+" and turn up nothing worth a bowstring."
      : "Hours of tracking across "+(TERR_DESC[terr]||'the waste')+" yield nothing but old droppings and false hope — no meat today.";
  }
  // 3) success — how much, by the setting
  let band={steppe:[6,20],settled:[5,14],mountain:[4,14],desert:[2,8],harsh:[1,5]}[terr]||[4,12];
  if(inTown){ band=[Math.max(0,Math.round(band[0]*0.4)), Math.max(2,Math.round(band[1]*0.45))]; }
  if(bigTown){ band=[0,3]; }
  const lo=Math.max(0,band[0]+Math.round(skill*1.5)), hi=Math.max(lo+1,band[1]+skill*3);
  const got=lo+ri(hi-lo+1); S.food+=got;
  S.huntRisk=0; S.huntLuck=Math.min(.5,(S.huntLuck||0)+.10); // a kill thins the ground for next time
  if(got<=2) return "Slim pickings — the land here is all but hunted out. Just "+got+" day"+(got===1?'':'s')+" of meat.";
  return "The hunt yields "+got+" days of meat — "+
   (terr==='steppe'?'gazelle on the open grass.':terr==='mountain'?'an ibex off the high rocks.':terr==='desert'||terr==='harsh'?'a few hares and a lean fox.':'duck and small deer near the fields.')+
   (skill>=2?' '+hunter.name+' makes it look easy.':'');
}
function huntFood(){ // button on the camp screen and in cities
  if(S.dead)return;
  const inTown = S.screen==='city';
  const terr = inTown ? city().terr : (nextCity()?nextCity().terr:'settled');
  const msg=doHunt(terr, inTown);

  if(inTown && !S.dead){ S.dealDays+=1; restock(city().name,1); S.cityDay[city().name]=S.day; } // a day in town still ages the market
  if(!S.dead) log(msg);
  if(!S.dead) maybeHuntress(terr);
  render();

function buyFromLocals(per){
  let bought=0;
  while(S.silver>=per && cargoW()<cargoCap() && bought<45){ S.silver-=per; S.food+=1; bought++; }
  if(bought>0) log("You take on "+bought+" days of food at "+per+" s a day."+(per>=5?" Robbery, but you'll eat.":"")); 
  else log("You haven't the silver or the cargo-room for more food.");
}
function evStarving(){
  const terr=nextCity()?nextCity().terr:'settled';
  const ch=[{l:'Send out hunters (1 day)', f(){ const m=doHunt(terr,false); consumeDay(false,terr); if(!S.dead)log(m); }}];
  if(terr==='settled'||terr==='steppe'){
    const per=2+ri(3);

  } else if(rnd()<.6){

  }

}
function pressOn(){ // synchronous fast-forward to next event / arrival (the "skip" path)
  if(cargoW()>cargoCap())log("The caravan is overloaded — the camels make their feelings known. Pace suffers.");
  for(let i=0;i<80;i++){

    consumeDay(true);
    if(S.dead){render();return;}
    S.legKm+=daySpeed();
    if(S.legKm>=legDist()){arrive();render();return;}
    const terr=nextCity().terr;
    if(terr==='mountain'&&passDanger()>0&&rnd()<passDanger()*.09){S.pendingEvent=evSnowedIn();render();return;}
    if(rnd()<legEventChance(terr)){S.pendingEvent=buildEvent(terr); if(S.pendingEvent){render();return;}}
  }

function arrive(){
  const dir=S.dir||1;
  S.idx+=dir; S.legKm=0; S.dealDays=0; S.dir=1; S.priceLock={}; // arriving resets to 'forward' for the city menu; fresh prices for the new market
  S.water=waterMax();

  if(dir>0 && S.returning && c.name===homeName()){ S.screen='home'; return; }

function startReturn(){

  const fwd=S.itin, rev=[];

  for(let i=1;i<rev.length;i++) rev[i].dist=fwd[fwd.length-i].dist;

function chooseReturnRoute(r){

function setOut(dir){

function die(){

}

/* ============ EVENTS ============ */
function resumeAfterEvent(){
  S.pendingEvent=null;
  clearJourney();
  if(S.dead){S.screen='dead';render();return;}
  if(S.screen==='sailing' && S.sail){ S.sailing=true; render(); sailTimer=setInterval(stepSail, DAY_MS); return; }
  if(S.screen!=='travel'){render();return;} // arrived / ended during the event
  // still mid-leg: resume the march
  S.journeying=true; render(); journeyTimer=setInterval(stepDay, DAY_MS);

function loseRandomGoods(frac){
  const held=GOODS.filter(g=>S.goods[g.id]>0);
  if(!held.length)return 'nothing — your packs were already light';
  const g=pick(held);
  const n=Math.max(1,Math.round(S.goods[g.id]*frac));
  S.goods[g.id]-=n;
  return n+' '+g.u+(n>1?'s':'')+' of '+g.n.toLowerCase();
}
function casualty(kill){ // wound (false) or kill (true) a random living party member; returns name or null

function buildEvent(terr){

  }
  if(terr==='harsh'){add(2,evDryWell); add(2,evGraves); add(2,evLost);}
  if(terr==='steppe'){ let _fw=2; const _m=(S.goods&&S.goods.musk)||0, _w=(S.goods&&S.goods.wine)||0; if(_m>=10)_fw+=2; else if(_m>=1)_fw+=1; if(_w>=10)_fw+=2; else if(_w>=1)_fw+=1; add(_fw,evFeast); add(2,evSogdian); add(2,evFord); add(2+(tollActive()?1:0),evCaravanserai); add(2,evCamel); add(2,evWildHorses); add(2,evSnakebite);}
  if(terr==='mountain'){add(3,evSnow); add(2,evAltitude); add(2,evHotspring); add(1,evLost); add(2,evFord); add(1,evCamel); add(2,evWildHorses); add(2,evFall); add(2,evMarmots);}
  if(terr==='settled'){add(3,evInspect); add(3,evSogdian); add(2,evRebellion); add(2+(tollActive()?1:0),evCaravanserai); add(2,evCamel); add(2,evCholera);}
  if(terr==='settled' && S.goods){ const _t=S.goods.tea||0; if(_t>=10)add(2,evInspect); else if(_t>=1)add(1,evInspect); }
  add(3,evSick); add(2,evRoadDeal); add(2,evMonk);

  const banditBase={desert:2,harsh:2,steppe:3}[terr]||0;
  if(banditBase){ let bw=banditBase*(S.banditFreq||1); if(inContestedZone())bw*=1.6; add(Math.max(0,Math.round(bw)), evBandits); }

    const fn=pick(pool);

      if(fn===evLost && rnd()<.80) continue;          // knows the road
      if((fn===evFord||fn===evSnow) && rnd()<.50) continue; // forewarned of the worst hazards

  }

/* ============ TRADE & CITY ACTIONS ============ */
function addGoods(gid,qty,unitCost){
  const cur=S.goods[gid], total=cur+qty;
  S.basis[gid]= total>0 ? (cur*(S.basis[gid]||0)+qty*unitCost)/total : 0;
  if(S.basis[gid]>0) S.lastBasis[gid]=S.basis[gid];
  S.goods[gid]=total;
}
function buy(gid,n){
  const g=GOODS.find(x=>x.id===gid), c=city(), mp=price(g,c);
  const hg=haggler(gid), hb=hg?hg.b:0;
  if(!S.priceLock)S.priceLock={};
  const p = (S.priceLock[gid]!=null) ? Math.max(1,Math.round(S.priceLock[gid])) : Math.max(1,Math.round(mp*(1-tradeFactor()-hb)));
  const avail=S.stock[c.name][gid];
  let q=Math.min(n, Math.floor(S.silver/p), avail);   // you may buy past cargo capacity; you just cannot leave town overloaded
  if(q<=0){
    log(avail<=0?"The market here is out of "+g.n.toLowerCase()+".":"Not enough silver.");
    render();return;
  }
  if(S.priceLock[gid]==null) S.priceLock[gid]=p;   // only a completed deal settles the price for the visit
  S.silver-=q*p; addGoods(gid,q,p); S.stock[c.name][gid]-=q;
  log("Bought "+q+" "+g.u+(q>1?'s':'')+" of "+g.n.toLowerCase()+" at "+p+" s"+(p<mp?" (haggled from "+mp+")":(p>mp?" (the price you settled here)":""))+((hg&&p<mp)?" — "+hg.p.name+" knows this trade":"")+(cargoW()>cargoCap()?" — the packs are over capacity; arrange more carriers before you set out":"")+".");
  render();
}
function sell(gid,n){
  const g=GOODS.find(x=>x.id===gid), c=city(), mp=price(g,c);
  const q=Math.min(n,S.goods[gid]);
  if(q<=0){render();return;}
  // market saturation: normal lots sell fine; only a flood past local appetite is discounted
  const sat=Math.min(.5, Math.max(0, (q - STOCKBASE[gid]) / (STOCKBASE[gid]*6)));
  const hg=haggler(gid), hb=hg?hg.b:0;
  if(!S.priceLock)S.priceLock={};
  let base;
  if(S.priceLock[gid]!=null){ base=S.priceLock[gid]; }
  else { base=Math.round(mp*(1+tradeFactor()+hb)); S.priceLock[gid]=base; } // first deal of the visit fixes this good's price
  const p=Math.max(1,Math.round(base*(1-sat)));
  S.silver+=q*p; S.goods[gid]-=q;
  if(S.goods[gid]<=0)S.basis[gid]=0; // lastBasis is kept as a reference
  log("Sold "+q+" "+g.u+(q>1?'s':'')+" of "+g.n.toLowerCase()+" at "+p+" s"+(sat>=.08?" (the market here can only take so much)":(p>mp?" (talked up from "+mp+")":(base<mp?" (the price you settled here)":"")))+((hg&&base>mp)?" — "+hg.p.name+" knows this trade":"")+".");
  render();
}
function camelPrice(){ const c=city(); return CAMEL_PRICE[c.name] || ({settled:90,steppe:60,desert:62,harsh:60,mountain:74}[c.terr]) || 70; }
function buyCamel(){ const p=camelPrice(); if(S.silver>=p){S.silver-=p;S.camels++;S.water=waterMax();log("A new camel joins the string at "+p+" silver, its skins filled at the city wells. The others bully it immediately.");}else log("Camels cost "+p+" silver here. The dealer is unmoved by your circumstances."); render(); }
function sellCamel(){ if(S.camels<=1){log("Your last camel is not for sale, unless you intend to carry the silk yourself.");render();return;}
  const p=Math.round(camelPrice()*.85); S.camels--; S.silver+=p; S.water=Math.min(S.water,waterMax());
  log("You sell a camel for "+p+" silver. It leaves without looking back, which is more than you'd do."); render(); }
function hireGuard(){ if(S.silver>=40){S.silver-=40; const used=S.party.filter(p=>p.kind==='guard').length; S.party.push({name:GUARD_NAMES[used%GUARD_NAMES.length],role:'a hired guard',kind:'guard',alive:true,skills:{...pick(GUARD_SKILLS)}}); log("You hire "+S.party[S.party.length-1].name+", a guard with reassuring scars.");}else log("Guards cost 40 silver up front."); render(); }

function waitDays(n){ // pass days in a city; stop early if provisions run out so no one starves unseen

    log(monthPassLog(d));}

function cityEvent(){
  const pool=[];
  const add=(w,f)=>{for(let i=0;i<w;i++)pool.push(f)};
  const nephew=livingParty().find(p=>p.nephew);
  if(nephew && cooled('neph',40)) add(3,()=>evNephew(nephew));
  if(guardCount()>0 && cooled('brawl',35)) add(2,evBrawl);
  if(cooled('cutpurse',45)) add(2,evCutpurse);
  if(cooled('feastcity',30)) add(2,evCityFeast);
  if(cooled('recruit',50)) add(2,evRecruit);
  if(cooled('quiet',10)) add(5,evQuietMonth);
  if(cooled('pest',60)) add(2,evPestilence);
  if(!pool.length) return null;
  for(let i=0;i<6;i++){const e=pick(pool)(); if(e)return e;}
  return null;
}

function tavern(){ if(!S||S.dead)return; passDays(1); if(S.dead){S.screen='dead';render();return;} restock(city().name,1); S.cityDay[city().name]=S.day; S.pendingEvent=tavernEvent(); render(); }
function jettison(){
  let dumped=[];
  while(cargoW()>cargoCap()){
    let worst=null,wv=Infinity;
    for(const g of GOODS){ if(S.goods[g.id]>0){ const v=price(g,nextCity()||city())/g.wt; if(v<wv){wv=v;worst=g;} } }
    if(!worst)break;
    const n=Math.min(S.goods[worst.id],Math.ceil((cargoW()-cargoCap())/worst.wt));
    S.goods[worst.id]-=n; dumped.push(n+' '+worst.n.toLowerCase());
  }
  log("You lighten the loads: "+(dumped.length?dumped.join(', ')+' left':'nothing left')+" for the desert and whoever comes after.");
  render();
}

/* ============ END STATES ============ */
function satPrice(g,c,q){ const sat=Math.min(.5, Math.max(0,(q-STOCKBASE[g.id])/(STOCKBASE[g.id]*6))); return Math.round(price(g,c)*(1-sat)); }
function finalGoodsValue(){
  const c=S.itin[S.idx]||S.itin[S.itin.length-1];
  return GOODS.reduce((a,g)=>a+S.goods[g.id]*satPrice(g,c,S.goods[g.id]),0);
}
function sellAllFinal(){
  S.silver+=finalGoodsValue();
  for(const g of GOODS)S.goods[g.id]=0;
  S.onceFlags.soldOut=true;
  render();
}
function deathFlavor(){
  const far = S.returning && S.reachedCpl;
  const home=[
   "You had touched the far end of the world and turned for home — and the road, patient as ever, took the rest of its toll before you reached the gate.",
   "Two empires crossed and the proof of it on your beasts, and still the long way back undid you.",
   "So far out, and so nearly back: the homeward road is no gentler than the outward one, and it kept you."];
  const out=[
   "You did not arrive. Most don't; the road is at least honest about that.",
   "Another name the desert wind cannot be troubled to remember.",
   "The caravan goes on without you — lighter, quieter, and a little more afraid.",
   "Somewhere a ledger closes on a venture that never came in.",
   "The road raises no monument but the next traveller's caution."];
  return pick(far?home:out);
}
function rank(v){
  if(v<900)return ['Footsore Peddler','You arrived. Historians will not mention it, but you arrived.'];
  if(v<2500)return ['Respectable Merchant','A solid venture. The ledger closes with quiet satisfaction.'];
  if(v<6000)return ['Caravan Master','Sogdians nod when you pass. There is no higher review.'];
  if(v<12000)return ['Magnate of the Two Empires','Songs will be sung — mostly by people hoping you will buy them a drink. You will. You can afford it.'];
  if(v<40000)return ['Khan of the Caravans','They will name a stretch of road after you, and overcharge travellers to walk it.'];
  return ['Legend of the Silk Road','Your name outlives the route itself. Children three empires apart are told you were probably exaggerated.'];
}
function pickRumor(){
  if(rnd()<.45 && nextCity()){
    const c=nextCity();
    let dear=null,cheap=null,dv=-1,cv=1e9;
    for(const g of GOODS){ const p=price(g,c), mid=(g.e+g.w)/2, rel=p/mid;
      if(rel>dv){dv=rel;dear=g;} if(rel<cv){cv=rel;cheap=g;} }
    if(rnd()<.5 && dear) return "They say "+dear.n.toLowerCase()+" fetches a fine price in "+c.name+" just now.";
    if(cheap) return c.name+" is the place to buy "+cheap.n.toLowerCase()+" cheap, if you've the camels for it.";
  }
  const here=city()?city().frac:0;
  const pool=RUMORS.filter(r=> !(here>.6 && /rebellion|silk grows scarce|Yangzhou|Talas|Onion/i.test(r)) );
  return pick(pool.length?pool:RUMORS);
}
// ---- persistent leaderboard ----
let LEADERBOARD=null;
const STORE = (typeof window!=='undefined' && window.storage && window.storage.get)
  ? window.storage
  : { get:(k)=>{ try{ const v=localStorage.getItem(k); return Promise.resolve(v!=null?{value:v}:null); }catch(e){ return Promise.resolve(null);} },
      set:(k,v)=>{ try{ localStorage.setItem(k,v); return Promise.resolve(true);}catch(e){ return Promise.reject(e);} } };
async function loadBoard(){
  if(LEADERBOARD)return LEADERBOARD;
  try{ const r=await STORE.get('silkroad_scores'); LEADERBOARD=r&&r.value?JSON.parse(r.value):[]; }
  catch(e){ LEADERBOARD=[]; }
  return LEADERBOARD;
}
async function saveScore(entry){
  try{
    const board=await loadBoard();
    const i=board.findIndex(e=>e.runId && e.runId===entry.runId);
    if(i>=0) board[i]=entry; else board.push(entry); // a finished round trip updates that run's line
    board.sort((a,b)=>b.score-a.score);
    LEADERBOARD=board.slice(0,12);
    await STORE.set('silkroad_scores', JSON.stringify(LEADERBOARD));
  }catch(e){ if(LEADERBOARD){const i=LEADERBOARD.findIndex(e=>e.runId&&e.runId===entry.runId); if(i>=0)LEADERBOARD[i]=entry; else LEADERBOARD.push(entry); LEADERBOARD.sort((a,b)=>b.score-a.score);LEADERBOARD=LEADERBOARD.slice(0,12);} }
  if($('board')) renderBoardInto($('board'));
}
function recordRun(outcome){
  if(!S.runId) S.runId = 'r'+Date.now()+Math.floor(rnd()*1000);
  const c=S.itin[S.idx]||S.itin[S.itin.length-1];
  const worth=Math.round(S.silver + GOODS.reduce((a,g)=>a+S.goods[g.id]*price(g,c),0));
  saveScore({runId:S.runId, name:S.name, score:worth, days:S.day-1, outcome, route:S.route?(S.route==='n'?'N':'S'):'-', when:Date.now()});
}
function renderBoardInto(el){
  const b=LEADERBOARD||[];
  if(!b.length){ el.innerHTML='<p class="sub">No ventures recorded yet. Be the first name in the ledger.</p>'; return; }
  el.innerHTML='<table><tr><th>#</th><th>Merchant</th><th style="text-align:right">Estate</th><th style="text-align:right">Days</th><th>Fate</th></tr>'+
    b.map((e,i)=>'<tr><td>'+(i+1)+'</td><td>'+e.name+'</td><td class="num gold">'+e.score+'</td><td class="num">'+(e.days||'—')+'</td><td class="sub">'+e.outcome+'</td></tr>').join('')+'</table>';
}

const FRONTIER_LEGS={'Aleppo|Iconium':'Iconium','Osh|Samarkand':'Samarkand','Kashgar|Osh':'Osh'};
function checkFrontierLeg(){
  const n=nextCity(); if(!n||!city()) return false;
  const fname=FRONTIER_LEGS[legPairKey(city().name,n.name)]; if(!fname) return false;
  const F=FRONTIERS[fname]; if(!F) return false;
  const goingWest = n.frac > city().frac;             // toward Constantinople = westward
  const key='fr_'+fname+'_'+(goingWest?'w':'e')+'_'+(S.laps||0);
  if(S.onceFlags[key]) return false;
  let spec = goingWest ? F.w : F.e;
  if(!goingWest && F.e1 && !S.onceFlags['everFr_'+fname]) spec=F.e1;  // first-time discovery vs returning voice
  if(!spec) return false;
  S.onceFlags[key]=true; S.onceFlags['everFr_'+fname]=true;
  S.journeying=false; clearJourney(); S.pendingEvent=frontierEvent(spec); render();
  return true;
}
function maybeFrontier(name){
  if(name==='Iconium'||name==='Samarkand'||name==='Osh') return; // these fire mid-leg now (see checkFrontierLeg)
  const F=FRONTIERS[name]; if(!F) return;
  const westward=(S.returning===isWest()); // true => crossing toward Constantinople
  const key='fr_'+name+'_'+(westward?'w':'e')+'_'+(S.laps||0);
  if(S.onceFlags[key]) return;
  const spec=(westward?F.w:F.e); if(!spec) return;
  S.onceFlags[key]=true;
  S.pendingEvent=frontierEvent(spec);
}
function frontierEvent(spec){
  const fee=Math.max(8, Math.round(S.silver*.04));
  return {h:spec.h, t:spec.t, ch:[
    {l:'Pay the customs toll ('+fee+' s)',f(){ if(S.silver>=fee){ S.silver-=fee; S.tollRoads=S.day+30; log("Coin changes hands and the barrier lifts. "+(spec.paid||"")+" Your stamped receipt, they note, is worth showing at the staging-posts down the road."); } else { S.silver=0; passDays(1+ri(2)); log("You come up short, and they know it. They take what little you have and hold you a day or two before the barrier grudgingly lifts."); } }},
    {l:'Present your papers and stand on them',f(){ if(rnd()<.5){ passDays(2); log("Two days of inspection and bureaucratic theatre. "+(spec.papers||"")); } else { log("The officer reads, grunts, and waves you on unbled. "+(spec.papers||"")); } }},
  ]};
}

function topSkill(sk){ const names={trade:'a sharp trader',cook:'a fine cook and healer',handle:'a gifted camel-hand',hunt:'a hunter of note',fight:'a fighter'}; let best='a steady pair of hands',bv=0; for(const k in sk){ if(sk[k]>bv){bv=sk[k];best=names[k]||best;} } return best; }
function rollRecruit(name){
  let pool = name==='Constantinople' ? CPL_ROSTER : (CITYFOLK[name]?[CITYFOLK[name]]:[]);
  if(S.lucky && name===homeName() && !S.party.some(p=>p.nephew&&p.alive)) pool=pool.concat([NEPHEW_RECRUIT]);
  pool = pool.filter(c=>!S.party.some(p=>p.name===c.name && p.alive));
  if(!pool.length) return null;
  const cand = pick(pool);
  const comps = livingParty().filter(p=>p.kind!=='guard').length;
  const odds = comps>=4?0.10:comps===3?0.33:comps===2?0.50:comps===1?0.65:0.90;
  return rnd()<odds ? cand : null;
}
function tavernEvent(){
  const c=city();
  let cup="";
  if(S.silver>=3){ S.silver-=3; cup="You buy a round and settle in by the fire. "; }
  else { cup="You cannot afford even a cup, so you nurse the tavern-keeper's pity and listen. "; }
  const tav=(CITYFOLK[c.name]&&CITYFOLK[c.name].tav)?CITYFOLK[c.name].tav:'low-roofed and smoky, full of caravan-men and their lies';
  const flavour=pick(["Dice rattle in the corner.","Someone is singing, badly, in a language no one admits to knowing.","A communal pot of something goes round, and is not refused.","Two traders argue over a price that concerns neither of them."]);
  const scene=cup+"The tavern in "+cityLabel(c)+" is "+tav+". "+flavour;
  const rumor=pickRumor();
  if(c.name==='Osh' && !S.onceFlags.osh_egg && rnd()<0.5){ S.onceFlags.osh_egg=true; return oshBeekeeperEvent(scene); }
  let recruit;
  if(S.lucky && c.name===homeName() && !S.onceFlags.nephewMet && !S.party.some(p=>p.nephew&&p.alive)){
    recruit=NEPHEW_RECRUIT; S.onceFlags.nephewMet=true;

 'Wuwei':"Liangzhou, the men here call it — first and proudest of the Hexi garrisons, strung along the corridor between the snows of the Qilian range to the south and the Gobi's edge to the north. It is horse country, and the smell of it is horse: cavalry mounts, remounts, and the dung-fires of the camps. The walls are square and serious, the market quick, the soldiers quicker.</p><p>Caravans rest here and breathe out, for the worst of the Gobi still waits ahead. In the taverns Kuchean lutes compete with the bawling of drovers, and everyone has heard a story about the desert that they are willing to sell you, cheap.",
 'Dunhuang':"The last lamp of the empire. Dunhuang sits in a green crescent of oasis where the corridor finally gives out against the dunes, the great singing-sand mountain rising gold to the south with a crescent lake cupped impossibly at its foot. West of here is the Jade Gate and the Gate of Yang, and past them the Taklamakan, which the wise go around and the foolish go into.</p><p>But it is the caves that stop your breath. In the cliffs of Mingsha, monks and merchants have for four centuries been hollowing out chapels and filling them with paradise — a thousand grottoes blazing with painted Buddhas, flying apsaras, and the donor-portraits of frightened men buying merit before the desert. Pilgrims pray here for water; you would do well to join them, and to fill every skin besides.",
 'Hami':"Hami is an island of green in a sea of black gravel, and after the Gashun Gobi you could weep at the sight of it. The melons are famous to the point of legend — so sweet that the Tang court demands them as tribute, packed in ice and snow and run east by relay. The town itself is modest: a walled oasis, vineyards, irrigation ditches, and the universal desert architecture of flat-roofed mud-brick that has not changed and will not change.</p><p>Out in the waste to the south lies dead Loulan and the bones of older roads — cities the desert ate when the rivers wandered. The locals do not go there. Neither, if you are sensible, will you.",
 'Turfan':"You descend into the Turfan depression as into an oven; the land sinks below the level of the distant sea, and the summer air shimmers like something solid. This is Gaochang, a city of rammed earth the colour of the ground it stands on, ringed by the most ingenious farms on the Road. Lacking rivers, the people tap the mountain snowmelt through karez — underground channels, mile upon mile of them, dug and maintained by hand so the precious water does not boil away before it reaches the vines.</p><p>And vines there are: Turfan grows its own grapes and presses its own wine, which is why the western vintages you may be hauling will find no buyers here. To the north the Flaming Mountains burn red and bare at noon, looking exactly as hellish as their name.",
 'Kucha':"Kucha is the city of musicians, and it sounds like it — the Kuchean lute and the Kuchean dancing-girl are the height of fashion two thousand li away in Chang'an, and here they are merely the racket at every second door. It is a rich Buddhist kingdom of the northern rim, its wealth built on the oasis fields and the caravans, its faith carved into the cave-temples of Kizil out in the cliffs, where the painters favour a cool blue-grey palette unlike anything to the east.</p><p>The town stands on its river under the snow-wall of the Tianshan, green and confident. Monks in red robes share the streets with horse-traders and Sogdian factors, and the whole place has the slightly smug air of a city that has been comfortable for a very long time.",
 'Aksu':"Aksu — the 'white water', for the pale glacial river that comes down off the Tianshan and gives the oasis its life. It is a trade town more than a great city, a cluster of mud-brick and poplar-shade under the enormous indifference of the Heavenly Mountains, which stand white and judgemental along the whole northern sky. Caravans stop to trade, to re-shoe camels, and to lie about the road behind them.</p><p>The mountains here are the point. They are a wall against the steppe to the north and a source of the water without which none of this would exist, and on a clear morning their snowfields seem close enough to touch and cold enough to kill, which from time to time they are.",
 'Kashgar':"Kashgar is where the world reconnects. The two roads around the Taklamakan — the northern by Kucha, the southern by Khotan — come back together here at the foot of the Pamirs, and every caravan that has survived either one arrives wanting to compare casualties. It is the great western mart of the Tarim: a sprawl of bazaars, mosques-to-come and Buddhist shrines, mud-brick lanes, and orchards fed by the Kashgar river.</p><p>Pepper comes up over the passes from India and is nearly cheap here; jade goes out, and silk, and slaves, and news. Beyond the town the Pamirs rise like a closed door — the Roof of the World — and somewhere up in that maze, the old itineraries say, stood the Stone Tower where the merchants of the east once handed their silk to the merchants of the west. Men still argue where it was.",
 'Miran':"Miran is a fortress and a memory by the salt-crusted ghost of Lop Nor, where a lake used to be and the wind now organises the dust. The Tang hold it as a waystation on the harsh southern road; its frescoes are older than that — winged figures with great dark eyes, painted by some long-gone hand schooled half a world to the west, in a style that has no business being here and is.</p><p>There is little comfort in Miran and less water than the maps promise. It is a place to fill the skins, distrust the wells, and move on before the salt and the silence get into your thinking.",
 'Khotan':"Khotan is the kingdom of jade and the jewel of the southern road, an ancient Buddhist realm strung along its oasis where two rivers — the White Jade and the Black Jade — come down out of the Kunlun carrying the precious stone as common gravel. Men wade the shallows in the cold months with their eyes on the riverbed, and the kings of Khotan have grown fat on what they find. The town is green and devout, ringed by mulberry and the hum of the silk that (the legend says) a smuggling princess first brought here in her hair.</p><p>To the south the Kunlun range holds up the sky, grey and immense; to the north the desert waits. Buy jade here while it is cheap — in the west they will pay through the nose, and in Chang'an they paid more still, but you are going the wrong way for that, and a margin is a margin.",
 'Yarkand':"Yarkand is a fat, green, pleasant oasis where the southern caravans rest and recover their nerve before or after the long desert. Its river rolls down from the Pamirs and Karakoram, its fields are broad and well-watered, its bazaar cheerful. After Miran and the salt-waste, it feels like a kind of mercy.</p><p>This is a place to fatten the camels, mend the harness, lay in food and water, and listen to other men lie about the crossing they have just survived or are about to attempt. Everyone in Yarkand, you will notice, is an expert on the desert, and none of them is currently in it.",
 'Osh':"Osh sits at the mouth of the Ferghana valley, green and welcome after the Onion Mountains, and over it looms the thing you will remember: a great craggy five-ridged limestone mountain rising straight out of the flat town like a beached whale of rock. Men have held it sacred since before anyone can say — they climb it to pray, and will go on doing so for a thousand years and more. (Later ages will call it the Throne of Solomon; to the caravans it is simply the holy rock that means you have come down safe out of the passes.) The old Roman geographers wrote of a 'Stone Tower' somewhere in these mountains where the silk changed hands between the merchants of the two worlds; scholars will argue forever exactly which crag they meant, but a traveller standing under Osh's strange stone hill can be forgiven for thinking it as likely a candidate as any.</p><p>Below the rock spreads Ferghana itself — the valley of the famous 'heavenly horses' that sweat blood, for which a Han emperor once sent armies. Your camels regard the legend without enthusiasm. The bazaar is a crossroads of Turk, Sogdian, and Chinese goods, and the air, after the heights, tastes absurdly of orchards. Up on the surrounding slopes the round felt yurts of the Turkic herders dot the high pastures, their flocks scattered among the wildflowers — and among the burrows of the fat marmots the hill-folk hunt warily, for they say a fever lives in the little beasts' fleas.",
 'Samarkand':"Samarkand is the queen of the Sogdian cities and looks it — set on the green terraces above the Zarafshan, the 'gold-strewing' river, ringed by orchards and gardens and a long circuit of walls, fed by lead-lined aqueducts that bring water clear across the ravines. The citadel and the merchant town hum with a confidence built on centuries of being the indispensable middlemen of Asia; Sogdian is the language of trade from here to China, and Samarkand's sons are scattered along every li of the Road keeping the family accounts.</p><p>Lately the city has learned a new trick. Craftsmen — the story says prisoners taken at the Talas river a decade ago — have set up the making of paper here, fine smooth paper to rival anything from the east. It is wonderful for Samarkand and ruinous for anyone still hauling reams of the stuff west, as you may be about to discover.",
 'Bukhara':"Bukhara rises from the flat green of its oasis at the desert's edge, a city of scholars, silver, and water — domes and minarets-to-come, bath-houses, and a web of channels and pools that bring the precious river through every quarter (and, the locals admit, breed a fever in summer that they would rather you did not ask about). The citadel, the Ark, broods over a town already old and already learned. This is a place that argues theology in the morning and prices in the afternoon, and takes both seriously.</p><p>Lapis lazuli arrives here by the sackful, carried down out of the Badakhshan mountains far to the south-east — the only source worth the name in all the world — and leaves again by the caravan-load. In Constantinople they will grind that blue stone into the robes of painted saints. Here it is merely stock.",
 'Merv':"Merv is the great oasis of the Karakum, a 'queen of the world' ringed by walls and canals where the sand gives way with shocking suddenness to melon-fields and gardens. Everything passes through Merv eventually — the roads from China, India, Persia, and the steppe all knot together here — and the city has grown rich and many-walled on the toll of simply being unavoidable. Its hospitals and its scholars are famous; a sick traveller has worse places to fall ill.</p><p>The mulberry-shade and the running water are a paradise after the desert, but do not be deceived: the Karakum laps right up to the gardens, and a half-day in the wrong direction is all sand and wind again. Drink, rest, and lay in water. Merv is an island, and the sea around it is thirsty.",
 'Nishapur':"Nishapur stands on the skirts of the Binalud mountains, a handsome Khurasani city of mud-brick and walled gardens, growing fast and grand. In the hills above, the mines give up turquoise — the 'Nishapur blue', the finest in the world — and in the taverns below, the poets give up verse, both in quantities of variable quality. It is a place of trade and argument and a particular dry mountain light.</p><p>This is deep in Khurasan, the eastern heart of the Abbasid world and the country from which the black banners of the revolution lately marched on Baghdad. The talk is of governors and tax-farmers and the price of mules, and underneath it the old Persian bones of the place show through everywhere you look.",
 'Rey':"Rey is one of the oldest cities of Persia, sprawling below the snow-topped wall of the Alborz where the mountains meet the northern desert. It is a hinge of roads — the great Khurasan highway passes through, east to west — and its bazaar is a roaring confusion of Persians, Arabs, Daylamites from the mountains, and Turks from the steppe, every one of them haggling in his own language at the top of his voice. Gardens and qanat-fed orchards soften the edges; the citadel watches the plain.</p><p>It is a city that has been important for so long it has stopped being surprised by anything, including you. Buy, sell, water the camels, and try not to be cheated in four languages at once.",
 'Baghdad':"You have arrived at a miracle in mid-construction. The Caliph al-Mansur's Round City — Madinat al-Salam, the City of Peace — is barely begun, raised these last few years on the west bank of the Tigris: a perfect circle of double mud-brick walls, four gates at the quarters, and the green-domed palace and the great mosque at the dead centre, the whole thing still half scaffolding and swarming with the labour of the world. Around it a sprawl of markets, wharves, and pontoon-bridges is already outgrowing the plan.</p><p>Down on the river, ships from Basra and the Gulf unload coral and pearls and the goods of India and beyond; the canals run thick with traffic. The locals will tell you, with maddening certainty, that this raw brick circle will become the centre of the world. Locals everywhere say that. Here, standing in the dust and the hammering, you find you almost believe them.",
 'Aleppo':"Aleppo is caravans, citadel, and the smell of cumin. Its great tell — the mound that will one day carry a famous fortress — already lifts its bulk over a warren of markets where the goods of Syria, the desert, and the sea change hands under awnings. This is the last great Mediterranean bazaar before the road turns inland; behind the haggling you can almost taste the salt of a sea you have not seen in a year, and the Roman frontier is close enough that prices begin to be quoted, hopefully, in Greek.</p><p>From here a wise merchant has a choice the desert never offered him: he can keep to the camels and climb the long road over the Taurus into Anatolia — or sell the beasts, carry his cargo down to the coast, and let a ship do the work that a thousand li of mountain would otherwise demand.",
 'Iconium':"Up on the high Anatolian plateau the air thins and the world turns Roman and cold. Iconium — the Romans say Ikonion, though you hear some locals already fondly clipping it to ‘Konya’ — is a walled provincial town on a bare, treeless tableland, ringed by its own irrigated gardens like a green coin dropped on brown felt, with the Taurus a white rumour to the south. The churches are domed and the icons are everywhere; the garrison is watchful, for this is a land that has learned to expect raiders out of the east every summer.</p><p>It is a frontier town in spirit even this far inside the Empire — sober, fortified, suspicious, and very far from the golden City it answers to. The plateau wind never quite stops, and the wine is as sharp as the people.",
 'Constantinople':"You make your camp at Chalcedon, on the Asian shore, where the long road from the east finally runs out of land — and across a mile of fast grey water stands the City itself, the Queen of Cities, Constantinople. Even at this distance it stops the breath: the sea-walls and the land-walls marching over the hills, the domes, and above them all the vast shallow golden dome of the Great Church, Hagia Sophia, seeming to float without support. Ships beyond counting work the Bosphorus between you and it; the Golden Horn is a forest of masts.</p><p>The Romans are wary of caravans and careful of who they let through the gates, so the trade is done here on the near shore, brokers rowing across to dicker in Greek over your silk and jade and musk and lapis. You came two empires and a year and more to stand on this beach and look at that skyline. Whatever else the road took from you, it brought you here."
};

/* ---- sea passage Aleppo <-> Constantinople ---- */
function seaOffer(){ S.pendingEvent=seaEvent(); render(); }
function seaTerms(){ const m=monthNum(); const stormy=(m>=11||m<=2); return {stormy, wreck: stormy?0.30:0.08}; }
function seaEvent(){
  const c=city();
  const target = c.name==='Aleppo' ? 'Constantinople' : 'Aleppo';
  const sale=herdValue(c);
  const fare=Math.round(30+0.45*cargoW());
  const t=seaTerms();
  const portFrom=(c.name==='Aleppo')?'the Syrian coast at Saint Symeon, below Antioch':'the wharves of the Golden Horn';
  const warn=t.stormy
    ?" But the season is against you: it is winter, the sea is half-closed, and the few captains who will sail at all want danger-money. Wreck is a real risk."
    :" The sailing season is open and the captain is confident of a quick passage.";
  return {h:'PASSAGE BY SEA',
   t:"At "+cityLabel(c)+" you can sell the herd, carry the cargo down to "+portFrom+", and take ship for "+target+". By sea is far faster than the long road over the passes, and cheaper once the beasts are sold — but the sea keeps its own ledger, and you will have to buy animals afresh at the other end."+warn+" The captain provides water as part of the passage; you must feed yourselves. (Your animals would fetch about "+sale+" s; passage and porterage, about "+fare+" s.)",
   ch:[
    {l:'Sell the herd and take ship ('+fare+' s)',f(){
      S.silver+=sale; clearHerd(); S.silver=Math.max(0,S.silver-fare);
      const days=7+ri(7);
      S.sail={target, daysLeft:days, total:days, winter:t.stormy};
      S.screen='sailing';
    }},
    {l:'Keep to the overland road',f(){ log("You keep the beasts and the caravan, and trust the road over the water."); }},
   ]};
}

/* ============ v0.8.1 ADDITIONS ============ */
function showParty(){
  if(!S || S.pendingEvent) return;
  let rows='<p style="margin:2px 0"><b>'+S.name+'</b> <span class="sub">— the merchant (you)'+((S.selfTrade||0)>0?', a self-taught trader (trade '+S.selfTrade+')':'')+'</span></p>';
  rows+=S.party.map(p=>{
    const names={trade:'trade',cook:'cook/heal',handle:'animals',hunt:'hunt',fight:'fight'};
    const sk=Object.keys(p.skills).filter(k=>p.skills[k]>0).map(k=>names[k]+' '+p.skills[k]).join(', ')||'no special skills';
    const tag=p.kind==='guard'?' <span class="sub">(hired guard)</span>':(p.nephew?' <span class="sub">(your nephew)</span>':(p.recruited?' <span class="sub">(joined on the road)</span>':''));
    const status=p.married?' <span class="gold">— settled &amp; married in '+(p.marriedAt||'a town')+'</span>':(p.alive?'':' <span class="red">— dead</span>');
    return '<p style="margin:5px 0"><b>'+p.name+'</b>'+tag+status+'<br><span class="sub">'+p.role+' · '+sk+'</span></p>';
  }).join('');
  rows+='<p class="sub" style="margin-top:10px">Your <b>fighting strength</b> counts every able body — yourself and each living companion as one apiece — plus their training with a blade (a hired guard with fight&nbsp;3 adds three more). Right now that total is <b class="gold">'+combatStrength()+'</b>. When bandits appear they weigh their numbers against that figure.</p>';
  S.pendingEvent={h:'THE COMPANY', t:rows, ch:[{l:'Close',f(){}}]};
  render();
}

/* ---- wait-a-month flavour & climate ---- */
function seasonNote(){
  const m=monthNum(); const c=city();
  const cold=(m===11||m===12||m===1||m===2);
  if(cold && (c.name==='Constantinople'||c.name==='Iconium')){
    return " Deep in the Roman midwinter the Christians keep their greatest feast — the birth of their God. The churches blaze with candle and lamp, the markets shut for it, and even the customs-men turn briefly, suspiciously, kind. You set it down in your journal: a festival of lights and roast goose at the dead of winter, not so unlike the New Year at home, though reckoned by another heaven.";
  }
  if(cold){
    const snowy = c.terr==='mountain'||c.terr==='steppe'||['Iconium','Nishapur','Osh','Rey','Kashgar','Wuwei','Lanzhou','Samarkand','Bukhara'].includes(c.name);
    if(snowy) return " Snow lies on the roofs and deep on the passes beyond; you keep close to the brazier and pity the caravans still out on the road.";
    return " The cold reaches even here; the nights run long and the wine is taken mulled.";
  }
  if(m>=3 && m<=4) return " Spring stirs the dust and the trade alike, and the road shakes off its winter stiffness.";
  if(m>=5 && m<=6) return " The heat is building; the bazaars wake before dawn and sleep away the white noon.";
  if(m>=7 && m<=8) return " High summer bakes the brick, the melons are in, and the flies with them.";
  return " The year tips toward autumn, and the caravans thicken with the season’s last ventures.";
}
function monthPassLog(d){
  if(d<30) return "You break off the wait after "+d+" day"+(d===1?'':'s')+".";
  const here=city().name;
  const flav=pick([
    "A month in "+here+". You walk the bazaars until the traders know your face and your terms.",
    "A month in "+here+", spent mending harness, fattening the camels, and listening to everyone.",
    "A month slips by in "+here+" — letters written, debts called in, the strongbox counted twice.",
    "A slow month in "+here+": the markets turn over, and you turn over the markets."
  ]);
  const trade = skillMax('trade')>0?" Your trader learns where the bargains sleep.":" You learn the streets and the shortcuts.";
  const pass = upcomingMountain()?(" "+rangeName()+" lies "+passWord()+"."):"";
  return flav+trade+seasonNote()+pass;
}
function evQuietMonth(){
  markEv('quiet');
  const msg=pick([
    "The days pass without incident — a rarity on this road, and worth a line in the ledger.",
    "A peaceful stretch. You make a few good contacts and one indifferent friend.",
    "Nothing of note befalls you, unless you count "+(livingParty().length?pick(livingParty()).name+"’s":"your")+" slow-burning feud with a particular market cat.",
    "Quiet days: good food, fair weather, and the rare luxury of being bored."
  ]);
  return {h:'AN UNEVENTFUL SPELL', t:msg, ch:[{l:'Carry on',f(){ S.hp=clamp(S.hp+2,0,100); }}]};
}

/* ---- save & resume ---- */
function migrate(s){
  if(!s) return s;
  if(s.banditMod==null) s.banditMod=0;
  if(s.banditFreq==null) s.banditFreq=1;
  if(s.merit==null){ s.merit=0; s.meritPct=0; }
  if(!s.cityDay) s.cityDay={};
  if(s.huntLuck==null) s.huntLuck=0;
  if(s.huntRisk==null) s.huntRisk=0;
  if(s.camelScare==null) s.camelScare=0;
  if(!s.onceFlags) s.onceFlags={};
  if(!s.herd){ s.herd={donkey:0,mule:0,horse:0,bactrian:(s.camels||3),dromedary:0,hybrid:0}; }
  if(s.startSilver==null) s.startSilver=900;
  if(!s.priceLock) s.priceLock={};
  if(!s.seen) s.seen={};
  if(s.lucky==null) s.lucky=false;
  if(s.selfTrade==null) s.selfTrade=0;
  if(!s.log) s.log=[];
  return s;
}
async function saveAndQuit(){
  if(!S) return;
  S.pendingEvent=null; S.eventOutcome=null; S.journeying=false; clearJourney();
  if(!S.runId) S.runId='r'+Date.now()+Math.floor(rnd()*1000);
  recordRun('staying a while at '+(city()?city().name:'the road')+', day '+(S.day-1));
  let ok=false;
  try{ await STORE.set('silkroad_save', JSON.stringify({v:VERSION, when:Date.now(), S})); ok=true; }catch(e){ ok=false; }
  if(!ok){ log('The journey could not be set aside here — this device will not hold a saved game.'); render(); return; }
  S=null; render();
}
async function loadSave(){
  try{ const r=await STORE.get('silkroad_save'); if(r && r.value){ return JSON.parse(r.value); } }catch(e){}
  return null;
}
async function resumeGame(){
  let o=null;
  try{ const r=await STORE.get('silkroad_save'); if(r && r.value) o=JSON.parse(r.value); }catch(e){}
  if(!o || !o.S){ render(); return; }
  try{ await STORE.set('silkroad_save',''); }catch(e){} // one continuity — the save is spent on loading
  S=migrate(o.S);
  S.pendingEvent=null; S.eventOutcome=null; S.journeying=false; clearJourney();
  if(S.screen==='travel' || !S.screen) S.screen='city';
  log('You take up the journey again where you laid it down. (The saved game is spent — there is only one road forward from here.)');
  render();
}
function fillResumeSlot(){
  const el=$('resumeslot'); if(!el) return;
  loadSave().then(o=>{
    if(!el || !o || !o.S) return;
    const s=o.S, where=(s.itin && s.itin[s.idx])?s.itin[s.idx].name:'the road';
    el.innerHTML='<div class="panel" style="border-color:var(--silk)"><h3 class="gold" style="margin-bottom:4px">A journey set aside</h3>'+
      '<p class="sub" style="margin:0 0 8px">'+(s.name||'A merchant')+' — '+(s.returning?'homeward':'outbound')+', day '+((s.day||1)-1)+', last seen at '+where+'. Saved under v'+(o.v||'?')+'.</p>'+
      '<button class="seal" onclick="resumeGame()">Take up the journey again</button> '+
      '<span class="sub">resuming clears the save — one continuity only</span></div>';
  });
}

/* ============ v0.9.0 — THE HERD ============ */

 donkey:   {n:'donkey',         pl:'donkeys',         base:25, cap:35, carry:7,  thirst:.95, note:'cheap, sure-footed, a small load',
            spd:{settled:1.0, steppe:.9,  desert:.7,  harsh:.6,  mountain:1.0}, nf:.5,  spread:.25},
 mule:     {n:'mule',           pl:'mules',           base:70, cap:55, carry:11, thirst:1.0, note:'tough, sure-footed mountain hauler',
            spd:{settled:1.05,steppe:1.0, desert:.8,  harsh:.7,  mountain:1.1}, nf:.9,  spread:.5},
 horse:    {n:'horse',          pl:'horses',          base:110,cap:45, carry:9,  thirst:1.5, note:'fast on grass and road; thirsty in the sands',
            spd:{settled:1.15,steppe:1.2, desert:.65, harsh:.55, mountain:.85}, nf:.42, spread:.7},
 bactrian: {n:'Bactrian camel', pl:'Bactrian camels', base:68, cap:80, carry:16, thirst:.8,  note:'the eastern all-rounder; cold desert and high pass alike',
            spd:{settled:.9,  steppe:1.0, desert:1.05,harsh:1.05,mountain:1.0}, nf:.22, spread:1.25, gate:[0,.66]},
 dromedary:{n:'dromedary',      pl:'dromedaries',     base:78, cap:80, carry:16, thirst:.8,  note:'master of the hot western desert; suffers in cold mountains',
            spd:{settled:.9,  steppe:1.0, desert:1.15,harsh:1.15,mountain:.6},  nf:.9,  spread:1.45, gate:[.41,1]},
 hybrid:   {n:'hybrid bukht',   pl:'hybrid bukht',    base:150,cap:100,carry:18, thirst:.8,  note:'the prized crossbreed; strong on desert and mountain both',
            spd:{settled:.95,steppe:1.05,desert:1.1, harsh:1.1, mountain:1.0}, nf:.66, spread:.6, gate:[.46,.82]},
};
const ANIMAL_ORDER=['donkey','mule','horse','bactrian','dromedary','hybrid'];
function animalAvailable(id,c){ const A=ANIMALS[id]; if(A.gate){ const f=c.frac!=null?c.frac:.5; return f>=A.gate[0] && f<=A.gate[1]; } return true; }
function animalPrice(id,c){ const A=ANIMALS[id]; if(c && ANIMAL_OVR[id] && ANIMAL_OVR[id][c.name]!=null) return ANIMAL_OVR[id][c.name]; const f=c&&c.frac!=null?c.frac:.5; const p=A.base*(1+A.spread*Math.abs(f-A.nf)); return Math.max(Math.round(A.base*.8), Math.round(p)); }
function animalSell(id,c){ return Math.round(animalPrice(id,c)*.85); }

function totalAnimals(){ if(!S||!S.herd)return 0; let n=0; for(const k in S.herd)n+=S.herd[k]; return n; }
function herdCap(){ if(!S||!S.herd)return 0; let c=0; for(const k in S.herd) if(ANIMALS[k]) c+=S.herd[k]*ANIMALS[k].cap; return c; }
function herdCarry(){ if(!S||!S.herd)return 0; let w=0; for(const k in S.herd) if(ANIMALS[k]) w+=S.herd[k]*ANIMALS[k].carry; return w; }
function thirstFactor(){ if(!S||!S.herd)return 1; let tot=0,acc=0; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const w=S.herd[k]*ANIMALS[k].cap; acc+=w*ANIMALS[k].thirst; tot+=w; } } return tot>0?acc/tot:1; }
function speedMult(terr){ if(!S||!S.herd)return 1; let m=null; for(const k in S.herd){ if(S.herd[k]>0&&ANIMALS[k]){ const v=(ANIMALS[k].spd[terr]!=null)?ANIMALS[k].spd[terr]:1; m=(m===null)?v:Math.min(m,v); } } return m===null?1:m; }
function gainAnimal(id){ if(!S.herd)S.herd={}; S.herd[id]=(S.herd[id]||0)+1; }
function clearHerd(){ if(S.herd) for(const k in S.herd) S.herd[k]=0; }
function herdValue(c){ let v=0; if(S.herd) for(const k in S.herd) v+=S.herd[k]*animalSell(k,c); return v; }
function belovedNote(){
  if(!S || !S.startHerdSnap) return '';
  const types=Object.keys(S.startHerdSnap).filter(k=>S.startHerdSnap[k]>0);
  if(!types.length) return '';
  if(!types.every(k=>(S.herd[k]||0)>=S.startHerdSnap[k])) return '';
  if(types.length===1 && S.startHerdSnap[types[0]]===1){
    const a=ANIMALS[types[0]].n;
    return 'And the same '+a+' that carried your first load out of '+homeName()+' is standing here beside you still — footsore, unbothered, entirely yours. Not everyone brings their '+a+' home.';
  }
  return 'And every one of the '+types.map(k=>ANIMALS[k].pl).join(' and ')+' you first set out with is still in the string — never once sold or buried below your starting team. A drover\'s quiet pride.';
}
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function loseAnimal(){ const pool=[]; if(S.herd) for(const k in S.herd){ for(let i=0;i<S.herd[k];i++) pool.push(k); } if(!pool.length) return 'an animal'; const k=pick(pool); S.herd[k]--; return (/^[aeiou]/i.test(ANIMALS[k].n)?'an ':'a ')+ANIMALS[k].n; }

function herdCompList(sep){ const a=ANIMAL_ORDER.filter(id=>S.herd && S.herd[id]>0).map(id=>S.herd[id]+' '+(S.herd[id]>1?ANIMALS[id].pl:ANIMALS[id].n)); return a.length?a.join(sep||', '):'no animals'; }
function terrainHint(){
  const ts=['settled','steppe','desert','harsh','mountain']; const best=[],worst=[];
  for(const t of ts){ const m=speedMult(t); if(m>=1.0)best.push(TERR_DESC[t]); else if(m<.8)worst.push(TERR_DESC[t]); }
  let s='';
  if(worst.length) s+='This mix labours on '+worst.join(' and ')+'. ';
  if(best.length) s+='It is well-suited to '+best.join(', ')+'.';
  return s||'A balanced mix for any road.';
}
function caravanSummary(){
  return '<div class="panel"><p style="margin:0"><b>Your caravan:</b> '+herdCompList()+'.</p>'+
    '<p class="sub" style="margin:4px 0 0">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. '+terrainHint()+'</p>'+herdingNote()+'</div>';
}
function showHerd(){
  if(!S||S.pendingEvent)return;
  const comp=ANIMAL_ORDER.filter(id=>S.herd && S.herd[id]>0).map(id=>'<b>'+S.herd[id]+'</b> '+(S.herd[id]>1?ANIMALS[id].pl:ANIMALS[id].n)+' <span class="sub">— '+ANIMALS[id].note+'</span>').join('<br>')||'No animals — you are carrying the load on your own back.';
  S.pendingEvent={h:'THE CARAVAN', t:comp+'<br><br><span class="sub">Cargo capacity '+cargoCap()+' (carrying '+cargoW()+') · water reserve '+waterMax()+'. The train moves only as fast as its worst-suited animal for the ground underfoot — '+terrainHint()+'</span>', ch:[{l:'Close',f(){}}]};
  render();
}
function openAnimals(){ if(!S)return; if(S.screen==='city'){ S.screen='animals'; render(); } else showHerd(); }
function buyAnimal(id){
  const c=city();
  if(!animalAvailable(id,c)){ log(cap1(ANIMALS[id].pl)+' are not sold in '+cityLabel(c)+'.'); render(); return; }
  const p=animalPrice(id,c);
  if(S.silver<p){ log("You haven't the silver for a "+ANIMALS[id].n+" ("+p+" s)."); render(); return; }
  S.silver-=p; gainAnimal(id); S.water=waterMax();
  log("You buy a "+ANIMALS[id].n+" at "+p+" silver"+(['bactrian','dromedary','hybrid'].includes(id)?", its water-skins filled at the wells":"")+". The others size it up.");
  render();
}
function sellAnimal(id){
  if(!S.herd||(S.herd[id]||0)<=0){ render(); return; }
  const sp=animalSell(id,city()); S.herd[id]--; S.silver+=sp; S.water=Math.min(S.water,waterMax());
  let note="";
  if(cargoW()>cargoCap()) note = totalAnimals()===0
    ? " You have no pack animal now — buy a beast before you set out, or the cargo stays here."
    : " Your remaining animals can't carry all the cargo — buy another, or sell goods, before you set out.";
  log("You sell a "+ANIMALS[id].n+" for "+sp+" silver."+note);
  render();
}
function renderAnimals(m){
  const c=city();
  const rows=ANIMAL_ORDER.map(id=>{
    const A=ANIMALS[id], avail=animalAvailable(id,c), owned=(S.herd&&S.herd[id])||0;
    const p=animalPrice(id,c), sp=animalSell(id,c);
    return '<tr><td><b>'+cap1(A.n)+'</b><br><span class="sub">'+A.note+'</span></td>'+
      '<td class="num">'+(avail?p+' s':'<span class="sub">not sold here</span>')+'</td>'+
      '<td class="num">'+owned+'</td>'+
      '<td><button class="tiny" '+((!avail||S.silver<p)?'disabled':'')+' onclick="buyAnimal(\''+id+'\')">buy'+(avail?' ('+p+')':'')+'</button>'+
      '<button class="tiny" '+((owned<=0)?'disabled':'')+' onclick="sellAnimal(\''+id+'\')">sell ('+sp+')</button></td></tr>';
  }).join('');
  m.innerHTML='<h2>Livestock market <span class="sub">· '+cityLabel(c)+'</span></h2>'+
    '<p class="sub">Each beast suits a different road, and the caravan moves only as fast as its worst-suited animal — so match the herd to the country ahead. Prices favour whatever is native here; the hybrid bukht is sold only in the middle lands, between Sogdiana and Mesopotamia; the Bactrian belongs to the east and is not found for sale in the Levant.</p>'+
    caravanSummary()+
    '<table><tr><th>Animal</th><th class="num">price</th><th class="num">owned</th><th>buy / sell</th></tr>'+rows+'</table>'+
    '<div style="margin-top:10px"><button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button></div>';
}

/* ============ v0.9.1 — wild horses, animal peril, humble start ============ */
function evWildHorses(){
  if(!cooled('wildhorse',25)) return null;
  const here=city().name, ahead=nextCity()?nextCity().name:'';
  const f=(nextCity()||city()).frac;
  const near = here==='Osh'||ahead==='Osh'||here==='Samarkand'||ahead==='Samarkand'||(f>=.40&&f<=.56);
  if(!near) return null;
  markEv('wildhorse');
  return {h:'WILD HORSES',t:"A herd of horses runs loose on the Ferghana grass — the famed blood-sweating breed, manes streaming, supremely uninterested in your caravan. A few are young enough to gentle, if you have the nerve and a day to spare.",
  ch:[
   {l:'Try to catch one (1 day)',f(){ passDays(1); if(S.dead) return; const sk=skillMax('handle'); if(rnd()<(.35+.10*sk)){ gainAnimal('horse'); S.water=Math.min(S.water,waterMax()); log("After a day of dust and bruises, you rope a young Ferghana horse into the company. It submits with very poor grace."); } else { S.hp=clamp(S.hp-3,0,100); log("A day of glorious failure. The horses regard your efforts with the lordly contempt of the genuinely fast."); } }},
   {l:'Admire them and ride on',f(){ log("You watch the herd pour over a ridge like water, and think better of it. Some things are not for the catching."); }},
  ]};
}

// ill-suited animals don't just slow you — they can die, worse in the bad season
function applyAnimalPeril(terr){
  if(!S.herd) return;
  const f=(nextCity()||city()).frac, m=monthNum();
  const care=Math.max(.35, 1 - .14*skillMax('handle'));   // a good camel-hand keeps the beasts alive
  for(const id of ANIMAL_ORDER){
    if(!S.herd[id]) continue;
    let p=0;
    if(id==='dromedary' && terr==='mountain')                         p=.035 + .08*passDanger();   // cold kills the desert camel
    else if(id==='bactrian' && (terr==='desert'||terr==='harsh') && f>=.74) p=.025 + ((m>=5&&m<=7)?.04:0); // heat kills the woolly camel in the Levant
    else if(id==='horse' && terr==='harsh')                            p=.06;                       // the deep desert is no place for a horse
    else if(id==='horse' && terr==='desert')                          p=.03;                       // any desert, not just the west
    else if(id==='horse' && terr==='mountain')                        p=.035 + .05*passDanger();   // high cold passes are no place for a horse either
    else if(id==='donkey' && terr==='harsh')                          p=.018;
    if(p<=0) continue;
    if(rnd() < p*care){ S.herd[id]--; perilLog(id, terr); }
  }
  const over=herdOverload();
  const strayP = over>1 ? Math.min(.30,(over-1)*0.5) : (over>0.85 ? (over-0.85)*0.2 : 0);
  if(strayP>0 && totalAnimals()>1 && rnd()<strayP){ const a=loseAnimal(); log("With too few hands to mind so many beasts, "+a+" strays from the line in the night and is gone by morning."); }
}
function perilLog(id, terr){
  const why = id==='dromedary' ? "the cold of the high passes"
            : id==='bactrian'  ? "the furnace heat of the western desert"
            : terr==='mountain'? "the cold"
            : "the killing waste";
  log("One of your "+ANIMALS[id].pl+" falters and dies on the road — "+ANIMALS[id].pl+" were never bred for "+why+". You divide its load among the rest, who are not consulted.");
}

// hunt straight from the road without a separate "make camp" click
function huntRoad(){ if(!S)return; S.journeying=false; clearJourney(); huntFood(); }

// turn around mid-leg, retracing the distance already walked back to the last town
function turnBack(){
  if(!S || S.screen!=='travel') return;
  const wasMoving=S.journeying;
  S.journeying=false; clearJourney();
  const d=S.dir||1, x=S.legKm;
  S.idx += d;                          // step onto the city we were heading toward
  S.dir = -d;                          // and reverse
  S.legKm = Math.max(0, legDist() - x);// remaining distance back = the li already covered
  const back=nextCity();
  log("You turn the caravan around, retracing the "+Math.round(x)+" li back toward "+(back?back.name:'the last town')+".");
  if(wasMoving) startJourney(); else render();
}

   {l:'Halt and nurse the camp (lose days)',f(){ const d=3+ri(3); passDays(d); if(S.dead)return; let dead=0; for(const p of livingParty()){ if(rnd()<Math.max(.04,.18-.06*cook)){p.alive=false;dead++;} } S.hp=clamp(S.hp-8,0,100); if(S.hp<=0){S.cause='the flux';die();return;} log(dead?("After "+d+" hard days the flux passes — but it takes "+dead+" of the company with it."):("You halt "+d+" days, boil what water you can, and nurse the camp through. Everyone lives, gaunt and shaken.")); }},

const GENDER={ 'Shirin':'f','Maryam':'f','Mingyue':'f','Ratnadevi':'f','Bibi Gul':'f','Shahrbanu':'f','Eudokia':'f','Irene':'f' };
function pron(p){

/* ============ v0.9.7 — NaN self-healing ============ */
function sanitizeS(){
  if(!S) return;
  const fin=(v,d)=> (typeof v==='number' && isFinite(v)) ? v : d;
  if(S.herd){ for(const k in S.herd) S.herd[k]=Math.max(0,Math.round(fin(S.herd[k],0))); }
  S.silver = Math.max(0, fin(S.silver,0));
  S.food   = Math.max(0, fin(S.food,0));
  S.hp     = clamp(fin(S.hp,50),0,100);
  S.day    = Math.max(1, Math.round(fin(S.day,1)));
  S.legKm  = Math.max(0, fin(S.legKm,0));
  S.water  = clamp(fin(S.water, waterMax()), 0, waterMax());
  if(S.goods) for(const g of GOODS){
    S.goods[g.id]=Math.max(0,Math.round(fin(S.goods[g.id],0)));
    if(S.basis)     S.basis[g.id]=fin(S.basis[g.id],0);
    if(S.lastBasis) S.lastBasis[g.id]=fin(S.lastBasis[g.id],0);
  }
  S.huntLuck=fin(S.huntLuck,0); S.huntRisk=fin(S.huntRisk,0);
  S.banditMod=fin(S.banditMod,0); S.banditFreq=fin(S.banditFreq,1);
  S.dealDays=fin(S.dealDays,0);
  S.selfTrade=fin(S.selfTrade,0);
}

/* ============ v0.9.8 — per-good haggling specialists ============ */
const HAGGLE={
  'Ratnadevi':{ jade:0.08 },   // the jade-trader's daughter knows the stone
  'Irene':{ silk:0.08 },       // the silk-factor's widow knows the bolt
};
function haggler(gid){
  let best=null, bv=0;
  for(const p of livingParty()){ const h=HAGGLE[p.name]; if(h && h[gid] && h[gid]>bv){ bv=h[gid]; best=p; } }
  return best ? {p:best, b:bv} : null;
}

function tradeSkill(){ return Math.max(skillMax('trade'), (S&&S.selfTrade)||0); }

/* ============ v0.9.11 — the merchant's notes (price comparison screen) ============ */
function recordSeen(){
  if(!S) return; if(!S.seen) S.seen={};
  const c=city(); if(!c||!S.stock||!S.stock[c.name]) return;
  const mm={}; for(const g of GOODS) mm[g.id]=price(g,c);
  S.seen[c.name]=mm;
}
function noteNeighbors(){
  const c=city(), out=[];
  const back=backCity(); if(back) out.push(back);
  if(!S.returning && !S.routeChosen && c.name==='Dunhuang'){ out.push(NORTH[0]); out.push(SOUTH[0]); } // Hami (north) & Miran (south)
  else if(c.name==='Kashgar'){ const f=fwdCity(); if(f) out.push(f); const o=otherForkCity(); if(o) out.push(o); }
  else { const f=fwdCity(); if(f) out.push(f); }
  return out;
}
function noteBase(cityObj,g){
  let base=(OVR[cityObj.name]&&OVR[cityObj.name][g.id]!=null)?OVR[cityObj.name][g.id]:g.e+(g.w-g.e)*cityObj.frac;
  if(g.id==='silk'&&S.silkBoost&&cityObj.frac>.25)base*=1.25;
  return Math.max(1,Math.round(base));
}
function notePrice(cityObj,g){
  if(S.seen && S.seen[cityObj.name] && S.seen[cityObj.name][g.id]!=null) return {known:true, p:S.seen[cityObj.name][g.id]};
  return {known:false, p:noteBase(cityObj,g)};
}
function rumorWord(here,est){ const d=here>0?(est-here)/here:0; if(d>0.08)return 'higher'; if(d<-0.08)return 'lower'; return 'unknown'; }
function renderNotes(m){
  const c=city(), nbrs=noteNeighbors();
  const head='<tr><th>Good</th><th class="num">here</th>'+nbrs.map(n=>'<th class="num">'+cityLabel(n)+'</th>').join('')+'<th>buy / sell</th></tr>';
  const rows=GOODS.map(g=>{
    const hp=price(g,c), held=S.goods[g.id], avail=S.stock[c.name][g.id];
    const ref=held>0?(S.basis[g.id]||0):(S.lastBasis[g.id]||0);
    const pcls=ref>0?(hp<ref?'green':(hp>ref?'blue':'gold')):'gold';
    const cells=nbrs.map(n=>{
      const np=notePrice(n,g);
      if(np.known){ const cls=np.p>hp?'blue':(np.p<hp?'green':'gold'); return '<td class="num '+cls+'">'+np.p+'</td>'; }
      const w=rumorWord(hp,np.p), cls=w==='higher'?'blue':(w==='lower'?'green':'');
      const style=w==='unknown'?' style="color:var(--dim);font-size:.82em"':' style="font-size:.82em"';
      return '<td class="num"><span class="'+cls+'"'+style+'>'+w+'</span></td>';
    }).join('');
    const availTxt=avail>0?'<span style="color:var(--dim)"> · '+avail+'</span>':'<span class="red"> · none</span>';
    return '<tr><td>'+g.n+availTxt+'</td><td class="num '+pcls+'">'+hp+'</td>'+cells+
      '<td><button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',1)">+1</button>'+
      '<button class="tiny" '+(avail<=0?'disabled':'')+' onclick="buy(\''+g.id+'\',10)">+10</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',1)">−1</button>'+
      '<button class="tiny" onclick="sell(\''+g.id+'\',10)">−10</button></td></tr>';
  }).join('');
  m.innerHTML='<h2>The Merchant’s Notes <span class="sub">· '+cityLabel(c)+'</span></h2>'+
    '<p class="sub">Prices here against the neighbouring towns. A town you have <b>been to</b> shows its remembered prices; one you have not shows only road-rumour of how it compares to here — <span class="blue">higher</span>, <span class="green">lower</span>, or unknown. <span class="blue">Blue</span> = dearer there (carry it and sell); <span class="green">green</span> = cheaper there.</p>'+
    '<table>'+head+rows+'</table>'+
    '<p class="sub">Silver <b class="gold">'+Math.round(S.silver)+'</b> · cargo '+cargoW()+'/'+cargoCap()+'. Remembered prices are what you saw last time you stood in that market.</p>'+
    '<button class="seal" onclick="S.screen=\'city\';render()">Back to the bazaar</button>';
}
