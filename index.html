// handling capacity vs. herd demand — real caravans run ~3-6 animals per drover
const ANIMAL_TEND={donkey:0.8, mule:1.0, horse:1.3, bactrian:0.8, dromedary:0.8, hybrid:0.9};
function herdCapacity(){ const bodies=1+livingComps(); return bodies*4 + skillSum('handle')*3; }
function herdDemand(){ let d=0; if(S&&S.herd) for(const k in S.herd) d+=S.herd[k]*(ANIMAL_TEND[k]||1); return d; }
function herdOverload(){ const cap=herdCapacity(); return cap>0 ? herdDemand()/cap : 99; }
function herdingNote(){
  const over=herdOverload();
  const cls = over>1 ? 'red' : (over>0.85 ? 'gold' : 'sub');
  const msg = over>1 ? 'too few hands for the herd — beasts will stray.' : (over>0.85 ? 'hands stretched thin — a beast could stray.' : 'well in hand.');
  return '<p class="'+cls+'" style="margin:4px 0 0;font-size:.78rem">Herding: '+herdDemand().toFixed(1)+' of '+herdCapacity().toFixed(0)+' capacity — '+msg+'</p>';

function wealthArc(start,end){
  const r = start>0 ? end/start : end;
  if(start<=120){ // a humble origin
    if(r>=50) return "You set out with barely the clothes on your back and a single donkey; you come home a merchant prince, your name fit to be spoken in the same breath as the great houses. Songs will outlive you.";
    if(r>=10) return "You left with next to nothing and return genuinely, improbably rich — the kind of turn of fortune that founds dynasties and ends in legend.";
    if(r>=2)  return "From a donkey and a dream to a respectable estate: not bad at all for a nobody who saved their coppers.";
    if(r>=1)  return "You come home no poorer than you left, which, starting from nothing, is its own quiet triumph.";
    return "The Road gave you a story, if not a fortune. You are home, and that is more than many manage.";
  }
  if(r>=8)   return "You set out comfortable and return fabulously, almost embarrassingly wealthy. The ledger can scarcely hold the figure.";
  if(r>=2.5) return "A magnificent venture — your fortune multiplied many times over.";
  if(r>=1)   return "A solid profit, soberly earned.";
  return "You come home poorer than you set out. The Road keeps its own ledger, and this time it kept more than it gave.";
}

  if(!west) return fwd.map(c=>({...c}));
  const rev=[]; for(let i=fwd.length-1;i>=0;i--) rev.push({...fwd[i]});
  for(let i=1;i<rev.length;i++) rev[i].dist=fwd[fwd.length-i].dist;
  return rev;
}

function setupTick(){
  if(SETUP.companyMode==='custom'){ const b=$('btnVenture'); if(b)b.disabled=!SETUP.custom.every(c=>c.n.trim()); return; }
  const ros=setupRoster(); const n=ros.filter(r=>{const e=$('rc_'+r.id);return e&&e.checked}).length;
  const w=$('rosterWarn'); if(w)w.textContent=n===3?'A fine company.':(n+' of 3 chosen.');
  ros.forEach(r=>{const e=$('rc_'+r.id); if(e&&!e.checked)e.disabled=(n>=3);});
  const b=$('btnVenture'); if(b)b.disabled=(n!==3); }
function startVenture(){
  if(SETUP.companyMode==='custom'){ saveCustom(); if(!SETUP.custom.every(c=>c.n.trim())) return;
    const gm={Mr:'m',Ms:'f',Mx:'they'};
    const members=SETUP.custom.map(c=>{ const sk=randomSkills(); return {name:c.n.trim().slice(0,18), role:topSkill(sk), skills:sk, g:(gm[c.t]||'m'), custom:true}; });
    SETUP_PAGE=1; newGame(SETUP.name, members, SETUP.nephewName||'', SETUP.origin==='west'?'cpl':undefined); return; }
  const ros=setupRoster(); const chosen=ros.filter(r=>{const e=$('rc_'+r.id);return e&&e.checked}).map(r=>r.id);
  if(chosen.length!==3){ const w=$('rosterWarn'); if(w)w.textContent='Pick exactly three.'; return; }
  SETUP_PAGE=1; newGame(SETUP.name, chosen, SETUP.nephewName||'', SETUP.origin==='west'?'cpl':undefined); }
function backToTitle(){ S=null; SETUP_PAGE=1; render(); }

/* ============ v0.9.19 — animated sea voyage ============ */
let sailTimer=null;
function clearSail(){ if(sailTimer){clearInterval(sailTimer);sailTimer=null;} }
function startSailTimer(){ clearSail(); S.sailing=true; render(); sailTimer=setInterval(stepSail, DAY_MS); }
function stepSail(){
  if(!S || !S.sailing || S.pendingEvent || S.eventOutcome || S.screen!=='sailing' || !S.sail){ clearSail(); return; }
  if(S.food < foodNeed()){ S.sailing=false; clearSail(); S.pendingEvent=evSeaFood(); render(); return; }
  S.day++; S.food=Math.max(0,S.food-foodNeed()); S.hp=clamp(S.hp+0.3,0,100);
  if(!S.sail.sickRolled && (S.sail.total-S.sail.daysLeft)<=7){ S.sail.sickRolled=true; if(rnd()<0.5){ S.seasick=true; log("You are violently, comprehensively seasick — green at the rail, certain you will die and then afraid you won’t. It does no lasting harm; the sea does this to nearly everyone once."); } }
  S.sail.daysLeft--;
  if(S.sail.daysLeft<=0){ S.sailing=false; clearSail(); sailArrive(); render(); return; }
  const _p=(S.sail.total-S.sail.daysLeft)/S.sail.total;
  if(!S.sail.ephesusDone && _p>=0.5){ S.sail.ephesusDone=true; S.sailing=false; clearSail(); S.pendingEvent=evEphesus(); render(); return; }
  const _cp=(S.sail.target==='Aleppo')?0.75:0.25;
  if(!S.sail.chimeraDone && _p>=_cp){ S.sail.chimeraDone=true; log(CHIMERA_LINE); }
  const wreckP=S.sail.winter?0.045:0.012;
  if(rnd()<wreckP){ S.sailing=false; clearSail(); S.pendingEvent=evShipwreck(); render(); return; }
  if(rnd()<0.06){ S.sailing=false; clearSail(); S.pendingEvent=evSeaWinds(); render(); return; }
  updateSail();
}
function updateSail(){ if(!S||!S.sail)return; renderStats(); renderLog();
  const e=$('sDay'); if(e)e.textContent='Day '+S.day;
  const sl=$('sLoc'); if(sl)sl.textContent=seaLeg((S.sail.total-S.sail.daysLeft)/S.sail.total, S.sail.target);
  const r=$('sRemain'); if(r)r.textContent=S.sail.daysLeft+' day'+(S.sail.daysLeft!==1?'s':'')+' to '+S.sail.target;
  const p=$('sProg'); if(p)p.style.width=Math.round((1-S.sail.daysLeft/S.sail.total)*100)+'%';
  const ph=SKY[skyPhase()], set=(id,a,v)=>{const el=$(id);if(el)el.setAttribute(a,v);};
  set('sSkyTop','stop-color',ph.t); set('sSkyBot','stop-color',ph.b);
  set('sSun','opacity',ph.sun); set('sMoon','opacity',ph.moon); set('sStars','opacity',ph.star); set('sVeil','opacity',ph.veil); }
function sailArrive(){
  const target=S.sail.target; S.sail=null; S.sailing=false; S.seasick=false;
  const ti=S.itin.findIndex(x=>x.name===target); if(ti>=0)S.idx=ti;
  S.legKm=0; S.dir=1; S.dealDays=0; S.priceLock={}; S.water=waterMax();
  if(!S.cityDay)S.cityDay={}; restockToNow(target); callInOnSettlers(target);
  log("You raise "+target+" and put in — the passes never climbed, the beasts sold behind you. You will want fresh animals here.");
  if(!S.returning && target===goalName()){ S.reachedCpl=true; S.bySea=true; growNephew(); S.screen='end'; return; }
  if(S.returning && target===homeName()){ S.bySea=true; S.screen='home'; return; }
  S.screen='city';
}
function skipSail(){
  S.sailing=false; clearSail();
  for(let i=0;i<80 && S.sail;i++){
    if(S.food<foodNeed()){ S.pendingEvent=evSeaFood(); render(); return; }
    S.day++; S.food=Math.max(0,S.food-foodNeed()); S.sail.daysLeft--;
    if(S.sail.daysLeft<=0){ sailArrive(); render(); return; }
    const _p=(S.sail.total-S.sail.daysLeft)/S.sail.total;
    if(!S.sail.ephesusDone && _p>=0.5){ S.sail.ephesusDone=true; S.pendingEvent=evEphesus(); render(); return; }
    const _cp=(S.sail.target==='Aleppo')?0.75:0.25;
    if(!S.sail.chimeraDone && _p>=_cp){ S.sail.chimeraDone=true; log(CHIMERA_LINE); }
    const wreckP=S.sail.winter?0.045:0.012;
    if(rnd()<wreckP){ S.pendingEvent=evShipwreck(); render(); return; }
    if(rnd()<0.06){ S.pendingEvent=evSeaWinds(); render(); return; }
  }
  render();
}
function evShipwreck(){
  return {h:'STORM AT SEA', t:"The sky goes green-black and the sea stands up in walls. The captain screams orders no one can hear; for a night and a day the ship is a child’s toy on the water.",
   ch:[{l:'Ride it out, and pray',f(){ S.hp=clamp(S.hp-18,0,100); const g=loseRandomGoods(.35); let s="The ship is driven hard onto a lee shore. The sea takes "+g; if(rnd()<.4){ const who=casualty(rnd()<.4); if(who) s+=", and "+who+(/\(/.test(who)?" is drowned":" is half-drowned but hauled aboard"); } if(S.hp<=0){ S.cause='shipwreck'; die(); log(s+". You never reach the far shore."); return; } if(S.sail) S.sail.daysLeft+=2+ri(3); log(s+". The battered vessel limps on, days behind her schedule."); }}]};
}
function evSeaWinds(){
  return {h:'UNFAVOURABLE WINDS', t:"The wind backs round and dies, then comes hard from the wrong quarter. The captain swears in Greek and puts in to a sheltered cove to wait it out.",
   ch:[{l:'Wait for a fair wind (about 3 days)',f(){ const d=2+ri(3); S.day+=d; S.food=Math.max(0,S.food-foodNeed()*d); log("Three idle days at anchor, watching the rain run down the rigging. When the wind comes fair, you sail on."); }}]};
}
function evSeaFood(){
  const per=12+ri(8), amt=30, cost=per*amt;
  return {h:'PROVISIONS GONE AT SEA', t:"The food runs out mid-passage. There is no market on the open water — only the captain, who happens to have provisions to spare, at a price that reflects exactly how trapped you are.",
   ch:[{l:'Buy '+amt+' days from the captain ('+per+' s/day)',f(){
     if(S.silver>=cost){ S.silver-=cost; S.food+=amt; log("You pay the captain’s outrageous price for "+amt+" days of ship’s biscuit and salt fish. Robbery on the high seas, and entirely legal."); }
     else { let owed=cost-S.silver; S.silver=0; const sold=[];
       for(const g of GOODS){ if(owed<=0)break; if(S.goods[g.id]>0){ const unit=Math.max(1,Math.round(price(g,city())*0.5)); const need=Math.ceil(owed/unit); const n=Math.min(S.goods[g.id],need); S.goods[g.id]-=n; if(S.goods[g.id]<=0)S.basis[g.id]=0; owed-=n*unit; sold.push(n+' '+g.u+(n>1?'s':'')+' of '+g.n.toLowerCase()); } }
       S.food+=amt; log("You haven’t the coin, so the captain takes his price in cargo — "+(sold.length?sold.join(', '):'what little you carried')+" — at a wrecker’s rate. You will eat, at least."); }
   }}]};
}
function sailScene(){
  const p=SKY[skyPhase()], paused=S.sailing?'':' paused';
  const east=(S.sail&&S.sail.target==='Aleppo'); // toward the Levant = eastward = left-to-right
  let stars=''; for(let i=0;i<24;i++){const x=(i*61%690)+5,y=(i*29%64)+6,r=(i%3)?.8:1.3;stars+='<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="#fff"/>';}
  const wave=(off,col,opac)=>'<path d="M0 132 Q60 122 120 132 T240 132 T360 132 T480 132 T600 132 T720 132 L720 200 L0 200 Z" fill="'+col+'" opacity="'+opac+'" transform="translate('+off+',0)"/>';
  return '<svg class="scene'+paused+'" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="height:170px'+(east?';transform:scaleX(-1)':'')+'">'+
    '<defs><linearGradient id="sSky" x1="0" y1="0" x2="0" y2="1"><stop id="sSkyTop" offset="0" stop-color="'+p.t+'"/><stop id="sSkyBot" offset="1" stop-color="'+p.b+'"/></linearGradient></defs>'+
    '<rect width="700" height="200" fill="url(#sSky)"/>'+
    '<g id="sStars" opacity="'+p.star+'">'+stars+'</g>'+
    '<circle id="sSun" cx="585" cy="44" r="20" fill="#ffe6a0" opacity="'+p.sun+'"/>'+
    '<g id="sMoon" opacity="'+p.moon+'"><circle cx="585" cy="44" r="15" fill="#e8ecf5"/><circle cx="591" cy="40" r="12" fill="url(#sSky)"/></g>'+
    '<g class="sFar">'+wave(0,'#1f3a50',.55)+wave(700,'#1f3a50',.55)+'</g>'+
    '<g transform="translate(330,104)"><g class="plod" style="animation-delay:.2s">'+
      '<path d="M-2 -30 L26 14 L-2 14 Z" fill="#d8c7a8"/>'+
      '<path d="M-3 -26 L-24 12 L-3 12 Z" fill="#bfae88"/>'+
      '<rect x="-1.5" y="-32" width="3" height="48" fill="#2b1f14"/>'+
      '<path d="M-42 16 L42 16 L30 34 L-30 34 Z" fill="#3a2a1a"/>'+
    '</g></g>'+
    '<g class="sNear">'+wave(0,'#2a4a63',1)+wave(700,'#2a4a63',1)+'</g>'+
    '<rect id="sVeil" width="700" height="200" fill="#0a1226" opacity="'+p.veil+'"/>'+
  '</svg>';
}
const CHIMERA_LINE="Off to the south, on the dark Lycian shore, a bare hillside flickers with pale flames that never die — the breath of the Chimera, the sailors say, the fire-breathing beast that Bellerophon pinned beneath the mountain. They have burned there longer than Rome has stood, and will burn long after.";
function seaLeg(p, target){
  const f=(target==='Aleppo')?p:(1-p); // f: 0 at Constantinople, 1 at Aleppo
  if(f<0.25) return 'the Sea of Marmara';
  if(f<0.33) return 'the Dardanelles';
  if(f<0.50) return 'the Aegean';
  return 'the Eastern Mediterranean';
}
function evEphesus(){
  return {h:'LANDFALL AT EPHESUS', t:"The captain puts in for a night at Ephesus to water the ship and trade a little. Once the first city of Roman Asia, it is visibly sliding past its glory: the great harbour the emperors dredged for centuries is silting up, the sea drawing away year by year and leaving the marble wharves stranded among reeds. Yet the colonnaded street still runs white to the water, the huge basilica of Saint John crowns the hill above the broken columns of Artemis’ temple, and pilgrims throng the saint’s shrine while fishermen mend nets where senators once paraded. You buy bread and oranges, fill the casks, and are gone on the morning tide.",
   ch:[{l:'Back to the ship',f(){}}]};
}
function renderSail(m){
  const s=S.sail; if(!s){ S.screen='city'; renderCity(m); return; }
  const pct=Math.round((1-s.daysLeft/s.total)*100);
  m.innerHTML='<h2>At sea, bound for '+s.target+'</h2>'+
    '<p class="sub"><span id="sDay">Day '+S.day+'</span> · <span id="sLoc">'+seaLeg((s.total-s.daysLeft)/s.total, s.target)+'</span> · <span id="sRemain">'+s.daysLeft+' day'+(s.daysLeft!==1?'s':'')+' to '+s.target+'</span></p>'+
    '<div class="bar"><i id="sProg" style="width:'+pct+'%"></i></div>'+
    sailScene()+
    '<p class="sub" style="margin-top:8px;border-left:2px solid var(--line);padding-left:10px">The coast is never long out of sight — the rugged mountains of Anatolia slide past to the north, and you are quietly glad you are not trying to drive a mule-train across them. The captain keeps the water-casks; your only cares are the food and the weather.</p>'+
    '<button class="seal" onclick="skipSail()">Skip ahead</button>';
}

/* ============ RENDER ============ */
const $=id=>document.getElementById(id);
function esc(s){return s}
function render(){
  if(S)sanitizeS();
  const ve=$('ver'); if(ve)ve.textContent='v'+VERSION;
  $('hdate').textContent=S?dateStr():'';
  renderStats(); renderRibbon();
  const m=$('main');
  if(!S){renderTitle(m);return;}
  if(S.eventOutcome)renderOutcome(m);
  else if(S.pendingEvent)renderEvent(m);
  else if(S.screen==='city')renderCity(m);
  else if(S.screen==='animals')renderAnimals(m);
  else if(S.screen==='notes')renderNotes(m);
  else if(S.screen==='travel')renderTravel(m);
  else if(S.screen==='sailing')renderSail(m);
  else if(S.screen==='route')renderRoute(m);
  else if(S.screen==='routeReturn')renderRouteReturn(m);
  else if(S.screen==='end')renderEnd(m);
  else if(S.screen==='conclude')renderFinal(m,'concluded at Constantinople');
  else if(S.screen==='home')renderHome(m);
  else if(S.screen==='dead')renderDead(m);
  renderLog();
}
function renderStats(){
  const el=$('stats');
  if(!S){el.innerHTML='';return;}
  const w=cargoW()>cargoCap()?' class="bad"':'';
  el.innerHTML=
   'Silver <b>'+Math.round(S.silver)+'</b>'+
   '<span>Food <b'+(S.food<10?' class="bad"':'')+'>'+Math.round(S.food)+'</b></span>'+
   '<span>Water <b'+(S.water<10?' class="bad"':'')+'>'+Math.round(S.water)+'/'+waterMax()+'</b></span>'+
   '<span style="cursor:pointer;text-decoration:underline dotted var(--dim)" title="The caravan / livestock market" onclick="openAnimals()">Animals <b>'+totalAnimals()+'</b></span>'+
   '<span>Guards <b>'+guardCount()+'</b></span>'+
   '<span style="cursor:pointer;text-decoration:underline dotted var(--dim)" title="View the company" onclick="showParty()">Party <b>'+(1+livingComps())+'</b></span>'+
   '<span>Health <b>'+hpWord()+'</b></span>'+
   '<span'+w+'>Cargo <b'+w+'>'+cargoW()+'/'+cargoCap()+'</b></span>';
}
function renderRibbon(){
  const el=$('ribbon');
  if(!S){el.innerHTML='';return;}
  let h=S.itin.map((c,i)=>{
    let cls=i<S.idx?'done':i===S.idx?'here':'';
    return '<span class="city '+cls+'">'+c.name+'</span>';
  }).join('<span style="opacity:.4"> — </span>');
  if(!S.routeChosen)h+='<span style="opacity:.4"> — </span><span class="city">… the West</span>';
  el.innerHTML=h;
}
function renderLog(){
  $('log').innerHTML=S?S.log.slice(0,7).map(e=>'<div><span class="d">d'+e.d+'</span> '+e.t+'</div>').join(''):'';
}
function startFromTitle(){
  const nm=$('pname')?$('pname').value.trim():'';

  const np=$('nname')?$('nname').value:'';

  newGame(nm, chosen, np);
}
function rosterTick(){
  const n=ROSTER.filter(r=>{const e=$('rc_'+r.id);return e&&e.checked}).length;
  const w=$('rosterWarn'); if(w)w.textContent=n===3?'A fine company.':(n+' of 3 chosen.');

}

function regionMap(){

  const itin=((!S.routeChosen && !S.returning) ? MAIN1.concat(MAIN2) : S.itin), n=itin.length, x0=14, x1=306, span=x1-x0;

  let segs='';
  for(let i=0;i<n-1;i++){ const passed = S.returning ? (i>=S.idx) : (i<S.idx); segs+='<line x1="'+xf(itin[i].frac)+'" y1="30" x2="'+xf(itin[i+1].frac)+'" y2="30" stroke="'+(terrCol[itin[i+1].terr]||'#888')+'" stroke-width="3" '+(passed?'opacity=".4"':'')+'/>'; }

  let east=itin[0], west=itin[0]; for(const c of itin){ if(c.frac<east.frac)east=c; if(c.frac>west.frac)west=c; }

  '</svg>';
}

    if(west){
      m.innerHTML='<h2>Chang’an <span class="zh">長安</span> <span class="sub">· the journey’s far end</span></h2>'+
      '<p>After '+(S.day-1)+' days on the road, the towers of Chang’an rise at last out of the loess haze — the capital of the Tang, greatest city of the East, the very end of the world as the Romans reckon it. The market-wardens eye your foreign face and your road-worn beasts with frank curiosity, and a fortune’s worth of buyers behind them.</p>'+
      '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop the <span class="gold">'+Math.round(S.silver)+'</span> in your strongbox.</p>'+
      '<button class="seal" onclick="sellAllFinal()">Sell everything</button>';
    } else {
      m.innerHTML='<h2>Constantinople '+(S.bySea?'<span class="sub">· into the Golden Horn</span>':'<span class="sub">· the market at Chalcedon, across the strait</span>')+'</h2>'+
      '<p class="sub">'+(S.itin[S.itin.length-1].desc||'')+'</p>'+
      '<p>'+(S.bySea?'Your ship works up the Bosphorus under oar and sail and runs at last into the Golden Horn itself — no ferry, no near shore. You have come to Constantinople entire, the Queen of Cities rising sheer from the water on every side: the sea-walls, the domes, and over them the vast golden dome of Hagia Sophia. You came two empires and a year by sea and land to stand on this quay.':'After '+(S.day-1)+' days on the road, you halt at Chalcedon on the Asian shore. Across the Bosphorus the City of the Romans rises in gold — too grand, and too wary of caravans, to enter lightly — so here at the water’s edge you make your market, and Greek-speaking brokers row over to meet you.')+'</p>'+
      '<p>Your remaining cargo would fetch <span class="gold">'+gv+' silver</span> here, on top of the <span class="gold">'+Math.round(S.silver)+'</span> in your strongbox.</p>'+
      '<button class="seal" onclick="sellAllFinal()">Sell everything</button>';
    }
    return;
  }
  const total=Math.round(S.silver);
  const [r,flavor]=rank(total);
  const survivors=livingParty().map(c=>c.name);
  const lost=S.party.filter(c=>!c.alive&&!c.married).map(c=>c.name);
  recordRun('reached '+goalName());
  m.innerHTML='<h2>'+(west?'The Eastern Market':'The Western Market')+'</h2>'+
  '<p class="sub">'+S.name+' · '+(S.route==='n'?'the northern road':'the southern road')+' · '+(S.day-1)+' days out</p>'+
  '<div class="panel"><p>Worth so far: <span class="gold" style="font-size:1.3rem">'+total+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+')</span></p>'+
  '<p>Standing: <span class="gold">'+r+'</span></p><p>'+flavor+'</p>'+
  '<p class="green">With you: '+(survivors.length?survivors.join(', '):'no one but yourself')+', and '+totalAnimals()+' animal'+(totalAnimals()!==1?'s':'')+'.</p>'+
  (lost.length?'<p class="red">Buried on the road out: '+lost.join(', ')+'.</p>':'')+settledLine()+
  '</div>'+
  '<div class="panel"><p>You could conclude the venture here — or load the beasts with '+(west?'eastern silk, jade, and spice and run the whole road back to Constantinople, where the Romans pay in gold':'western glass, coral, and amber and run the whole road back to Chang’an, where such things fetch Tang prices')+'. Home is another '+(S.day-1)+'-odd days and every risk again.</p>'+
  '<button class="seal" onclick="startReturn()">Buy '+(west?'eastern':'western')+' goods & head home</button> '+
  '<button onclick="concludeHere()">Conclude the venture here</button></div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
function concludeHere(){ S.screen='conclude'; render(); }
function yearsPhrase(days){
  const y=days/360;
  if(y<1.3) return "the better part of a year";
  if(y<1.8) return "a year and a half on the road";
  if(y<2.4) return "two hard years";
  if(y<3.2) return "the better part of three years";
  return Math.round(y)+" years away";
}
function renderHome(m){
  if(!S.onceFlags.soldHome){
    const gv=finalGoodsValue();
    if(isWest()){
      m.innerHTML='<h2>Constantinople <span class="sub">· home at last</span></h2>'+
      '<p>The sea-walls and the great dome of the Holy Wisdom again, after '+(S.day-1)+' days — '+yearsPhrase(S.day-1)+'. The City is as you left it, eternal and indifferent, but it is home, and it pays in gold for the silk and spice and jade of the East.</p>'+
      '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop <span class="gold">'+Math.round(S.silver)+'</span> in hand.</p>'+
      '<button class="seal" onclick="sellAllFinal();S.onceFlags.soldHome=true;render()">Sell everything</button>';
      return;
    }
    m.innerHTML='<h2>Chang\'an <span class="zh">長安</span></h2>'+
    '<p>The western gate again, after '+(S.day-1)+' days — '+yearsPhrase(S.day-1)+'. The rebellion has guttered out; the city is thinner and stranger, but it is home, and it pays in full for coral, glass, and wine.</p>'+
    '<p>Your cargo would fetch <span class="gold">'+gv+' silver</span> here, atop <span class="gold">'+Math.round(S.silver)+'</span> in hand.</p>'+
    '<button class="seal" onclick="sellAllFinal();S.onceFlags.soldHome=true;render()">Sell everything</button>';
    return;
  }
  renderFinal(m, 'home to '+homeName()+' (round trip)', true);
}
function setOutAgain(){
  // continue the same merchant on a fresh westward lap; everything earned and everyone alive carries over
  S.laps=(S.laps||0)+1;
  S.itin=preForkItin(isWest()); S.idx=0; S.legKm=0;
  S.returning=false; S.reachedCpl=false; S.routeChosen=false; S.returnRouteChosen=false; S.dir=1;
  S.onceFlags.soldHome=false; S.onceFlags.soldOut=false; S.onceFlags.lostBeforeKashgar=false; S.priceLock={};
  S.stock=makeStock([...MAIN1,...NORTH,...SOUTH,...MAIN2]);
  S.water=waterMax(); S.screen='city'; S.journeying=false; clearJourney();
  log("You cannot sit still. The camels are restless, the strongbox has room, and the road west is, after all, right there. You set out again — venture number "+(S.laps+1)+".");
  render();
}
function renderFinal(m,outcomeText,canContinue){
  const score=Math.round(S.silver + (typeof herdValue==='function'?herdValue(city()):0)); // silver plus the beasts you could sell here
  const [r,flavor]=rank(score);
  const survivors=livingParty().map(c=>c.name);
  const lost=S.party.filter(c=>!c.alive&&!c.married).map(c=>c.name);
  recordRun(outcomeText);
  m.innerHTML='<h2>'+(canContinue?'Home again':'Journey\'s end')+'</h2>'+
  '<p class="sub">'+S.name+' · '+(S.laps?(S.laps+1)+' ventures · ':'')+(S.returning?'round trip':(S.route==='n'?'northern road':'southern road'))+' · '+(S.day-1)+' days'+(S.day-1>360?' ('+yearsPhrase(S.day-1)+')':'')+'</p>'+
  '<div class="panel"><p>Total worth: <span class="gold" style="font-size:1.3rem">'+score+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+')</span></p>'+(totalAnimals()>0?'<p class="sub">Including '+totalAnimals()+' head of livestock, worth '+Math.round(herdValue(city()))+' silver sold here.</p>':'')+(belovedNote()?'<p class="gold">'+belovedNote()+'</p>':'')+'<p class="gold">'+wealthArc(S.startSilver||900,score)+'</p>'+
  '<p>Rank: <span class="gold">'+r+'</span></p><p>'+flavor+'</p>'+
  '<p class="green">'+(canContinue?'Still standing':'Arrived')+': you'+(survivors.length?', '+survivors.join(', '):'')+', and '+totalAnimals()+' animal'+(totalAnimals()!==1?'s':'')+'.</p>'+
  (lost.length?'<p class="red">Buried on the road: '+lost.join(', ')+'.</p>':'<p class="green">You buried no one — a rare and unfashionable achievement.</p>')+settledLine()+
  '</div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>'+
  (canContinue?'<button class="seal" onclick="setOutAgain()">Load up and set out again</button> ':'')+
  '<button onclick="backToTitle()">'+(canContinue?'Retire — begin a new venture':'Begin a new venture')+'</button>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
function renderDead(m){
  const c=city(); // nearest market reached
  const goodsVal=GOODS.reduce((a,g)=>a+S.goods[g.id]*price(g,c),0);
  const herdVal=(typeof herdValue==='function'?herdValue(c):0);
  const worth=Math.round(S.silver+goodsVal+herdVal);
  const [r,flavor]=rank(worth);
  const lost=S.party.filter(x=>!x.alive&&!x.married).map(x=>x.name);
  recordRun('died of '+S.cause+(S.returning?' (homeward)':'')+', day '+(S.day-1));
  m.innerHTML='<h2 class="red">You have died of '+S.cause+'.</h2>'+
  '<p class="sub">Day '+(S.day-1)+', on the road '+(nextCity()?'short of '+nextCity().name:'')+'.</p>'+
  '<div class="tomb"><div style="letter-spacing:.2em;margin-bottom:8px">HERE LIES</div>'+
  '<div class="name">'+S.name+'</div>'+
  '<div style="margin-top:8px;font-style:italic">"'+epitaphFor(S.cause)+'"</div></div>'+
  '<div class="panel"><p>Final reckoning, valued at '+c.name+'’s prices:</p>'+
  '<p>Silver in the strongbox: <span class="gold">'+Math.round(S.silver)+'</span><br>'+
  'Goods on the camels: <span class="gold">'+Math.round(goodsVal)+'</span><br>'+(totalAnimals()>0?'Livestock, sold here: <span class="gold">'+Math.round(herdVal)+'</span><br>':'')+
  'Estate total: <span class="gold" style="font-size:1.25rem">'+worth+' silver</span> <span class="sub">(set out with '+(S.startSilver||900)+', '+(S.day-1)+' days)</span></p>'+
  '<p>Posthumous rank: <span class="gold">'+r+'</span></p><p class="sub">'+deathFlavor()+'</p>'+
  (lost.length?'<p class="red">Lost along the way: '+lost.join(', ')+'.</p>':'')+settledLine()+
  '</div>'+
  '<div class="panel"><h3 class="gold" style="margin-bottom:6px">The Ledger of Ventures</h3><div id="board"></div></div>'+
  '<div style="text-align:center"><button onclick="backToTitle()">Begin again</button></div>';
  loadBoard().then(()=>{if($('board'))renderBoardInto($('board'));});
}
render();
</script>
</body>
</html>
